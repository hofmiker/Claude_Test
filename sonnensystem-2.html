<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonnensystem 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05050f; overflow: hidden; }
        #three   { position: fixed; top: 0; left: 0; touch-action: none; z-index: 1; }
        #overlay { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 5; }

        #label {
            position: fixed; display: none; pointer-events: none; z-index: 10;
            font-family: -apple-system, Helvetica, sans-serif;
        }
        #label-name {
            display: block;
            color: rgba(255,255,255,0.92);
            font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
        }
        #label-info {
            display: block;
            color: rgba(255,255,255,0.50);
            font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
            margin-top: 2px; line-height: 1.35;
        }

        @keyframes yearPop {
            0%   { transform: translateX(-50%) scale(1.22); color: rgba(255,255,255,0.90); }
            100% { transform: translateX(-50%) scale(1);    color: rgba(255,255,255,0.55); }
        }
        #year-display {
            position: fixed; bottom: 60px; left: 50%;
            transform: translateX(-50%);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 16px; letter-spacing: 0.20em;
            color: rgba(255,255,255,0.55);
            z-index: 20; pointer-events: none;
            min-width: 6ch; text-align: center;
        }
        #year-display.year-pop {
            animation: yearPop 0.40s ease-out forwards;
        }

        #ui {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 18px; z-index: 20;
        }
        .speed-label-wrap {
            display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
        }
        .lbl {
            color: rgba(255,255,255,0.38);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 10px; letter-spacing: 0.14em;
            text-transform: uppercase; white-space: nowrap;
        }
        .lbl-sub {
            color: rgba(255,255,255,0.20);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 8px; letter-spacing: 0.08em;
            white-space: nowrap;
        }

        #speed {
            width: 220px; height: 2px; cursor: pointer;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.2); border-radius: 1px; outline: none;
        }
        #speed::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            border-radius: 50%; background: rgba(255,255,255,0.9);
            box-shadow: 0 0 10px rgba(255,255,255,0.35);
        }
        #speed::-moz-range-thumb {
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,0.9); border: none;
        }

        #thumb-label {
            position: fixed; display: none; pointer-events: none; z-index: 30;
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 10px; letter-spacing: 0.10em;
            color: rgba(255,255,255,0.72);
            transform: translateX(-50%);
            white-space: nowrap;
        }

        #headline {
            position: fixed; top: 14px; left: 50%;
            transform: translateX(-50%);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
            color: rgba(255,255,255,0.40); pointer-events: none; z-index: 20;
            white-space: nowrap;
        }
        #deploy-time {
            position: fixed; top: 30px; left: 50%;
            transform: translateX(-50%);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.22); pointer-events: none; z-index: 20;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="headline">Solar Eclipse</div>
    <div id="deploy-time">Deployed: 07.05.2026</div>
    <canvas id="three"></canvas>
    <canvas id="overlay"></canvas>
    <div id="label">
        <span id="label-name"></span>
        <span id="label-info"></span>
    </div>
    <div id="year-display"></div>
    <div id="thumb-label"></div>
    <div id="ui">
        <div class="speed-label-wrap">
            <span class="lbl">Speed</span>
            <span class="lbl-sub">earth orbits / s</span>
        </div>
        <input type="range" id="speed" min="0" max="2" step="0.01" value="1">
    </div>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    } }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Renderer ──────────────────────────────────────────────────────────
    const threeCanvas   = document.getElementById('three');
    const overlayCanvas = document.getElementById('overlay');
    const oc = overlayCanvas.getContext('2d');

    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x05050f);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);

    const HOME_POS    = new THREE.Vector3(0, 42, 90);
    const HOME_TARGET = new THREE.Vector3(0,  0,  0);
    const HOME_DIST   = HOME_POS.length();
    camera.position.copy(HOME_POS);

    // ── Controls ──────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, threeCanvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.enablePan     = true;
    controls.panSpeed      = 0.6;
    controls.minDistance   = 8;
    controls.maxDistance   = 400;
    controls.rotateSpeed   = 0.55;
    controls.zoomSpeed     = 1.2;
    controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

    function resizeAll() {
        overlayCanvas.width  = window.innerWidth;
        overlayCanvas.height = window.innerHeight;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    overlayCanvas.width  = window.innerWidth;
    overlayCanvas.height = window.innerHeight;

    // ── Audio ─────────────────────────────────────────────────────────────
    let audioCtx = null;

    function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    // km_d → frequency: large body = deep, small = bright
    function playBell(km_d) {
        const ctx   = ensureAudio();
        const t0    = ctx.currentTime;
        const lo    = Math.log(2376),    hi = Math.log(1392700);
        const tVal  = Math.max(0, Math.min(1, (Math.log(Math.max(1, km_d)) - lo) / (hi - lo)));
        const freq  = 1800 - tVal * 1700;    // 100 Hz (Sun) … 1800 Hz (Pluto)
        const decay = 0.6  + tVal * 1.6;     // 0.6 s … 2.2 s

        const master = ctx.createGain();
        master.gain.value = 0.30;
        master.connect(ctx.destination);

        // Bell timbre: fundamental + inharmonic overtone + perfect fifth
        [{ ratio: 1.000, gain: 0.55 },
         { ratio: 2.756, gain: 0.25 },
         { ratio: 1.500, gain: 0.20 }].forEach(({ ratio, gain }) => {
            const osc = ctx.createOscillator();
            const env = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq * ratio;
            env.gain.setValueAtTime(0, t0);
            env.gain.linearRampToValueAtTime(gain, t0 + 0.004);
            env.gain.exponentialRampToValueAtTime(0.0001, t0 + decay);
            osc.connect(env);
            env.connect(master);
            osc.start(t0);
            osc.stop(t0 + decay + 0.05);
        });
    }

    // ── Planet data ───────────────────────────────────────────────────────
    const PLANETS = [
        { name: 'Merkur',  relR:  0.383, au:  0.387, period:   0.241, color: 0xb5b5b5, kmh: 172332, km_d:    4879 },
        { name: 'Venus',   relR:  0.949, au:  0.723, period:   0.615, color: 0xe8cda0, kmh: 126072, km_d:   12104 },
        { name: 'Erde',    relR:  1.000, au:  1.000, period:   1.000, color: 0x6b93d6, kmh: 107208, km_d:   12756 },
        { name: 'Mars',    relR:  0.532, au:  1.524, period:   1.881, color: 0xc04a1a, kmh:  86652, km_d:    6792 },
        { name: 'Jupiter', relR: 11.210, au:  5.203, period:  11.860, color: 0xc88b3a, kmh:  47052, km_d:  142984 },
        { name: 'Saturn',  relR:  9.450, au:  9.537, period:  29.460, color: 0xe4d191, kmh:  34884, km_d:  120536, rings: true },
        { name: 'Uranus',  relR:  4.010, au: 19.190, period:  84.010, color: 0xa0e8e8, kmh:  24516, km_d:   51118 },
        { name: 'Neptun',  relR:  3.880, au: 30.070, period: 164.800, color: 0x4b6cd4, kmh:  19548, km_d:   49528 },
        { name: 'Pluto',   relR:  0.186, au: 39.480, period: 247.940, color: 0x9a8d7a, kmh:  17100, km_d:    2376 },
    ];

    const K       = 0.42;
    const AU_MIN  = Math.pow(PLANETS[0].au, K);
    const AU_MAX  = Math.pow(PLANETS[PLANETS.length - 1].au, K);
    const ORB_MIN = 11, ORB_MAX = 52;
    const EARTH_R = 0.40;

    function orbitR(au) {
        return ORB_MIN + (Math.pow(au, K) - AU_MIN) / (AU_MAX - AU_MIN) * (ORB_MAX - ORB_MIN);
    }

    // ── Starfield ─────────────────────────────────────────────────────────
    {
        const pos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000; i++) {
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            const r  = 350 + Math.random() * 200;
            pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
            pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
            pos[i*3+2] = r * Math.cos(ph);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.28 })));
    }

    // ── Sun ───────────────────────────────────────────────────────────────
    const SUN_R = 10;
    const sunMesh = new THREE.Mesh(
        new THREE.SphereGeometry(SUN_R, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0xffaa20 })
    );
    scene.add(sunMesh);

    // ── Orbit rings ───────────────────────────────────────────────────────
    function makeRing(radius, parent, opacity) {
        const pts = [];
        for (let i = 0; i <= 256; i++) {
            const a = (i / 256) * Math.PI * 2;
            pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
        }
        const line = new THREE.LineLoop(
            new THREE.BufferGeometry().setFromPoints(pts),
            new THREE.LineBasicMaterial({ color: 0xffffff, opacity: opacity ?? 0.18, transparent: true })
        );
        (parent ?? scene).add(line);
    }

    // ── Planets ───────────────────────────────────────────────────────────
    const hitboxes = [];

    const sunHit = new THREE.Mesh(
        new THREE.SphereGeometry(SUN_R, 8, 8),
        new THREE.MeshBasicMaterial({ visible: false })
    );
    sunHit.userData.isSun = true;
    scene.add(sunHit);
    hitboxes.push(sunHit);

    const pivots = PLANETS.map((p, idx) => {
        const r   = Math.max(0.18, p.relR * EARTH_R);
        const orb = orbitR(p.au);

        makeRing(orb);

        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(r, 32, 32),
            new THREE.MeshBasicMaterial({ color: p.color })
        );
        mesh.position.x = orb;

        if (p.rings) {
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(r * 1.35, r * 2.3, 128),
                new THREE.MeshBasicMaterial({ color: 0xc8b87a, side: THREE.DoubleSide, transparent: true, opacity: 0.48 })
            );
            ring.rotation.x = -Math.PI / 2;
            mesh.add(ring);
        }

        const hit = new THREE.Mesh(
            new THREE.SphereGeometry(Math.max(1.2, r * 1.5), 8, 8),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        hit.position.x = orb;
        hit.userData.planetIndex = idx;
        hitboxes.push(hit);

        const pivot = new THREE.Group();
        pivot.add(mesh);
        pivot.add(hit);
        pivot.userData = { period: p.period, theta0: Math.random() * Math.PI * 2, mesh, dispR: r };
        scene.add(pivot);
        return pivot;
    });

    // ── Moon (orbits Earth) ───────────────────────────────────────────────
    const EARTH_DISP_R   = pivots[2].userData.dispR;
    const MOON_ORB_R     = EARTH_DISP_R * 4.5;
    const MOON_DISP_R    = Math.max(0.06, 0.272 * EARTH_DISP_R);
    const MOON_PERIOD    = 27.32 / 365.25;

    const earthMesh      = pivots[2].userData.mesh;
    const moonOrbitPivot = new THREE.Group();
    earthMesh.add(moonOrbitPivot);
    makeRing(MOON_ORB_R, moonOrbitPivot, 0.12);

    const moonMesh = new THREE.Mesh(
        new THREE.SphereGeometry(MOON_DISP_R, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xb8b8b8 })
    );
    moonMesh.position.x = MOON_ORB_R;
    moonOrbitPivot.add(moonMesh);

    const moonHit = new THREE.Mesh(
        new THREE.SphereGeometry(Math.max(0.35, MOON_DISP_R * 2), 8, 8),
        new THREE.MeshBasicMaterial({ visible: false })
    );
    moonHit.position.x = MOON_ORB_R;
    moonHit.userData.isMoon = true;
    moonOrbitPivot.add(moonHit);
    hitboxes.push(moonHit);

    const moonTheta0 = Math.random() * Math.PI * 2;

    // ── Focus state ───────────────────────────────────────────────────────
    let focused = null;
    let camAnim = null;

    const labelEl     = document.getElementById('label');
    const labelNameEl = document.getElementById('label-name');
    const labelInfoEl = document.getElementById('label-info');
    const yearEl      = document.getElementById('year-display');

    function easeIO(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function cleanEndAnimation() {
        const fp    = camera.position.clone();
        const ft    = controls.target.clone();
        const saved = controls.dampingFactor;
        controls.dampingFactor = 1.0;
        controls.update();
        controls.dampingFactor = saved;
        camera.position.copy(fp);
        controls.target.copy(ft);
        controls.enabled = true;
    }

    // Direction vector from current OrbitControls target toward camera (preserved on all moves)
    function camDirVec() {
        return camera.position.clone().sub(controls.target).normalize();
    }

    function goHome(dur = 1.0) {
        focused = null;
        labelEl.style.display = 'none';
        controls.minDistance  = 8;
        controls.enabled = false;
        // Keep current camera direction, just pull back to home distance
        const dir    = camDirVec();
        const toPos  = dir.multiplyScalar(HOME_DIST);
        camAnim = {
            from: { pos: camera.position.clone(), tgt: controls.target.clone() },
            to:   { pos: toPos,                   tgt: HOME_TARGET.clone() },
            t: 0, dur,
            onDone: cleanEndAnimation,
        };
    }

    function focusBody(mesh, dispR, name, infoHTML) {
        if (camAnim) return;
        const wp = new THREE.Vector3();
        mesh.getWorldPosition(wp);

        const tanHalfFov = Math.tan((camera.fov / 2) * Math.PI / 180);
        const shortHalf  = Math.min(window.innerWidth, window.innerHeight) / 2;
        const halfH      = window.innerHeight / 2;
        const focusDist  = Math.max(dispR * 1.5,
                               dispR * halfH / (0.70 * shortHalf * tanHalfFov));

        // Preserve current camera direction — only shift target and adjust distance
        const dir       = camDirVec();
        const camOffset = dir.multiplyScalar(focusDist);

        focused = { mesh, dispR, prevPos: wp.clone() };
        labelEl.style.display   = 'block';
        labelNameEl.textContent = name;
        labelInfoEl.innerHTML   = infoHTML;

        controls.enabled = false;
        camAnim = {
            from:       { pos: camera.position.clone(), tgt: controls.target.clone() },
            to:         { pos: wp.clone().add(camOffset), tgt: wp.clone() },
            camOffset, followMesh: mesh,
            t: 0, dur: 1.0,
            onDone: () => {
                controls.minDistance = Math.max(1.0, dispR * 1.4);
                cleanEndAnimation();
            },
        };
    }

    function fmtPeriod(y) {
        const opts = y < 1  ? { maximumFractionDigits: 3 }
                   : y < 10 ? { maximumFractionDigits: 2 }
                             : { maximumFractionDigits: 1 };
        return y.toLocaleString('de-DE', opts);
    }

    function focusPlanet(idx) {
        const p = PLANETS[idx];
        focusBody(
            pivots[idx].userData.mesh,
            pivots[idx].userData.dispR,
            p.name,
            p.km_d.toLocaleString('de-DE') + '&thinsp;km &#8960;<br>' +
            p.kmh.toLocaleString('de-DE')  + '&thinsp;km/h<br>' +
            fmtPeriod(p.period) + ' Erdenjahre'
        );
        if (focused) focused.planetIdx = idx;
    }

    function focusMoon() {
        focusBody(
            moonMesh,
            MOON_DISP_R,
            'Mond',
            '3.474&thinsp;km &#8960;<br>3.683&thinsp;km/h<br>27,32 Tage'
        );
    }

    function focusSun() {
        if (camAnim) return;
        const tanHalfFov   = Math.tan((camera.fov / 2) * Math.PI / 180);
        const shortHalf    = Math.min(window.innerWidth, window.innerHeight) / 2;
        const halfH        = window.innerHeight / 2;
        const sunFocusDist = Math.max(SUN_R * 1.4,
                                SUN_R * halfH / (0.50 * shortHalf * tanHalfFov));

        // Sun is at origin — move along current camera direction
        const dir     = camDirVec();
        const toPos   = dir.multiplyScalar(sunFocusDist);

        focused = { isSun: true };
        labelEl.style.display   = 'block';
        labelNameEl.textContent = 'Sonne';
        labelInfoEl.innerHTML   = '1.392.700&thinsp;km &#8960;<br>G2V Gelber Zwerg';

        controls.enabled = false;
        camAnim = {
            from: { pos: camera.position.clone(), tgt: controls.target.clone() },
            to:   { pos: toPos,                   tgt: HOME_TARGET.clone() },
            t: 0, dur: 1.0,
            onDone: () => {
                controls.minDistance = SUN_R * 1.3;
                cleanEndAnimation();
            },
        };
    }

    // ── Visual pulse feedback ─────────────────────────────────────────────
    let pulses = [];

    function triggerPulse(obj) {
        const wp = new THREE.Vector3();
        let dispR, r8, g8, b8;
        if (obj.userData.isSun) {
            wp.set(0, 0, 0); dispR = SUN_R;
            r8 = 255; g8 = 170; b8 = 32;
        } else if (obj.userData.isMoon) {
            moonMesh.getWorldPosition(wp); dispR = MOON_DISP_R;
            r8 = 184; g8 = 184; b8 = 184;
        } else {
            const idx = obj.userData.planetIndex;
            pivots[idx].userData.mesh.getWorldPosition(wp);
            dispR = pivots[idx].userData.dispR;
            const c = PLANETS[idx].color;
            r8 = (c >> 16) & 0xff; g8 = (c >> 8) & 0xff; b8 = c & 0xff;
        }
        const sp = wp.clone().project(camera);
        const sx = (sp.x + 1) / 2 * window.innerWidth;
        const sy = (1 - sp.y) / 2 * window.innerHeight;
        const dist    = camera.position.distanceTo(wp);
        const screenH = 2 * Math.tan((camera.fov * Math.PI / 180) / 2) * dist;
        const sr      = Math.max(10, (dispR / screenH) * window.innerHeight);
        pulses.push({ sx, sy, sr, t: 0, dur: 0.65, r8, g8, b8 });
    }

    // ── Tap ───────────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    let touchStart  = null;
    let touchDone   = false;

    function handleTap(cx, cy) {
        if (camAnim) return;
        raycaster.setFromCamera(
            new THREE.Vector2((cx / window.innerWidth) * 2 - 1,
                              -(cy / window.innerHeight) * 2 + 1),
            camera
        );
        const hits = raycaster.intersectObjects(hitboxes, false);

        if (!hits.length) { if (focused) goHome(); return; }

        const obj = hits[0].object;
        triggerPulse(obj);

        if (obj.userData.isSun) {
            playBell(1392700);
            if (focused && focused.isSun) goHome(); else focusSun();
        } else if (obj.userData.isMoon) {
            playBell(3474);
            if (focused && focused.mesh === moonMesh) goHome(); else focusMoon();
        } else {
            const idx = obj.userData.planetIndex;
            playBell(PLANETS[idx].km_d);
            if (focused && focused.planetIdx === idx) {
                goHome();
            } else {
                if (focused) { focused = null; labelEl.style.display = 'none'; controls.minDistance = 8; }
                focusPlanet(idx);
            }
        }
    }

    threeCanvas.addEventListener('touchstart', e => {
        if (e.touches.length === 1)
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
        else touchStart = null;
    }, { passive: true });

    threeCanvas.addEventListener('touchend', e => {
        if (!touchStart || e.changedTouches.length !== 1) { touchStart = null; return; }
        const t = e.changedTouches[0];
        if (Math.hypot(t.clientX - touchStart.x, t.clientY - touchStart.y) < 12
            && Date.now() - touchStart.t < 300) {
            touchDone = true;
            handleTap(t.clientX, t.clientY);
            setTimeout(() => { touchDone = false; }, 400);
        }
        touchStart = null;
    });

    threeCanvas.addEventListener('click', e => { if (!touchDone) handleTap(e.clientX, e.clientY); });

    // ── Speed slider ──────────────────────────────────────────────────────
    const DAYS_PER_FRAME = 15;
    const START_YEAR     = 2026;
    let targetSpeedMult  = 1;
    let speedMult        = 1;
    const SPEED_LERP     = 0.04;

    const speedEl  = document.getElementById('speed');
    const thumbLbl = document.getElementById('thumb-label');
    let sliderDrag = false;

    function fmtMult(v) {
        return v.toFixed(1).replace('.', ',') + ' ×';
    }

    function updateThumbLabel() {
        const rect    = speedEl.getBoundingClientRect();
        const val     = +speedEl.value;
        const thumbCX = rect.left + 11 + (val / 2) * (rect.width - 22);
        thumbLbl.style.left = Math.round(thumbCX) + 'px';
        thumbLbl.style.top  = Math.round(rect.top - 30) + 'px';
        thumbLbl.textContent = fmtMult(val);
    }

    speedEl.addEventListener('mousedown',  () => { sliderDrag = true;  thumbLbl.style.display = 'block'; updateThumbLabel(); });
    speedEl.addEventListener('touchstart', () => { sliderDrag = true;  thumbLbl.style.display = 'block'; updateThumbLabel(); }, { passive: true });
    window.addEventListener('mouseup',     () => { if (sliderDrag) { sliderDrag = false; thumbLbl.style.display = 'none'; } });
    window.addEventListener('touchend',    () => { if (sliderDrag) { sliderDrag = false; thumbLbl.style.display = 'none'; } });
    speedEl.addEventListener('input', e => {
        targetSpeedMult = +e.target.value;
        if (sliderDrag) updateThumbLabel();
    });

    // ── Overlay: label connector + pulse effects ──────────────────────────
    function drawOverlay(dt) {
        oc.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (focused) {
            const wp = new THREE.Vector3();
            if (!focused.isSun) focused.mesh.getWorldPosition(wp);
            const subjR = focused.isSun ? SUN_R : focused.dispR;

            const sp  = wp.clone().project(camera);
            const sx  = (sp.x + 1) / 2 * window.innerWidth;
            const sy  = (1 - sp.y) / 2 * window.innerHeight;

            const dist    = camera.position.distanceTo(wp);
            const screenH = 2 * Math.tan((camera.fov * Math.PI / 180) / 2) * dist;
            const sr      = Math.max(4, (subjR / screenH) * window.innerHeight);

            const lw = labelEl.offsetWidth  || 80;
            const lh = labelEl.offsetHeight || 30;
            const margin = 16;
            const W = window.innerWidth, H = window.innerHeight;
            const isLandscape = W > H;

            let lx, ly, ex, ey, lcx, lcy;
            if (isLandscape) {
                const goLeft = sx > W * 0.62;
                lx   = goLeft ? sx - sr - margin - lw : sx + sr + margin;
                ly   = Math.max(8, Math.min(H - lh - 8, sy - lh / 2));
                lx   = Math.max(8, Math.min(W - lw - 8, lx));
                ex   = goLeft ? sx - sr - 2 : sx + sr + 2;
                ey   = sy;
                lcx  = goLeft ? lx + lw + 4 : lx - 4;
                lcy  = ly + lh / 2;
            } else {
                lx   = Math.max(8, Math.min(W - lw - 8, sx - lw / 2));
                ly   = Math.min(H - lh - 8, sy + sr + margin);
                ex   = sx;
                ey   = sy + sr + 2;
                lcx  = lx + lw / 2;
                lcy  = ly;
            }

            labelEl.style.left = Math.round(lx) + 'px';
            labelEl.style.top  = Math.round(ly) + 'px';

            if (Math.hypot(lcx - ex, lcy - ey) > 4) {
                oc.beginPath();
                oc.moveTo(ex, ey);
                oc.lineTo(lcx, lcy);
                oc.strokeStyle = 'rgba(255,255,255,0.45)';
                oc.lineWidth   = 0.9;
                oc.stroke();
            }
            oc.beginPath();
            oc.arc(ex, ey, 2, 0, Math.PI * 2);
            oc.fillStyle = 'rgba(255,255,255,0.7)';
            oc.fill();
        }

        // Expanding glow rings on tap
        pulses = pulses.filter(p => {
            p.t = Math.min(1, p.t + dt / p.dur);
            const scale = 1 + p.t * 2.5;
            const alpha = (1 - p.t) * 0.72;
            const r     = p.sr * scale;
            const grad  = oc.createRadialGradient(p.sx, p.sy, r * 0.15, p.sx, p.sy, r);
            grad.addColorStop(0, `rgba(${p.r8},${p.g8},${p.b8},${alpha.toFixed(3)})`);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            oc.beginPath();
            oc.arc(p.sx, p.sy, r, 0, Math.PI * 2);
            oc.fillStyle = grad;
            oc.fill();
            return p.t < 1;
        });
    }

    // ── Animation loop ────────────────────────────────────────────────────
    const START_YEAR_CONST = START_YEAR;
    yearEl.textContent = String(START_YEAR_CONST);
    let lastYear = START_YEAR_CONST;
    let gameTime = 0;
    let lastTime = performance.now();

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const dt  = Math.min((now - lastTime) / 1000, 0.05);
        lastTime  = now;

        if (Math.abs(speedMult - targetSpeedMult) > 0.001)
            speedMult += (targetSpeedMult - speedMult) * SPEED_LERP;
        else
            speedMult = targetSpeedMult;

        gameTime += DAYS_PER_FRAME * speedMult;

        pivots.forEach(pv => {
            pv.rotation.y = pv.userData.theta0
                + (gameTime / (pv.userData.period * 365.25)) * Math.PI * 2;
        });

        moonOrbitPivot.rotation.y = moonTheta0
            + (gameTime / (MOON_PERIOD * 365.25)) * Math.PI * 2;

        const year = Math.floor(START_YEAR_CONST + gameTime / 365.25);
        if (year !== lastYear) {
            lastYear = year;
            yearEl.textContent = String(year);
            yearEl.classList.remove('year-pop');
            void yearEl.offsetWidth; // restart animation
            yearEl.classList.add('year-pop');
        }

        if (camAnim) {
            camAnim.t = Math.min(1, camAnim.t + dt / camAnim.dur);
            const t   = easeIO(camAnim.t);

            if (camAnim.followMesh) {
                const wp    = new THREE.Vector3();
                camAnim.followMesh.getWorldPosition(wp);
                const delta = wp.clone().sub(camAnim.to.tgt);
                camAnim.from.pos.add(delta);
                camAnim.to.pos.add(delta);
                camAnim.to.tgt.copy(wp);
            }

            camera.position.lerpVectors(camAnim.from.pos, camAnim.to.pos, t);
            controls.target.lerpVectors(camAnim.from.tgt, camAnim.to.tgt, t);

            if (camAnim.t >= 1) {
                camera.position.copy(camAnim.to.pos);
                controls.target.copy(camAnim.to.tgt);
                const done = camAnim.onDone;
                camAnim = null;
                if (done) done();
            }
        } else {
            if (focused && !focused.isSun) {
                const wp    = new THREE.Vector3();
                focused.mesh.getWorldPosition(wp);
                const delta = wp.clone().sub(focused.prevPos);
                camera.position.add(delta);
                controls.target.copy(wp);
                focused.prevPos.copy(wp);
            }
            controls.update();
        }

        drawOverlay(dt);
        renderer.render(scene, camera);
    }

    animate();
    window.addEventListener('resize', resizeAll);
    </script>
</body>
