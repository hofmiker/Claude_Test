<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonnensystem 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05050f; overflow: hidden; }
        #three   { position: fixed; top: 0; left: 0; touch-action: none; z-index: 1; }
        #overlay { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 5; }

        #label {
            position: fixed; display: none; pointer-events: none; z-index: 10;
            font-family: -apple-system, Helvetica, sans-serif;
        }
        #label-name {
            display: block;
            color: rgba(255,255,255,0.92);
            font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
        }
        #label-info {
            display: block;
            color: rgba(255,255,255,0.50);
            font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
            margin-top: 5px; line-height: 1.7;
        }

        #ui {
            position: fixed; bottom: 36px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 18px; z-index: 20;
        }
        #time-label {
            position: fixed; bottom: 72px; left: 50%;
            transform: translateX(-50%);
            opacity: 0; transition: opacity 0.15s; z-index: 20; pointer-events: none;
        }
        .lbl {
            color: rgba(255,255,255,0.38);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 10px; letter-spacing: 0.14em;
            text-transform: uppercase; white-space: nowrap;
        }
        #speed {
            width: 220px; height: 2px; cursor: pointer;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.2); border-radius: 1px; outline: none;
        }
        #speed::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            border-radius: 50%; background: rgba(255,255,255,0.9);
            box-shadow: 0 0 10px rgba(255,255,255,0.35);
        }
        #speed::-moz-range-thumb {
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,0.9); border: none;
        }
    </style>
</head>
<body>
    <canvas id="three"></canvas>
    <canvas id="overlay"></canvas>
    <div id="label">
        <span id="label-name"></span>
        <span id="label-info"></span>
    </div>
    <span id="time-label" class="lbl"></span>
    <div id="ui">
        <span class="lbl">Pause</span>
        <input type="range" id="speed" min="0" max="2" step="0.01" value="1">
    </div>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    } }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Renderer ──────────────────────────────────────────────────────────
    const threeCanvas   = document.getElementById('three');
    const overlayCanvas = document.getElementById('overlay');
    const oc = overlayCanvas.getContext('2d');

    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x05050f);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);

    // ── Home position (tap sun → return here) ─────────────────────────────
    const HOME_POS    = new THREE.Vector3(0, 42, 90);
    const HOME_TARGET = new THREE.Vector3(0,  0,  0);
    camera.position.copy(HOME_POS);

    // ── Controls ──────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, threeCanvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.enablePan     = true;
    controls.panSpeed      = 0.6;
    controls.minDistance   = 8;
    controls.maxDistance   = 400;
    controls.rotateSpeed   = 0.55;
    controls.zoomSpeed     = 1.2;
    controls.touches = {
        ONE: THREE.TOUCH.ROTATE,
        TWO: THREE.TOUCH.DOLLY_PAN,
    };

    function resizeAll() {
        overlayCanvas.width  = window.innerWidth;
        overlayCanvas.height = window.innerHeight;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    overlayCanvas.width  = window.innerWidth;
    overlayCanvas.height = window.innerHeight;

    // ── Planet data ───────────────────────────────────────────────────────
    // kmh: mean orbital velocity in km/h (real values)
    const PLANETS = [
        { name: 'Merkur',  relR:  0.383, au:  0.387, period:   0.241, color: 0xb5b5b5, kmh: 172332 },
        { name: 'Venus',   relR:  0.949, au:  0.723, period:   0.615, color: 0xe8cda0, kmh: 126072 },
        { name: 'Erde',    relR:  1.000, au:  1.000, period:   1.000, color: 0x6b93d6, kmh: 107208 },
        { name: 'Mars',    relR:  0.532, au:  1.524, period:   1.881, color: 0xc04a1a, kmh:  86652 },
        { name: 'Jupiter', relR: 11.210, au:  5.203, period:  11.860, color: 0xc88b3a, kmh:  47052 },
        { name: 'Saturn',  relR:  9.450, au:  9.537, period:  29.460, color: 0xe4d191, kmh:  34884, rings: true },
        { name: 'Uranus',  relR:  4.010, au: 19.190, period:  84.010, color: 0xa0e8e8, kmh:  24516 },
        { name: 'Neptun',  relR:  3.880, au: 30.070, period: 164.800, color: 0x4b6cd4, kmh:  19548 },
    ];

    const K       = 0.42;
    const AU_MIN  = Math.pow(PLANETS[0].au, K);
    const AU_MAX  = Math.pow(PLANETS[PLANETS.length - 1].au, K);
    const ORB_MIN = 15, ORB_MAX = 65;
    const EARTH_R = 0.40;

    function orbitR(au) {
        return ORB_MIN + (Math.pow(au, K) - AU_MIN) / (AU_MAX - AU_MIN) * (ORB_MAX - ORB_MIN);
    }

    function fmtPeriod(y) {
        const opts = y < 1   ? { maximumFractionDigits: 3 }
                   : y < 10  ? { maximumFractionDigits: 2 }
                              : { maximumFractionDigits: 1 };
        return y.toLocaleString('de-DE', opts);
    }

    // ── Starfield ─────────────────────────────────────────────────────────
    {
        const pos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000; i++) {
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            const r  = 280 + Math.random() * 220;
            pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
            pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
            pos[i*3+2] = r * Math.cos(ph);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.28 })));
    }

    // ── Sun ───────────────────────────────────────────────────────────────
    scene.add(new THREE.Mesh(
        new THREE.SphereGeometry(10, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0xffaa20 })
    ));

    // ── Orbit rings ───────────────────────────────────────────────────────
    function addOrbitRing(radius) {
        const pts = [];
        for (let i = 0; i <= 256; i++) {
            const a = (i / 256) * Math.PI * 2;
            pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
        }
        scene.add(new THREE.LineLoop(
            new THREE.BufferGeometry().setFromPoints(pts),
            new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.18, transparent: true })
        ));
    }

    // ── Planets ───────────────────────────────────────────────────────────
    const hitboxes = [];

    // Sun hitbox — tap returns to home view
    const sunHit = new THREE.Mesh(
        new THREE.SphereGeometry(10, 8, 8),
        new THREE.MeshBasicMaterial({ visible: false })
    );
    sunHit.userData.isSun = true;
    scene.add(sunHit);
    hitboxes.push(sunHit);

    const pivots = PLANETS.map((p, idx) => {
        const r   = Math.max(0.18, p.relR * EARTH_R);
        const orb = orbitR(p.au);

        addOrbitRing(orb);

        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(r, 32, 32),
            new THREE.MeshBasicMaterial({ color: p.color })
        );
        mesh.position.x = orb;

        if (p.rings) {
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(r * 1.35, r * 2.3, 128),
                new THREE.MeshBasicMaterial({
                    color: 0xc8b87a, side: THREE.DoubleSide, transparent: true, opacity: 0.48
                })
            );
            ring.rotation.x = -Math.PI / 2;
            mesh.add(ring);
        }

        // Enlarged invisible hitbox — easier to tap small planets
        const hit = new THREE.Mesh(
            new THREE.SphereGeometry(Math.max(1.2, r * 1.5), 8, 8),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        hit.position.x = orb;
        hit.userData.planetIndex = idx;
        hitboxes.push(hit);

        const pivot = new THREE.Group();
        pivot.add(mesh);
        pivot.add(hit);
        pivot.userData = { period: p.period, theta0: Math.random() * Math.PI * 2, mesh, dispR: r };
        scene.add(pivot);
        return pivot;
    });

    // ── Focus / home ──────────────────────────────────────────────────────
    let focused = null;   // { idx, mesh, dispR, prevPos }
    let camAnim = null;   // { from, to, camOffset?, followMesh?, t, dur, onDone? }

    const labelEl     = document.getElementById('label');
    const labelNameEl = document.getElementById('label-name');
    const labelInfoEl = document.getElementById('label-info');

    function easeIO(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

    // Flush OrbitControls' internal damping velocity so re-enabling never jumps
    function zeroControlsVelocity() {
        controls.enableDamping = false;
        controls.update();
        controls.enableDamping = true;
    }

    function goHome(dur = 1.0) {
        focused = null;
        labelEl.style.display = 'none';
        controls.minDistance  = 8;
        zeroControlsVelocity();
        controls.enabled = false;
        camAnim = {
            from: { pos: camera.position.clone(), tgt: controls.target.clone() },
            to:   { pos: HOME_POS.clone(),        tgt: HOME_TARGET.clone() },
            t: 0, dur,
            onDone: () => { zeroControlsVelocity(); controls.enabled = true; },
        };
    }

    function focusPlanet(idx) {
        if (camAnim) return;
        const { mesh, dispR } = pivots[idx].userData;
        const wp = new THREE.Vector3();
        mesh.getWorldPosition(wp);

        // Distance so planet fills ~78 % of the short screen side
        const tanHalfFov = Math.tan((camera.fov / 2) * Math.PI / 180);
        const shortHalf  = Math.min(window.innerWidth, window.innerHeight) / 2;
        const halfH      = window.innerHeight / 2;
        const focusDist  = Math.max(dispR * 1.6,
                               dispR * halfH / (0.39 * shortHalf * tanHalfFov));

        // Approach from current view direction; shift target up → planet sits lower,
        // leaving headroom above for the label
        const targetShift = dispR * 0.4;
        const camOffset   = camera.position.clone().sub(wp).normalize().multiplyScalar(focusDist);
        const adjustedTgt = wp.clone(); adjustedTgt.y += targetShift;

        const p = PLANETS[idx];
        focused = { idx, mesh, dispR, prevPos: wp.clone(), targetShift };
        labelEl.style.display   = 'block';
        labelNameEl.textContent = p.name;
        labelInfoEl.innerHTML   =
            p.kmh.toLocaleString('de-DE') + '&thinsp;km/h<br>' +
            fmtPeriod(p.period) + ' Erdenjahre';

        zeroControlsVelocity();
        controls.enabled = false;
        camAnim = {
            from:       { pos: camera.position.clone(), tgt: controls.target.clone() },
            to:         { pos: wp.clone().add(camOffset), tgt: adjustedTgt.clone() },
            camOffset, targetShift,
            followMesh: mesh,
            t: 0, dur: 1.2,
            onDone: () => {
                controls.minDistance = Math.max(1.0, dispR * 1.4);
                zeroControlsVelocity();
                controls.enabled = true;
            },
        };
    }

    // ── Tap ───────────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    let touchStart  = null;
    let touchDone   = false;

    function handleTap(cx, cy) {
        if (camAnim) return;
        raycaster.setFromCamera(
            new THREE.Vector2((cx / window.innerWidth)  * 2 - 1,
                              -(cy / window.innerHeight) * 2 + 1),
            camera
        );
        const hits = raycaster.intersectObjects(hitboxes, false);

        if (!hits.length) {
            if (focused) goHome();
            return;
        }

        const obj = hits[0].object;
        if (obj.userData.isSun) {
            goHome();
        } else {
            const idx = obj.userData.planetIndex;
            if (focused && focused.idx === idx) {
                goHome();           // tap same planet again → release & home
            } else {
                if (focused) {
                    focused = null;
                    labelEl.style.display = 'none';
                    controls.minDistance  = 8;
                }
                focusPlanet(idx);   // tap different planet → focus it
            }
        }
    }

    threeCanvas.addEventListener('touchstart', e => {
        if (e.touches.length === 1)
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
        else touchStart = null;
    }, { passive: true });

    threeCanvas.addEventListener('touchend', e => {
        if (!touchStart || e.changedTouches.length !== 1) { touchStart = null; return; }
        const t = e.changedTouches[0];
        if (Math.hypot(t.clientX - touchStart.x, t.clientY - touchStart.y) < 12
            && Date.now() - touchStart.t < 300) {
            touchDone = true;
            handleTap(t.clientX, t.clientY);
            setTimeout(() => { touchDone = false; }, 400);
        }
        touchStart = null;
    });

    threeCanvas.addEventListener('click', e => { if (!touchDone) handleTap(e.clientX, e.clientY); });

    // ── Speed slider with inertia ─────────────────────────────────────────
    // speedMult lerps toward targetSpeedMult at SPEED_LERP per frame
    // → gradual onset / decay when slider is moved
    const DAYS_PER_FRAME = 15;
    let targetSpeedMult = 1;
    let speedMult       = 1;
    const SPEED_LERP    = 0.04;   // ~1 s to reach new target

    const speedEl = document.getElementById('speed');
    const timeLbl = document.getElementById('time-label');
    let sliderDrag = false;

    function fmtYPS(m) {
        const y = (DAYS_PER_FRAME * m * 60) / 365.25;
        if (y < 0.005) return '0 Erdenjahre / s';
        return (y < 1 ? y.toFixed(2) : y.toFixed(1)) + ' Erdenjahre / s';
    }

    speedEl.addEventListener('mousedown',  () => { sliderDrag = true;  timeLbl.style.opacity = '1'; });
    speedEl.addEventListener('touchstart', () => { sliderDrag = true;  timeLbl.style.opacity = '1'; }, { passive: true });
    window .addEventListener('mouseup',    () => { if (sliderDrag) { sliderDrag = false; timeLbl.style.opacity = '0'; } });
    window .addEventListener('touchend',   () => { if (sliderDrag) { sliderDrag = false; timeLbl.style.opacity = '0'; } });
    speedEl.addEventListener('input', e => {
        targetSpeedMult = +e.target.value;
        timeLbl.textContent = fmtYPS(targetSpeedMult);
    });

    // ── Label + line overlay ──────────────────────────────────────────────
    function updateLabel() {
        oc.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (!focused) return;

        const wp = new THREE.Vector3();
        focused.mesh.getWorldPosition(wp);
        const sp  = wp.clone().project(camera);
        const sx  = (sp.x + 1) / 2 * window.innerWidth;
        const sy  = (1 - sp.y) / 2 * window.innerHeight;

        // Screen-space radius
        const dist    = camera.position.distanceTo(wp);
        const screenH = 2 * Math.tan((camera.fov * Math.PI / 180) / 2) * dist;
        const sr      = Math.max(4, (focused.dispR / screenH) * window.innerHeight);

        // Label above the planet, horizontally centred, clamped to screen edges
        const lw     = labelEl.offsetWidth  || 80;
        const lh     = labelEl.offsetHeight || 30;
        const margin = 14;
        const lx     = Math.max(8, Math.min(window.innerWidth  - lw - 8, sx - lw / 2));
        const ly     = Math.max(8, sy - sr - margin - lh);

        labelEl.style.left = Math.round(lx) + 'px';
        labelEl.style.top  = Math.round(ly) + 'px';

        // Connector: from planet top edge → label bottom centre
        const lcx = lx + lw / 2;
        const lcy = ly + lh;
        const ex  = sx;
        const ey  = sy - sr - 2;

        if (Math.hypot(lcx - ex, lcy - ey) > 4) {
            oc.beginPath();
            oc.moveTo(ex, ey);
            oc.lineTo(lcx, lcy);
            oc.strokeStyle = 'rgba(255,255,255,0.45)';
            oc.lineWidth   = 0.9;
            oc.stroke();
        }

        oc.beginPath();
        oc.arc(ex, ey, 2, 0, Math.PI * 2);
        oc.fillStyle = 'rgba(255,255,255,0.7)';
        oc.fill();
    }

    // ── Animation loop ────────────────────────────────────────────────────
    let gameTime = 0;

    function animate() {
        requestAnimationFrame(animate);

        // Speed inertia: lerp toward target, snap when close
        if (Math.abs(speedMult - targetSpeedMult) > 0.001) {
            speedMult += (targetSpeedMult - speedMult) * SPEED_LERP;
        } else {
            speedMult = targetSpeedMult;
        }

        gameTime += DAYS_PER_FRAME * speedMult;

        pivots.forEach(pv => {
            pv.rotation.y = pv.userData.theta0
                + (gameTime / (pv.userData.period * 365.25)) * Math.PI * 2;
        });

        if (camAnim) {
            camAnim.t = Math.min(1, camAnim.t + 0.016 / camAnim.dur);
            const t  = easeIO(camAnim.t);

            // Re-anchor to planet's live position during focus zoom
            if (camAnim.followMesh) {
                const wp = new THREE.Vector3();
                camAnim.followMesh.getWorldPosition(wp);
                const adjTgt = wp.clone(); adjTgt.y += (camAnim.targetShift || 0);
                camAnim.to.tgt.copy(adjTgt);
                camAnim.to.pos.copy(wp).add(camAnim.camOffset);
            }

            camera.position.lerpVectors(camAnim.from.pos, camAnim.to.pos, t);
            controls.target.lerpVectors(camAnim.from.tgt, camAnim.to.tgt, t);

            if (camAnim.t >= 1) {
                // Snap to exact destination, then cleanly re-enable controls
                camera.position.copy(camAnim.to.pos);
                controls.target.copy(camAnim.to.tgt);
                const done = camAnim.onDone;
                camAnim = null;
                if (done) done();
            }
        } else {
            // While focused: camera tracks planet; 1-finger drag orbits around it
            if (focused) {
                const wp = new THREE.Vector3();
                focused.mesh.getWorldPosition(wp);
                const delta = wp.clone().sub(focused.prevPos);
                camera.position.add(delta);
                const tgt = wp.clone(); tgt.y += focused.targetShift;
                controls.target.copy(tgt);
                focused.prevPos.copy(wp);
            }
            controls.update();
        }

        updateLabel();
        renderer.render(scene, camera);
    }

    animate();
    window.addEventListener('resize', resizeAll);
    </script>
</body>
</html>
