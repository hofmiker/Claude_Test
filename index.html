<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 3rem;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #text {
            position: relative;
            display: flex;
            gap: 2px;
            z-index: 1;
        }
        .letter {
            display: inline-block;
            transition: transform 0.18s ease-out, color 0.18s ease-out;
            cursor: default;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="text"></div>

    <script>
        /* --- Shared color formula ---
           energy 0 = at rest → black
           energy 1 = max displaced → deep blue-violet
           Used identically for letters and particles.                    */
        function colorFromEnergy(e) {
            const hue   = Math.round(e * 260);
            const sat   = Math.round(e * 82);
            const light = Math.round(e * 44);
            return `hsl(${hue}, ${sat}%, ${light}%)`;
        }

        /* --- Letters --- */
        const word = "Hallo";
        const container = document.getElementById("text");
        word.split("").forEach(char => {
            const span = document.createElement("span");
            span.className = "letter";
            span.textContent = char;
            container.appendChild(span);
        });
        const letters = document.querySelectorAll(".letter");

        const LETTER_RADIUS   = 130;
        const LETTER_STRENGTH = 75;
        const SHORT_SIDE      = Math.min(window.innerWidth, window.innerHeight);
        const POINTER_RADIUS  = SHORT_SIDE * 0.28;
        const POINTER_FORCE   = 5.5;

        let pointerX = -9999, pointerY = -9999;

        function getLetterCenters() {
            return Array.from(letters).map(l => {
                const r = l.getBoundingClientRect();
                return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
            });
        }

        function reactLetters(x, y) {
            letters.forEach(letter => {
                const rect = letter.getBoundingClientRect();
                const cx   = rect.left + rect.width  / 2;
                const cy   = rect.top  + rect.height / 2;
                const dx   = cx - x;
                const dy   = cy - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < LETTER_RADIUS) {
                    const e     = 1 - dist / LETTER_RADIUS;
                    const force = e * LETTER_STRENGTH;
                    const angle = Math.atan2(dy, dx);
                    const tx    = Math.cos(angle) * force;
                    const ty    = Math.sin(angle) * force;
                    const scale = 1 + e * 0.4;
                    letter.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                    letter.style.color     = colorFromEnergy(e);
                } else {
                    letter.style.transform = "";
                    letter.style.color     = "";
                }
            });
        }

        function resetLetters() {
            letters.forEach(l => { l.style.transform = ""; l.style.color = ""; });
        }

        document.addEventListener("mousemove", e => {
            pointerX = e.clientX; pointerY = e.clientY;
            reactLetters(pointerX, pointerY);
        });
        document.addEventListener("mouseleave", () => {
            pointerX = -9999; pointerY = -9999;
            resetLetters();
        });
        document.addEventListener("touchmove", e => {
            e.preventDefault();
            const t = e.touches[0];
            pointerX = t.clientX; pointerY = t.clientY;
            reactLetters(pointerX, pointerY);
        }, { passive: false });
        document.addEventListener("touchend", () => {
            pointerX = -9999; pointerY = -9999;
            resetLetters();
        });

        /* --- Particles --- */
        const canvas = document.getElementById("canvas");
        const ctx    = canvas.getContext("2d");
        const NUM    = 120;

        /* max expected displacement for color scaling */
        const MAX_DISP = SHORT_SIDE * 0.55;

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        class Particle {
            constructor(index) {
                this.letterIndex = index % letters.length;
                /* spread: varied radius 10–90 px, angle based on index for even coverage */
                const baseAngle  = (index / NUM) * Math.PI * 2;
                const jitter     = (Math.random() - 0.5) * 1.2;
                const spreadDist = Math.pow(Math.random(), 0.6) * 80 + 10;
                this.offsetX = Math.cos(baseAngle + jitter) * spreadDist;
                this.offsetY = Math.sin(baseAngle + jitter) * spreadDist;
                /* start scattered */
                this.x  = Math.random() * window.innerWidth;
                this.y  = Math.random() * window.innerHeight;
                this.vx = 0;
                this.vy = 0;
                this.r      = Math.random() * 2.2 + 1;
                this.energy = 0;
            }

            update() {
                const centers = getLetterCenters();
                const lc      = centers[this.letterIndex] || centers[0];
                const homeX   = lc.x + this.offsetX;
                const homeY   = lc.y + this.offsetY;

                /* weak spring toward home */
                const hx = homeX - this.x;
                const hy = homeY - this.y;
                this.vx += hx * 0.005;
                this.vy += hy * 0.005;

                /* pointer repulsion */
                const dpx = this.x - pointerX;
                const dpy = this.y - pointerY;
                const dp  = Math.sqrt(dpx * dpx + dpy * dpy);
                if (dp < POINTER_RADIUS && dp > 0) {
                    const f = (1 - dp / POINTER_RADIUS) * POINTER_FORCE;
                    this.vx += (dpx / dp) * f;
                    this.vy += (dpy / dp) * f;
                }

                /* damping — gentle slowdown */
                this.vx *= 0.92;
                this.vy *= 0.92;

                this.x += this.vx;
                this.y += this.vy;

                /* bounce off screen edges */
                const m = this.r;
                if (this.x < m)                   { this.x = m;                   this.vx *= -0.55; }
                if (this.x > canvas.width  - m)   { this.x = canvas.width  - m;   this.vx *= -0.55; }
                if (this.y < m)                   { this.y = m;                   this.vy *= -0.55; }
                if (this.y > canvas.height - m)   { this.y = canvas.height - m;   this.vy *= -0.55; }

                /* energy = how far from home, scaled to [0,1] */
                const homeDist    = Math.sqrt(hx * hx + hy * hy);
                const targetEnergy = Math.min(1, homeDist / MAX_DISP);
                this.energy += (targetEnergy - this.energy) * 0.07;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = colorFromEnergy(this.energy);
                ctx.fill();
            }
        }

        const particles = [];
        for (let i = 0; i < NUM; i++) particles.push(new Particle(i));

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
