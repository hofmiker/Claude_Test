<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Spaceshuttle – Explosion</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 30%, #10131e 0%, #020204 70%);
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    color: #eef1f8;
  }
  canvas { display: block; touch-action: none; }

  #deploy-time {
    position: fixed; top: 18px; right: 18px; z-index: 10;
    font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase;
    color: rgba(255,255,255,0.30);
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    pointer-events: none;
  }

  #sceneTabs {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    z-index: 12; display: flex; gap: 4px; max-width: calc(100vw - 120px);
    overflow-x: auto; scrollbar-width: none;
    background: rgba(18, 20, 32, 0.55);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 999px;
    padding: 5px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  #sceneTabs::-webkit-scrollbar { display: none; }
  #sceneTabs a {
    text-decoration: none; white-space: nowrap; flex-shrink: 0;
    color: rgba(255,255,255,0.55);
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.02em;
    padding: 8px 16px;
    border-radius: 999px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  #sceneTabs a:hover { color: #fff; background: rgba(255,255,255,0.08); }
  #sceneTabs a.active {
    color: #0a0b12;
    background: linear-gradient(90deg, #6ea8ff, #b98bff);
  }

  #infoBtn {
    position: fixed; top: 18px; left: 18px; z-index: 11;
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(18, 20, 32, 0.55);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    color: #fff; font-size: 1.1rem; font-style: italic; font-family: Georgia, serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  #infoBtn:hover { background: rgba(255,255,255,0.18); }
  #infoBtn:active { transform: scale(0.92); }

  #hud {
    position: fixed; top: 18px; left: 66px; z-index: 10;
    max-width: min(360px, calc(100vw - 100px));
    background: rgba(18, 20, 32, 0.55);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    opacity: 0; transform: translateX(-8px);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  #hud.open {
    opacity: 1; transform: translateX(0);
    pointer-events: auto;
  }
  #hud h1 {
    margin: 0 0 4px 0; font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em;
  }
  #hud p {
    margin: 0; font-size: 0.82rem; opacity: 0.75;
  }

  #panel {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    width: min(720px, 92vw);
    background: rgba(18, 20, 32, 0.55);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 18px;
    padding: 14px 18px 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    z-index: 10;
  }

  #panelTop {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }

  .iconBtn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: #fff; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .iconBtn:hover { background: rgba(255,255,255,0.18); }
  .iconBtn:active { transform: scale(0.92); }

  #timeSlider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 4px;
    background: linear-gradient(90deg, #ff9a5a 0%, #ff5a5a var(--fill, 0%), rgba(255,255,255,0.15) var(--fill, 0%));
    outline: none;
    cursor: pointer;
  }
  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(255, 138, 90, 0.35), 0 2px 6px rgba(0,0,0,0.5);
    cursor: grab;
  }
  #timeSlider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; border: none;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(255, 138, 90, 0.35), 0 2px 6px rgba(0,0,0,0.5);
    cursor: grab;
  }

  #panelBottom {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.78rem; opacity: 0.85; padding: 0 2px;
  }
  #stateLabel { font-weight: 600; letter-spacing: 0.02em; }
  #pctLabel { font-variant-numeric: tabular-nums; opacity: 0.7; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem; opacity: 0.6; z-index: 20; transition: opacity 0.4s ease;
  }
</style>
</head>
<body>

<div id="deploy-time">v2.0&thinsp;|&thinsp;17.07.2026</div>
<nav id="sceneTabs">
  <a href="./index.html">🌸 Blumenvase</a>
  <a href="./shuttle.html" class="active">🚀 Spaceshuttle</a>
</nav>
<button id="infoBtn" title="Info" aria-label="Info">i</button>
<div id="hud">
  <h1>🚀 3D Spaceshuttle — Explosion</h1>
  <p>Explodiert mit Feuer &amp; Rauch. Regler unten: durch die Zeit scrollen, vor &amp; zurück. Maus / Finger auf der Szene: Kamera drehen &amp; zoomen.</p>
</div>

<div id="loading">Lade Szene …</div>

<div id="panel">
  <div id="panelTop">
    <button id="playBtn" class="iconBtn" title="Abspielen / Pause">▶</button>
    <input id="timeSlider" type="range" min="0" max="1000" value="0" step="1" />
    <button id="resetBtn" class="iconBtn" title="Zurücksetzen">⟲</button>
  </div>
  <div id="panelBottom">
    <span id="stateLabel">Intakt</span>
    <span id="pctLabel">0%</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/build/three.module.js",
    "three/addons/": "./vendor/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// ---------- helpers ----------
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const smoothstep = (t) => { t = clamp(t, 0, 1); return t * t * (3 - 2 * t); };
// explosion motion: very high initial acceleration, then rapid deceleration
const easeOutBlast = (t) => { t = clamp(t, 0, 1); return 1 - Math.pow(1 - t, 4); };
const lerp = (a, b, t) => a + (b - a) * t;

function weightedPick(items) {
  let total = 0;
  for (const it of items) total += it.weight;
  let r = Math.random() * total;
  for (const it of items) {
    if (r < it.weight) return it;
    r -= it.weight;
  }
  return items[items.length - 1];
}

function makeGlowTexture(hard) {
  const size = 64;
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  if (hard) {
    grad.addColorStop(0, "rgba(255,255,255,1)");
    grad.addColorStop(0.55, "rgba(255,255,255,0.55)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
  } else {
    grad.addColorStop(0, "rgba(255,255,255,0.9)");
    grad.addColorStop(0.5, "rgba(255,255,255,0.35)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}

// ---------- renderer / scene / camera ----------
const canvas = document.createElement("canvas");
document.body.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(4.2, 4.3, 5.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2.5;
controls.maxDistance = 24;
controls.target.set(0, 0, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.addEventListener("start", () => (controls.autoRotate = false));

// ---------- lighting (deep space: one hard sun, faint ambient) ----------
scene.add(new THREE.HemisphereLight(0x2a3550, 0x05050a, 0.35));

const sun = new THREE.DirectionalLight(0xfff2df, 3.0);
sun.position.set(6, 5, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 20;
sun.shadow.camera.left = -4;
sun.shadow.camera.right = 4;
sun.shadow.camera.top = 4;
sun.shadow.camera.bottom = -4;
sun.shadow.bias = -0.0015;
scene.add(sun);

const rimLight = new THREE.PointLight(0x5a7fff, 4, 14, 2);
rimLight.position.set(-4, -1.5, -3);
scene.add(rimLight);

const blastLight = new THREE.PointLight(0xff7a33, 0, 16, 2);
blastLight.position.set(0, 0, 0);
scene.add(blastLight);

// ---------- starfield ----------
{
  const starCount = 1400;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = rand(30, 90);
    const theta = rand(0, Math.PI * 2);
    const phi = Math.acos(rand(-1, 1));
    starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i * 3 + 2] = r * Math.cos(phi);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({
    color: 0xffffff, size: 0.16, sizeAttenuation: true,
    map: makeGlowTexture(true), transparent: true, opacity: 0.85, depthWrite: false,
  });
  const stars = new THREE.Points(starGeo, starMat);
  stars.frustumCulled = false;
  scene.add(stars);
}

// distant planet for atmosphere
{
  const planet = new THREE.Mesh(
    new THREE.SphereGeometry(7, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0x1c3a55, roughness: 0.85, metalness: 0.05, emissive: 0x061018, emissiveIntensity: 0.6 })
  );
  planet.position.set(20, -8, -28);
  scene.add(planet);
}

// ---------- shuttle geometry (nose points +Z, tail at -Z) ----------
const shuttleGroup = new THREE.Group();
scene.add(shuttleGroup);

const intactMats = [];
function makeMat(color, opts = {}) {
  const m = new THREE.MeshStandardMaterial({
    color, roughness: opts.roughness ?? 0.5, metalness: opts.metalness ?? 0.2,
    transparent: true, emissive: opts.emissive ?? 0x000000, emissiveIntensity: opts.emissiveIntensity ?? 1,
  });
  intactMats.push(m);
  return m;
}

const hullMat = makeMat(0xeef1f6, { roughness: 0.55, metalness: 0.1 });
const darkMat = makeMat(0x121319, { roughness: 0.6, metalness: 0.2 });
const engineMat = makeMat(0x2a2c34, { roughness: 0.4, metalness: 0.65 });
const noseGlowMat = makeMat(0x3a1a12, { roughness: 0.5, metalness: 0.1, emissive: 0xff5a1e, emissiveIntensity: 0.25 });

const FUSELAGE_LEN = 1.9, FUSELAGE_R = 0.32;
const fuselageGeo = new THREE.CylinderGeometry(FUSELAGE_R * 0.9, FUSELAGE_R, FUSELAGE_LEN, 16);
fuselageGeo.rotateX(Math.PI / 2);
const fuselage = new THREE.Mesh(fuselageGeo, hullMat);
fuselage.castShadow = true; fuselage.receiveShadow = true;
shuttleGroup.add(fuselage);

const NOSE_LEN = 0.55;
const noseGeo = new THREE.ConeGeometry(FUSELAGE_R * 0.9, NOSE_LEN, 16);
noseGeo.rotateX(Math.PI / 2);
const nose = new THREE.Mesh(noseGeo, darkMat);
nose.position.z = FUSELAGE_LEN / 2 + NOSE_LEN / 2 - 0.02;
nose.castShadow = true;
shuttleGroup.add(nose);

// cockpit window strip
const cockpitGeo = new THREE.BoxGeometry(0.22, 0.06, 0.32);
const cockpit = new THREE.Mesh(cockpitGeo, noseGlowMat);
cockpit.position.set(0, FUSELAGE_R * 0.75, FUSELAGE_LEN / 2 - 0.35);
cockpit.rotation.x = -0.15;
shuttleGroup.add(cockpit);

// delta wings (built flat in XY, extruded along Z as thickness, then rotated to lie horizontal)
function makeWingGeo(mirror) {
  const s = new THREE.Shape();
  const sgn = mirror ? -1 : 1;
  s.moveTo(0.08 * sgn, 0.15);
  s.lineTo(0.95 * sgn, -0.30);
  s.lineTo(0.08 * sgn, -0.62);
  s.closePath();
  const geo = new THREE.ExtrudeGeometry(s, { depth: 0.04, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2);
  return geo;
}
const wingR = new THREE.Mesh(makeWingGeo(false), hullMat);
wingR.position.set(FUSELAGE_R * 0.85, -FUSELAGE_R * 0.5, -0.35);
wingR.castShadow = true;
shuttleGroup.add(wingR);

const wingL = new THREE.Mesh(makeWingGeo(true), hullMat);
wingL.position.set(-FUSELAGE_R * 0.85, -FUSELAGE_R * 0.5, -0.35);
wingL.castShadow = true;
shuttleGroup.add(wingL);

// wing leading-edge trim (dark heat-shield strip)
function makeWingTrimGeo(mirror) {
  const s = new THREE.Shape();
  const sgn = mirror ? -1 : 1;
  s.moveTo(0.08 * sgn, 0.15);
  s.lineTo(0.95 * sgn, -0.30);
  s.lineTo(0.85 * sgn, -0.38);
  s.lineTo(0.08 * sgn, 0.02);
  s.closePath();
  const geo = new THREE.ExtrudeGeometry(s, { depth: 0.042, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2);
  return geo;
}
const wingTrimR = new THREE.Mesh(makeWingTrimGeo(false), darkMat);
wingTrimR.position.set(FUSELAGE_R * 0.85, -FUSELAGE_R * 0.5 + 0.002, -0.35);
shuttleGroup.add(wingTrimR);
const wingTrimL = new THREE.Mesh(makeWingTrimGeo(true), darkMat);
wingTrimL.position.set(-FUSELAGE_R * 0.85, -FUSELAGE_R * 0.5 + 0.002, -0.35);
shuttleGroup.add(wingTrimL);

// vertical tail fin
function makeFinGeo() {
  const s = new THREE.Shape();
  s.moveTo(0, 0);
  s.lineTo(-0.15, 0.55);
  s.lineTo(-0.42, 0.5);
  s.lineTo(-0.35, 0);
  s.closePath();
  const geo = new THREE.ExtrudeGeometry(s, { depth: 0.035, bevelEnabled: false });
  geo.rotateY(Math.PI / 2);
  return geo;
}
const tailFin = new THREE.Mesh(makeFinGeo(), hullMat);
tailFin.position.set(0, FUSELAGE_R * 0.7, -FUSELAGE_LEN / 2 + 0.15);
tailFin.castShadow = true;
shuttleGroup.add(tailFin);

// main engines (cluster of 3 at the tail)
const ENGINE_Z = -FUSELAGE_LEN / 2 - 0.05;
const enginePositions = [
  new THREE.Vector3(0, 0.14, ENGINE_Z),
  new THREE.Vector3(0.13, -0.08, ENGINE_Z),
  new THREE.Vector3(-0.13, -0.08, ENGINE_Z),
];
for (const p of enginePositions) {
  const eGeo = new THREE.CylinderGeometry(0.085, 0.1, 0.22, 12);
  eGeo.rotateX(Math.PI / 2);
  const e = new THREE.Mesh(eGeo, engineMat);
  e.position.copy(p);
  e.position.z -= 0.02;
  e.castShadow = true;
  shuttleGroup.add(e);

  const bell = new THREE.Mesh(new THREE.CircleGeometry(0.07, 16), noseGlowMat);
  bell.position.copy(p);
  bell.position.z -= 0.14;
  bell.rotation.y = Math.PI;
  shuttleGroup.add(bell);
}

// ---------- debris / shrapnel system ----------
const SHUTTLE_CENTER = new THREE.Vector3(0, 0, 0);
const debrisSources = [
  { center: new THREE.Vector3(0, 0, 0.05), half: new THREE.Vector3(FUSELAGE_R, FUSELAGE_R, FUSELAGE_LEN / 2), weight: 34 },
  { center: new THREE.Vector3(0, 0, FUSELAGE_LEN / 2 + NOSE_LEN / 2), half: new THREE.Vector3(0.22, 0.22, NOSE_LEN / 2), weight: 10 },
  { center: new THREE.Vector3(FUSELAGE_R * 1.4, -FUSELAGE_R * 0.5, -0.35), half: new THREE.Vector3(0.5, 0.08, 0.4), weight: 15 },
  { center: new THREE.Vector3(-FUSELAGE_R * 1.4, -FUSELAGE_R * 0.5, -0.35), half: new THREE.Vector3(0.5, 0.08, 0.4), weight: 15 },
  { center: new THREE.Vector3(0, FUSELAGE_R * 1.0, -FUSELAGE_LEN / 2 + 0.15), half: new THREE.Vector3(0.05, 0.3, 0.25), weight: 6 },
  { center: new THREE.Vector3(0, 0, ENGINE_Z), half: new THREE.Vector3(0.22, 0.22, 0.15), weight: 8 },
];

const DEBRIS_COUNT = 1100;
const debrisGeo = new THREE.BoxGeometry(0.05, 0.035, 0.01).toNonIndexed();
{
  const colors = [];
  const faceColors = [
    new THREE.Color(0xf0f2f6), new THREE.Color(0xf0f2f6),
    new THREE.Color(0x121319), new THREE.Color(0x121319),
    new THREE.Color(0x9aa0ac), new THREE.Color(0xff7a33),
  ];
  const posAttr = debrisGeo.getAttribute("position");
  const faceCount = posAttr.count / 3;
  for (let f = 0; f < faceCount; f++) {
    const c = faceColors[f % faceColors.length];
    for (let v = 0; v < 3; v++) colors.push(c.r, c.g, c.b);
  }
  debrisGeo.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
}
const debrisMat = new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.4, metalness: 0.4, transparent: true, opacity: 0,
});
const debrisMesh = new THREE.InstancedMesh(debrisGeo, debrisMat, DEBRIS_COUNT);
debrisMesh.castShadow = true;
debrisMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
debrisMesh.frustumCulled = false;
debrisMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(DEBRIS_COUNT * 3), 3);
scene.add(debrisMesh);

const debris = [];
const debrisTmpColor = new THREE.Color();
for (let i = 0; i < DEBRIS_COUNT; i++) {
  const src = weightedPick(debrisSources);
  const pos = new THREE.Vector3(
    src.center.x + rand(-src.half.x, src.half.x),
    src.center.y + rand(-src.half.y, src.half.y),
    src.center.z + rand(-src.half.z, src.half.z)
  );
  const baseQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(rand(0, Math.PI * 2), rand(0, Math.PI * 2), rand(0, Math.PI * 2)));

  const dir = pos.clone().sub(SHUTTLE_CENTER);
  if (dir.lengthSq() < 1e-6) dir.set(rand(-1, 1), rand(-1, 1), rand(-1, 1));
  dir.add(new THREE.Vector3(rand(-0.3, 0.3), rand(-0.1, 0.5), rand(-0.3, 0.3)));
  dir.normalize();

  debris.push({
    basePos: pos,
    baseQuat,
    dir,
    dist: rand(2.2, 6.5),
    axis: new THREE.Vector3(rand(-1, 1), rand(-1, 1), rand(-1, 1)).normalize(),
    spin: rand(2, 8) * (Math.random() < 0.5 ? -1 : 1),
    delay: rand(0, 0.08),
    gravity: rand(0.05, 0.35),
    scale: rand(0.6, 2.0),
  });

  debrisTmpColor.setScalar(rand(0.8, 1.2));
  debrisMesh.setColorAt(i, debrisTmpColor);
}
debrisMesh.instanceColor.needsUpdate = true;

// ---------- fire particles ----------
const FIRE_COUNT = 260;
const fireGeo = new THREE.BufferGeometry();
const firePos = new Float32Array(FIRE_COUNT * 3);
const fireColor = new Float32Array(FIRE_COUNT * 3);
const fireData = [];
for (let i = 0; i < FIRE_COUNT; i++) {
  const base = new THREE.Vector3(rand(-0.15, 0.15), rand(-0.15, 0.15), rand(-0.4, 0.4));
  const dir = base.clone().normalize();
  if (dir.lengthSq() < 1e-6) dir.set(rand(-1, 1), rand(-1, 1), rand(-1, 1)).normalize();
  fireData.push({
    basePos: base,
    dir: dir.add(new THREE.Vector3(rand(-0.4, 0.4), rand(-0.4, 0.4), rand(-0.4, 0.4))).normalize(),
    dist: rand(0.6, 2.6),
    delay: rand(0, 0.04),
  });
  const c = new THREE.Color().setHSL(rand(0.04, 0.13), 1, rand(0.5, 0.75));
  fireColor[i * 3] = c.r; fireColor[i * 3 + 1] = c.g; fireColor[i * 3 + 2] = c.b;
}
fireGeo.setAttribute("position", new THREE.Float32BufferAttribute(firePos, 3));
fireGeo.setAttribute("color", new THREE.Float32BufferAttribute(fireColor, 3));
const fireMat = new THREE.PointsMaterial({
  size: 0.001, vertexColors: true, map: makeGlowTexture(true),
  transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,
});
const fireParticles = new THREE.Points(fireGeo, fireMat);
fireParticles.frustumCulled = false;
scene.add(fireParticles);

// ---------- smoke particles ----------
const SMOKE_COUNT = 300;
const smokeGeo = new THREE.BufferGeometry();
const smokePos = new Float32Array(SMOKE_COUNT * 3);
const smokeColor = new Float32Array(SMOKE_COUNT * 3);
const smokeData = [];
for (let i = 0; i < SMOKE_COUNT; i++) {
  const base = new THREE.Vector3(rand(-0.25, 0.25), rand(-0.25, 0.25), rand(-0.6, 0.6));
  const dir = base.clone().normalize();
  if (dir.lengthSq() < 1e-6) dir.set(rand(-1, 1), rand(-1, 1), rand(-1, 1)).normalize();
  smokeData.push({
    basePos: base,
    dir: dir.add(new THREE.Vector3(rand(-0.5, 0.5), rand(-0.2, 0.7), rand(-0.5, 0.5))).normalize(),
    dist: rand(1.8, 5.5),
    delay: rand(0, 0.15),
  });
  const g = rand(0.18, 0.55);
  smokeColor[i * 3] = g; smokeColor[i * 3 + 1] = g; smokeColor[i * 3 + 2] = g * 1.05;
}
smokeGeo.setAttribute("position", new THREE.Float32BufferAttribute(smokePos, 3));
smokeGeo.setAttribute("color", new THREE.Float32BufferAttribute(smokeColor, 3));
const smokeMat = new THREE.PointsMaterial({
  size: 0.001, vertexColors: true, map: makeGlowTexture(false),
  transparent: true, opacity: 0, depthWrite: false, blending: THREE.NormalBlending, sizeAttenuation: true,
});
const smokeParticles = new THREE.Points(smokeGeo, smokeMat);
smokeParticles.frustumCulled = false;
scene.add(smokeParticles);

// ---------- explosion flash ----------
const flashMat = new THREE.SpriteMaterial({
  map: makeGlowTexture(true), color: 0xff8a3c, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
});
const flash = new THREE.Sprite(flashMat);
scene.add(flash);

const shockMat = new THREE.MeshBasicMaterial({
  color: 0xffb066, transparent: true, opacity: 0, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
});
const shockwave = new THREE.Mesh(new THREE.RingGeometry(1, 1.08, 64), shockMat);
scene.add(shockwave);

// ---------- time state ----------
let t = 0; // 0..1
let playing = false;
let playDir = 1;

const slider = document.getElementById("timeSlider");
const playBtn = document.getElementById("playBtn");
const resetBtn = document.getElementById("resetBtn");
const stateLabel = document.getElementById("stateLabel");
const pctLabel = document.getElementById("pctLabel");
const loading = document.getElementById("loading");
const infoBtn = document.getElementById("infoBtn");
const hud = document.getElementById("hud");

infoBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  hud.classList.toggle("open");
});
document.addEventListener("click", (e) => {
  if (hud.classList.contains("open") && !hud.contains(e.target) && e.target !== infoBtn) {
    hud.classList.remove("open");
  }
});

function setT(newT, fromSlider) {
  t = clamp(newT, 0, 1);
  if (!fromSlider) slider.value = String(Math.round(t * 1000));
  const pct = Math.round(t * 100);
  pctLabel.textContent = pct + "%";
  slider.style.setProperty("--fill", pct + "%");
  stateLabel.textContent = t < 0.02 ? "Intakt" : t > 0.97 ? "Vollständig zerstört" : "Explosion läuft …";
}

slider.addEventListener("input", () => {
  playing = false;
  playBtn.textContent = "▶";
  setT(Number(slider.value) / 1000, true);
});

playBtn.addEventListener("click", () => {
  playing = !playing;
  playBtn.textContent = playing ? "⏸" : "▶";
});

resetBtn.addEventListener("click", () => {
  playing = false;
  playBtn.textContent = "▶";
  setT(0);
});

setT(0);

// ---------- animate ----------
const tmpV = new THREE.Vector3();
const tmpQ = new THREE.Quaternion();
const tmpPos = new THREE.Vector3();
const tmpScale = new THREE.Vector3();
const tmpQuat2 = new THREE.Quaternion();
const tmpMatrix = new THREE.Matrix4();
const clock = new THREE.Clock();

function fireEnvelope(tt) {
  const rise = smoothstep(clamp(tt / 0.04, 0, 1));
  const decay = Math.exp(-Math.max(0, tt - 0.04) * 8.5);
  return rise * decay;
}
function smokeEnvelope(tt) {
  const rise = smoothstep(clamp(tt / 0.15, 0, 1));
  const fade = 1 - smoothstep(clamp((tt - 0.45) / 0.55, 0, 1)) * 0.75;
  return rise * fade;
}

function updateScene() {
  const shipBurst = smoothstep(clamp(t / 0.05, 0, 1));
  for (const m of intactMats) m.opacity = 1 - shipBurst;
  shuttleGroup.visible = shipBurst < 0.999;
  debrisMat.opacity = shipBurst;
  debrisMesh.visible = shipBurst > 0.001;

  const fEnv = fireEnvelope(t);
  const sEnv = smokeEnvelope(t);
  blastLight.intensity = fEnv * 22;

  flash.scale.setScalar(0.4 + fEnv * 4.5);
  flashMat.opacity = fEnv;

  const shockT = clamp(t / 0.35, 0, 1);
  const shockEff = smoothstep(shockT);
  shockwave.scale.setScalar(0.3 + shockEff * 7);
  shockwave.lookAt(camera.position);
  shockMat.opacity = (1 - shockEff) * smoothstep(clamp(t * 16, 0, 1)) * 0.55;

  // debris
  for (let i = 0; i < debris.length; i++) {
    const d = debris[i];
    const localT = clamp((t - d.delay) / Math.max(0.0001, 1 - d.delay), 0, 1);
    const eff = easeOutBlast(localT);

    tmpV.copy(d.dir).multiplyScalar(d.dist * eff);
    tmpV.y -= d.gravity * eff * eff * 0.6;
    tmpPos.copy(d.basePos).add(tmpV);

    tmpQ.setFromAxisAngle(d.axis, d.spin * eff * Math.PI);
    tmpQuat2.copy(d.baseQuat).multiply(tmpQ);

    tmpScale.setScalar(d.scale * (1 + Math.sin(eff * Math.PI) * 0.15));

    tmpMatrix.compose(tmpPos, tmpQuat2, tmpScale);
    debrisMesh.setMatrixAt(i, tmpMatrix);
  }
  debrisMesh.instanceMatrix.needsUpdate = true;

  // fire particles
  const firePosAttr = fireGeo.getAttribute("position");
  for (let i = 0; i < FIRE_COUNT; i++) {
    const f = fireData[i];
    const localT = clamp((t - f.delay) / Math.max(0.0001, 1 - f.delay), 0, 1);
    const eff = easeOutBlast(localT);
    tmpPos.copy(f.basePos).add(tmpV.copy(f.dir).multiplyScalar(f.dist * eff));
    firePosAttr.setXYZ(i, tmpPos.x, tmpPos.y, tmpPos.z);
  }
  firePosAttr.needsUpdate = true;
  fireMat.opacity = fEnv;
  fireMat.size = lerp(0.05, 0.55, smoothstep(clamp(t / 0.15, 0, 1))) * (0.5 + fEnv * 0.5);

  // smoke particles
  const smokePosAttr = smokeGeo.getAttribute("position");
  for (let i = 0; i < SMOKE_COUNT; i++) {
    const s = smokeData[i];
    const localT = clamp((t - s.delay) / Math.max(0.0001, 1 - s.delay), 0, 1);
    const eff = easeOutBlast(localT);
    tmpPos.copy(s.basePos).add(tmpV.copy(s.dir).multiplyScalar(s.dist * eff));
    tmpPos.y += t * 0.6;
    smokePosAttr.setXYZ(i, tmpPos.x, tmpPos.y, tmpPos.z);
  }
  smokePosAttr.needsUpdate = true;
  smokeMat.opacity = sEnv * 0.55;
  smokeMat.size = lerp(0.1, 0.85, smoothstep(t));
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (playing) {
    t += dt * 0.16 * playDir;
    if (t >= 1) { t = 1; playDir = -1; }
    if (t <= 0) { t = 0; playDir = 1; }
    setT(t);
  }

  updateScene();
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

loading.style.opacity = "0";
setTimeout(() => loading.remove(), 400);

animate();
</script>
</body>
</html>
