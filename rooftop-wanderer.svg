<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a1c"/>
      <stop offset="0.5" stop-color="#181432"/>
      <stop offset="1" stop-color="#2c1f3a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e1deff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e1deff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lantern" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe0a0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="url(#sky)"/>

  <!-- moon -->
  <circle cx="390" cy="55" r="80" fill="url(#moonGlow)"/>
  <circle cx="390" cy="55" r="26" fill="#eee6ff"/>
  <circle cx="382" cy="48" r="4" fill="#9690b8" opacity="0.3"/>
  <circle cx="398" cy="62" r="2.5" fill="#9690b8" opacity="0.3"/>

  <!-- stars -->
  <g fill="#dfe0ff">
    <circle cx="40" cy="30" r="1.2"/>
    <circle cx="90" cy="60" r="1"/>
    <circle cx="150" cy="25" r="1.4"/>
    <circle cx="210" cy="70" r="1"/>
    <circle cx="270" cy="35" r="1.3"/>
    <circle cx="30" cy="90" r="1"/>
    <circle cx="130" cy="100" r="0.9"/>
    <circle cx="310" cy="80" r="1.1"/>
  </g>

  <!-- far skyline -->
  <g fill="#171233">
    <rect x="0" y="170" width="50" height="130"/>
    <rect x="55" y="150" width="60" height="150"/>
    <rect x="120" y="185" width="45" height="115"/>
    <rect x="330" y="160" width="55" height="140"/>
    <rect x="390" y="190" width="40" height="110"/>
    <rect x="435" y="165" width="45" height="135"/>
  </g>
  <g fill="#ffd278" opacity="0.5">
    <rect x="12" y="185" width="6" height="8"/>
    <rect x="70" y="170" width="6" height="8"/>
    <rect x="95" y="200" width="6" height="8"/>
    <rect x="340" y="180" width="6" height="8"/>
    <rect x="445" y="185" width="6" height="8"/>
  </g>

  <!-- near skyline (rooftops player crosses) -->
  <g fill="#0f0c22">
    <rect x="0" y="230" width="70" height="70"/>
    <rect x="100" y="210" width="55" height="90"/>
    <rect x="250" y="220" width="60" height="80"/>
    <rect x="400" y="215" width="80" height="85"/>
  </g>
  <g fill="#9583ff" opacity="0.6">
    <rect x="100" y="210" width="55" height="2.5"/>
    <rect x="250" y="220" width="60" height="2.5"/>
    <rect x="400" y="215" width="80" height="2.5"/>
  </g>
  <g fill="#ffc86a" opacity="0.65">
    <rect x="10" y="245" width="6" height="8"/>
    <rect x="30" y="260" width="6" height="8"/>
    <rect x="112" y="230" width="6" height="8"/>
    <rect x="260" y="240" width="6" height="8"/>
    <rect x="415" y="235" width="6" height="8"/>
    <rect x="440" y="255" width="6" height="8"/>
  </g>

  <!-- distant goal signal -->
  <circle cx="460" cy="205" r="30" fill="url(#lantern)"/>
  <circle cx="460" cy="205" r="4" fill="#ffe8b0"/>

  <!-- fog -->
  <rect x="0" y="255" width="480" height="45" fill="#0f0a1e" opacity="0.55"/>

  <!-- cape character silhouette, mid-stride on a rooftop -->
  <g>
    <path d="M 178 205 C 150 200 122 210 100 232 C 130 234 152 246 168 254 C 182 246 190 228 190 214 Z" fill="#1c1730"/>
    <path d="M 178 232 L 162 258 L 148 282" stroke="#0a0a0d" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M 186 232 L 200 254 L 214 272" stroke="#1d1e22" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 182 200 Q 174 182 186 168 Q 198 158 210 166 Q 220 176 214 192 Q 210 202 200 206 Z" fill="#111116"/>
    <ellipse cx="196" cy="184" rx="9" ry="10" fill="#1c1d22"/>
    <path d="M 182 210 Q 176 190 184 172 L 198 172 Q 206 190 200 210 Z" fill="#1a1b20"/>
  </g>
</svg>
