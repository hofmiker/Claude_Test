<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonnensystem</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#06080f; font-family:Helvetica,Arial,sans-serif; overflow:hidden; width:100vw; height:100vh; user-select:none; }
#bg { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* Viewport: overflow hidden for horizontal clip, padded so planets never clip */
#viewport {
  position:fixed;
  /* extend beyond screen top/bottom so overflow:hidden doesn't clip planets */
  top: -200px; bottom: -200px; left: 0; right: 0;
  z-index:1; overflow:hidden; cursor:grab;
}
#viewport.dragging { cursor:grabbing; }

/* Track: full height visible, moved by JS translateX */
#track {
  position:absolute;
  top:50%; left:0;
  transform:translateY(-50%) translateX(0px);
  display:flex; align-items:center;
  padding:0 80px;
  will-change:transform;
}

/* Planet wrapper */
.pw {
  position:relative; flex-shrink:0; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.42s cubic-bezier(0.34,1.28,0.64,1);
  transform-origin:center center;
}

/* Focus ring */
.pw .focus-ring {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1.5px solid transparent;
  pointer-events:none;
  opacity:0;
  transition:border-color .3s, opacity .3s,
             width .4s cubic-bezier(.34,1.2,.64,1),
             height .4s cubic-bezier(.34,1.2,.64,1);
}
.pw:hover .focus-ring, .pw.active .focus-ring {
  border-color:rgba(255,255,255,.30); opacity:1;
}
.pw.active .focus-ring {
  border-color:rgba(255,255,255,.55);
  animation:rpulse 2.4s ease-in-out infinite;
}
@keyframes rpulse { 0%,100%{opacity:.55} 50%{opacity:.18} }

/* Info panel */
#panel {
  position:fixed; z-index:200; top:50%; transform:translateY(-50%);
  width:252px;
  background:rgba(8,10,20,0.78);
  backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:2px; padding:26px 28px 30px;
  opacity:0; pointer-events:none;
  transition:opacity .35s ease;
  left:-400px;
}
#panel.on { opacity:1; pointer-events:all; }
#p-name { font-size:30px; font-weight:300; letter-spacing:-.015em; color:#eceef6; line-height:1; margin-bottom:5px; }
#p-type { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(190,198,220,.35); margin-bottom:22px; }
.fact-row { padding:7px 0; border-top:1px solid rgba(255,255,255,.055); }
.fact-row:last-of-type { border-bottom:1px solid rgba(255,255,255,.055); }
.fact-label { font-size:8px; letter-spacing:.14em; text-transform:uppercase; color:rgba(190,198,220,.28); margin-bottom:3px; }
.fact-val { font-size:13px; font-weight:300; color:rgba(215,220,235,.80); }
#p-desc { margin-top:18px; font-size:11px; line-height:1.8; color:rgba(190,198,220,.40); }

#hint {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:.14em; text-transform:uppercase;
  color:rgba(190,198,220,.18); z-index:300; pointer-events:none;
  opacity:0; transition:opacity .4s;
}
#hint.on { opacity:1; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="panel">
  <div id="p-name"></div>
  <div id="p-type"></div>
  <div id="p-facts"></div>
  <div id="p-desc"></div>
</div>
<div id="hint">esc oder klick zum schließen</div>
<div id="viewport"><div id="track"></div></div>

<script>
const BODIES = [
  { id:'sonne',   name:'Sonne',   type:'Stern',         r:696340,
    c1:'#f5c030',c2:'#c06808', nF:.018,nS:2, nSX:1,  nST:.28, spd:.4,
    facts:[{l:'Durchmesser',v:'1 392 680 km'},{l:'Masse',v:'1,99 × 10³⁰ kg'},{l:'Oberfläche',v:'5 778 K'},{l:'Rotation',v:'25–35 Tage'}],
    desc:'Die Sonne enthält 99,86 % der Masse unseres Sonnensystems. Ihr Kern erreicht 15 Millionen Kelvin — genug für anhaltende Kernfusion.' },
  { id:'jupiter', name:'Jupiter', type:'Gasriese',      r:71492,
    c1:'#e0b070',c2:'#8a5020', nF:.008,nS:5, nSX:12, nST:.22, spd:1.8,
    facts:[{l:'Durchmesser',v:'142 984 km'},{l:'Monde',v:'95'},{l:'Umlaufzeit',v:'11,86 Jahre'},{l:'Rotation',v:'9 h 56 min'}],
    desc:'Der Große Rote Fleck ist ein Sturm größer als die Erde — er tobt seit mindestens 350 Jahren.' },
  { id:'saturn',  name:'Saturn',  type:'Gasriese',      r:60268, ring:true,
    c1:'#e8c878',c2:'#906820', nF:.008,nS:8, nSX:12, nST:.18, spd:1.9,
    facts:[{l:'Durchmesser',v:'120 536 km'},{l:'Monde',v:'146'},{l:'Umlaufzeit',v:'29,46 Jahre'},{l:'Ringdurchm.',v:'bis 480 000 km'}],
    desc:'Saturns Ringe bestehen aus Eis und Gestein — trotz ihres Durchmessers oft weniger als 100 Meter dünn.' },
  { id:'uranus',  name:'Uranus',  type:'Eisriese',      r:25559,
    c1:'#90dce8',c2:'#2888a0', nF:.022,nS:9, nSX:1,  nST:.12, spd:1.4,
    facts:[{l:'Durchmesser',v:'51 118 km'},{l:'Monde',v:'28'},{l:'Umlaufzeit',v:'84 Jahre'},{l:'Achsenneigung',v:'97,8°'}],
    desc:'Uranus rotiert quasi auf der Seite. Methan in der Atmosphäre absorbiert rotes Licht und erzeugt das charakteristische Blaugrün.' },
  { id:'neptun',  name:'Neptun',  type:'Eisriese',      r:24764,
    c1:'#4a72e0',c2:'#101880', nF:.024,nS:3, nSX:1,  nST:.15, spd:1.5,
    facts:[{l:'Durchmesser',v:'49 528 km'},{l:'Monde',v:'16'},{l:'Umlaufzeit',v:'164,8 Jahre'},{l:'Windgeschw.',v:'bis 2 100 km/h'}],
    desc:'Neptun besitzt die stärksten Winde im Sonnensystem. Triton, sein größter Mond, umkreist den Planeten rückläufig.' },
  { id:'erde',    name:'Erde',    type:'Gesteinsplanet',r:6371,
    c1:'#4090d8',c2:'#102858', nF:.055,nS:14,nSX:1,  nST:.18, spd:2.2,
    facts:[{l:'Durchmesser',v:'12 742 km'},{l:'Monde',v:'1'},{l:'Umlaufzeit',v:'365,25 Tage'},{l:'Temperatur',v:'−88 bis +58 °C'}],
    desc:'Die Erde ist der einzige bekannte Planet mit Leben. Ihre tektonischen Platten formen kontinuierlich die Oberfläche.' },
  { id:'venus',   name:'Venus',   type:'Gesteinsplanet',r:6051,
    c1:'#e8c050',c2:'#906010', nF:.050,nS:22,nSX:1,  nST:.16, spd:.5,
    facts:[{l:'Durchmesser',v:'12 104 km'},{l:'Umlaufzeit',v:'224,7 Tage'},{l:'Rotation',v:'243 Tage'},{l:'Temperatur',v:'465 °C'}],
    desc:'Die Venus ist heißer als Merkur. Ihr extremer Treibhauseffekt und rückläufige Rotation machen sie einzigartig.' },
  { id:'mars',    name:'Mars',    type:'Gesteinsplanet',r:3390,
    c1:'#d85030',c2:'#701008', nF:.065,nS:18,nSX:1,  nST:.20, spd:2.1,
    facts:[{l:'Durchmesser',v:'6 779 km'},{l:'Monde',v:'2'},{l:'Umlaufzeit',v:'686,9 Tage'},{l:'Temperatur',v:'−140 bis +20 °C'}],
    desc:'Der Olympus Mons ist mit 22 km der größte Vulkan im Sonnensystem. Die dünne Atmosphäre besteht zu 95 % aus CO₂.' },
  { id:'merkur',  name:'Merkur',  type:'Gesteinsplanet',r:2440,
    c1:'#b0a8a0',c2:'#504848', nF:.085,nS:31,nSX:1,  nST:.18, spd:.8,
    facts:[{l:'Durchmesser',v:'4 879 km'},{l:'Umlaufzeit',v:'88 Tage'},{l:'Rotation',v:'59 Tage'},{l:'Temperatur',v:'−173 bis +427 °C'}],
    desc:'Merkur hat keine Atmosphäre und damit die extremsten Temperaturschwankungen aller Planeten.' },
  { id:'pluto',   name:'Pluto',   type:'Zwergplanet',   r:1188,
    c1:'#c0a080',c2:'#604838', nF:.10, nS:44,nSX:1,  nST:.16, spd:.3,
    facts:[{l:'Durchmesser',v:'2 376 km'},{l:'Monde',v:'5'},{l:'Umlaufzeit',v:'248 Jahre'},{l:'Status',v:'Zwergplanet seit 2006'}],
    desc:'New Horizons enthüllte 2015 Plutos herzförmige Stickstoffebene Tombaugh Regio.' },
];

// ── Noise ─────────────────────────────────────────────────────────────────────
function seededRand(seed) {
  let s = (seed|0)+1;
  return ()=>{ s=Math.imul(s^(s>>>15),s|1); s^=s+Math.imul(s^(s>>>7),s|61); return ((s^(s>>>14))>>>0)/0xffffffff; };
}
function makeNoise(seed) {
  const SZ=256,rng=seededRand(seed),t=new Float32Array(SZ*SZ);
  for(let i=0;i<t.length;i++) t[i]=rng()*2-1;
  return (nx,ny)=>{
    const xi=Math.floor(nx)&(SZ-1),yi=Math.floor(ny)&(SZ-1);
    const fx=nx-Math.floor(nx),fy=ny-Math.floor(ny);
    const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    const x1=(xi+1)&(SZ-1),y1=(yi+1)&(SZ-1);
    const v00=t[yi*SZ+xi],v10=t[yi*SZ+x1],v01=t[y1*SZ+xi],v11=t[y1*SZ+x1];
    return v00+(v10-v00)*ux+(v01-v00)*uy+(v00-v10-v01+v11)*ux*uy;
  };
}

// ── Stars ─────────────────────────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('bg');
  const rng=seededRand(77);
  cv.width=window.innerWidth||1440; cv.height=window.innerHeight||900;
  const ctx=cv.getContext('2d');
  for(let i=0;i<550;i++){
    const x=rng()*cv.width,y=rng()*cv.height,r=rng()*.7+.1,a=rng()*.14+.03;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,218,238,${a.toFixed(3)})`; ctx.fill();
  }
})();

// ── Scale ─────────────────────────────────────────────────────────────────────
const MAX_R = BODIES[0].r;
function scalePx(r) {
  const H = Math.max(window.innerHeight||0, document.documentElement.clientHeight||0, 300);
  const W = Math.max(window.innerWidth||0,  document.documentElement.clientWidth||0,  400);
  // Sun: max 78% of viewport height, max 32% of viewport width
  const maxD = Math.min(H * 0.78, W * 0.32);
  return Math.max(Math.round((r / MAX_R) * maxD), 4);
}

// ── Texture strip ─────────────────────────────────────────────────────────────
function buildStrip(body, diam) {
  const W=diam*2, H=diam;
  const buf=document.createElement('canvas');
  buf.width=W; buf.height=H;
  const ctx=buf.getContext('2d');
  for(let half=0;half<2;half++){
    const ox=half*diam, rr=diam/2;
    const g=ctx.createRadialGradient(ox+rr*.85,rr*.72,0,ox+rr,rr,rr);
    g.addColorStop(0,body.c1); g.addColorStop(1,body.c2);
    ctx.beginPath(); ctx.arc(ox+rr,rr,rr,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
  const noise=makeNoise(body.nS||1);
  const imgd=ctx.getImageData(0,0,W,H); const d=imgd.data;
  for(let py=0;py<H;py++) for(let px=0;px<W;px++){
    const i=(py*W+px)*4;
    if(d[i+3]<10) continue;
    const n=noise(px*body.nF*(body.nSX||1), py*body.nF);
    const f=1+n*(body.nST||.18);
    d[i]=Math.min(255,Math.max(0,d[i]*f));
    d[i+1]=Math.min(255,Math.max(0,d[i+1]*f));
    d[i+2]=Math.min(255,Math.max(0,d[i+2]*f));
  }
  ctx.putImageData(imgd,0,0);
  return buf;
}

// ── Planet rendering ──────────────────────────────────────────────────────────
const planets=[];
const GAP=28;
const track=document.getElementById('track');
const svgNS='http://www.w3.org/2000/svg';

BODIES.forEach((body,idx)=>{
  const diam=scalePx(body.r), rr=diam/2;

  const pw=document.createElement('div');
  pw.className='pw'; pw.dataset.idx=idx;
  pw.style.cssText=`width:${diam}px;height:${diam}px;`;

  // Canvas
  const cv=document.createElement('canvas');
  cv.width=diam; cv.height=diam;
  cv.style.cssText=`width:${diam}px;height:${diam}px;display:block;`;
  pw.appendChild(cv);

  // Saturn ring
  if(body.ring){
    const rW=diam*2.4, rH=diam*0.38;
    const svg=document.createElementNS(svgNS,'svg');
    svg.setAttribute('width',rW); svg.setAttribute('height',rH);
    svg.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;overflow:visible;`;
    const mkE=(rx,ry,s,sw)=>{
      const e=document.createElementNS(svgNS,'ellipse');
      e.setAttribute('cx',rW/2); e.setAttribute('cy',rH/2);
      e.setAttribute('rx',rx); e.setAttribute('ry',ry);
      e.setAttribute('fill','none'); e.setAttribute('stroke',s);
      e.setAttribute('stroke-width',sw); svg.appendChild(e);
    };
    mkE(rW/2-1,rH/2-1,'rgba(218,196,120,0.42)',Math.max(3,diam*.065));
    mkE(rW*.36,rH*.28,'rgba(218,196,120,0.20)',Math.max(1.5,diam*.025));
    pw.appendChild(svg);
    pw._ringExtra=Math.ceil((rW-diam)/2);
  }

  // Focus ring
  const fr=document.createElement('div');
  fr.className='focus-ring';
  const frd=diam+20;
  fr.style.cssText=`width:${frd}px;height:${frd}px;`;
  pw.appendChild(fr);

  // Texture + state
  const strip=buildStrip(body,diam);
  const speed=body.spd*(60/Math.max(diam,8));
  planets.push({body,diam,strip,canvas:cv,phase:Math.random()*diam,speed});

  track.appendChild(pw);
});

// ── Gap between planet outer edges ───────────────────────────────────────────
const pwEls=[...track.querySelectorAll('.pw')];
pwEls.forEach((pw,i)=>{
  if(i<pwEls.length-1){
    const re=pw._ringExtra||0, ne=pwEls[i+1]._ringExtra||0;
    pw.style.marginRight=(GAP+re+ne)+'px';
  }
});

// ── Render loop ───────────────────────────────────────────────────────────────
function renderPlanet(p){
  const {diam,strip,canvas}=p; const rr=diam/2;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,diam,diam);
  ctx.save();
  ctx.beginPath(); ctx.arc(rr,rr,rr,0,Math.PI*2); ctx.clip();
  const off=Math.floor(p.phase)%diam;
  ctx.drawImage(strip,off,0,diam,diam,0,0,diam,diam);
  if(off>0) ctx.drawImage(strip,off-diam,0,diam,diam,0,0,diam,diam);
  ctx.restore();
}

let lastT=performance.now();
function tick(now){
  const dt=Math.min(now-lastT,60); lastT=now;
  for(const p of planets){
    p.phase=(p.phase+p.speed*dt*.016)%p.diam;
    renderPlanet(p);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(t=>{lastT=t;tick(t);});

// ── JS horizontal scroll (pointer drag + wheel) ───────────────────────────────
const viewport=document.getElementById('viewport');
let scrollX=0, maxScroll=0;
function getMaxScroll(){
  return Math.max(0, track.scrollWidth - window.innerWidth);
}
function applyScroll(animate){
  maxScroll=getMaxScroll();
  scrollX=Math.max(0,Math.min(scrollX,maxScroll));
  if(animate){
    track.style.transition='transform 0.55s cubic-bezier(0.4,0,0.2,1)';
    track.style.transform=`translateY(-50%) translateX(${-scrollX}px)`;
    setTimeout(()=>track.style.transition='',600);
  } else {
    track.style.transition='';
    track.style.transform=`translateY(-50%) translateX(${-scrollX}px)`;
  }
}
applyScroll(false);

// Wheel scroll
viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  scrollX += e.deltaX||e.deltaY;
  applyScroll(false);
},{passive:false});

// Pointer drag
let dragStart=null, scrollAtDrag=0;
viewport.addEventListener('pointerdown',e=>{
  dragStart={x:e.clientX}; scrollAtDrag=scrollX;
  viewport.setPointerCapture(e.pointerId);
  viewport.classList.add('dragging');
});
viewport.addEventListener('pointermove',e=>{
  if(!dragStart) return;
  scrollX=scrollAtDrag-(e.clientX-dragStart.x);
  applyScroll(false);
});
viewport.addEventListener('pointerup',()=>{ dragStart=null; viewport.classList.remove('dragging'); });
viewport.addEventListener('pointercancel',()=>{ dragStart=null; viewport.classList.remove('dragging'); });

// ── Hover scale ───────────────────────────────────────────────────────────────
pwEls.forEach(pw=>{
  pw.addEventListener('mouseenter',()=>{ if(!pw.classList.contains('active')) pw.style.transform='scale(1.10)'; });
  pw.addEventListener('mouseleave',()=>{ if(!pw.classList.contains('active')) pw.style.transform='scale(1.0)'; });
});

// ── Detail panel ─────────────────────────────────────────────────────────────
const panel=document.getElementById('panel');
const hint=document.getElementById('hint');
let activePw=null;

function openPanel(pw){
  const body=BODIES[parseInt(pw.dataset.idx)];
  document.getElementById('p-name').textContent=body.name;
  document.getElementById('p-type').textContent=body.type;
  document.getElementById('p-desc').textContent=body.desc;
  const fc=document.getElementById('p-facts');
  fc.innerHTML='';
  body.facts.forEach(f=>{
    fc.insertAdjacentHTML('beforeend',
      `<div class="fact-row"><div class="fact-label">${f.l}</div><div class="fact-val">${f.v}</div></div>`);
  });

  // Scroll planet into center view with room for panel on right
  const pW = 252 + 56; // panel width incl padding
  const gap = 24;
  const diam = parseInt(pw.style.width);
  const pwLeft = pw.offsetLeft; // position in track (before scroll)
  // Target: planet center at ~35% from left (panel takes right 40%)
  const targetX = pwLeft + diam/2 - window.innerWidth * 0.35;
  scrollX = Math.max(0, targetX);
  applyScroll(true);

  // Position panel AFTER scroll animation settles (600ms)
  setTimeout(()=>{
    const rect = pw.getBoundingClientRect();
    let left = rect.right + gap;
    if(left + pW > window.innerWidth - 12) left = rect.left - pW - gap;
    left = Math.max(12, left);
    panel.style.left = left + 'px';
    panel.classList.add('on');
    hint.classList.add('on');
  }, 580);

  if(activePw){ activePw.classList.remove('active'); activePw.style.transform='scale(1.0)'; }
  pw.classList.add('active'); pw.style.transform='scale(1.18)';
  activePw=pw;
}

function closePanel(){
  panel.classList.remove('on'); hint.classList.remove('on');
  if(activePw){ activePw.classList.remove('active'); activePw.style.transform='scale(1.0)'; activePw=null; }
}

viewport.addEventListener('click',e=>{
  if(viewport.classList.contains('dragging')) return;
  const pw=e.target.closest('.pw');
  if(!pw) return;
  if(activePw===pw){ closePanel(); return; }
  openPanel(pw);
});

document.addEventListener('click',e=>{
  if(!activePw) return;
  if(e.target.closest('.pw')||e.target.closest('#panel')) return;
  closePanel();
});

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); });

// Prevent click after drag
let didDrag=false;
viewport.addEventListener('pointerdown',()=>{ didDrag=false; });
viewport.addEventListener('pointermove',e=>{ if(dragStart && Math.abs(e.clientX-dragStart.x)>4) didDrag=true; });
</script>
</body>
</html>
