<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vice Grid — Der Kessel</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #000;
    font-family: "Segoe UI", Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
  }
  canvas#scene {
    display: block;
    width: 100%;
    height: 100%;
  }

  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  }

  /* ---- top-left: objective + distance ---- */
  #objectivePanel {
    position: absolute;
    top: 14px;
    left: 16px;
    max-width: 50vw;
  }
  #objectiveText {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }
  #objectiveDistance {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* ---- top-right: money + minimap ---- */
  #moneyDisplay {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 20px;
    font-weight: 700;
    color: #7CFC7A;
    text-align: right;
  }
  #minimapWrap {
    position: absolute;
    top: 44px;
    right: 16px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.5), 0 4px 14px rgba(0,0,0,0.6);
    overflow: hidden;
    background: #111;
  }
  #minimap {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---- top-center: wanted banner + toast ---- */
  #wantedBanner {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 19px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #ff3b3b;
    text-shadow: 0 0 14px rgba(255,59,59,0.9), 0 2px 3px #000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #wantedBanner.show {
    opacity: 1;
    animation: wantedPulse 1s ease-in-out infinite;
  }
  @keyframes wantedPulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.08); }
  }

  #subMsg {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 5px 14px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #subMsg.show { opacity: 1; }

  /* ---- bottom-left: speed + settings gear ---- */
  #speedWrap {
    position: absolute;
    bottom: 64px;
    left: 16px;
    text-align: left;
  }
  #speed {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }
  #speedUnit {
    font-size: 11px;
    opacity: 0.75;
    letter-spacing: 2px;
  }
  #gear {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }

  #btnSettings {
    position: absolute;
    bottom: 14px;
    left: 16px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    cursor: pointer;
  }
  #settingsMenu {
    position: absolute;
    bottom: 60px;
    left: 16px;
    background: rgba(10,10,14,0.92);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #settingsMenu.show { opacity: 1; pointer-events: auto; }
  #settingsMenu button {
    pointer-events: auto;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    text-align: left;
  }

  /* ---- dialog box ---- */
  #dialogBox {
    position: absolute;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    width: min(540px, 86vw);
    background: rgba(8,10,14,0.94);
    border: 1px solid rgba(255,204,0,0.25);
    border-radius: 10px;
    padding: 14px 18px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  #dialogBox.show { opacity: 1; pointer-events: auto; }
  #dialogSpeaker {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #ffcc00;
    margin-bottom: 6px;
    font-weight: 700;
    min-height: 13px;
  }
  #dialogText {
    font-size: 15px;
    line-height: 1.45;
    margin-bottom: 12px;
  }
  #dialogNextBtn {
    display: block;
    margin-left: auto;
    padding: 6px 18px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #fff;
    pointer-events: auto;
  }

  /* ---- win / fail overlay ---- */
  #endOverlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(0,0,0,0.84);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 6;
  }
  #endOverlay.show { opacity: 1; pointer-events: auto; }
  #endTitle {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 3px;
    text-align: center;
  }
  #endOverlay.win #endTitle { color: #6be36b; text-shadow: 0 0 20px rgba(107,227,107,0.6); }
  #endOverlay.fail #endTitle { color: #ff3b3b; text-shadow: 0 0 20px rgba(255,59,59,0.6); }
  #endSubtitle {
    font-size: 15px;
    opacity: 0.85;
    text-align: center;
    max-width: 80vw;
  }
  #endRestartBtn {
    margin-top: 10px;
    padding: 10px 24px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    pointer-events: auto;
  }

  #controlsHint {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    background: rgba(0,0,0,0.45);
    padding: 8px 14px;
    border-radius: 8px;
    text-align: center;
    line-height: 1.5;
    transition: opacity 1s ease;
  }

  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    background: #000;
    color: #fff;
    z-index: 10;
    font-size: 20px;
    letter-spacing: 2px;
  }
  #loading .bar {
    width: 240px;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    overflow: hidden;
  }
  #loading .fill {
    width: 30%;
    height: 100%;
    background: #ff3b3b;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  #mobileControls {
    display: none;
  }
  @media (pointer: coarse) {
    #controlsHint {
      display: none;
    }
    #speedWrap {
      bottom: 250px;
    }
    #mobileControls {
      display: block;
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .mbtn {
      position: absolute;
      pointer-events: auto;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* all driving buttons clustered bottom-right, away from center */
    #btnLeft { right: 244px; bottom: 96px; }
    #btnRight { right: 168px; bottom: 96px; }
    #btnGas { right: 92px; bottom: 168px; background: rgba(80,220,100,0.25); }
    #btnBrake { right: 92px; bottom: 96px; background: rgba(220,80,80,0.25); }
    #btnJump { right: 16px; bottom: 168px; background: rgba(255,210,0,0.25); font-size: 13px; }
    #btnAction { right: 16px; bottom: 96px; font-size: 12px; }

    /* buttons hidden: swipe the screen directly instead (always live either way) */
    body.buttons-hidden #btnLeft,
    body.buttons-hidden #btnRight,
    body.buttons-hidden #btnGas,
    body.buttons-hidden #btnBrake {
      display: none;
    }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div id="loading">
    <div>VICE GRID WIRD GELADEN…</div>
    <div class="bar"><div class="fill"></div></div>
  </div>

  <div id="hud">
    <div id="objectivePanel">
      <div id="objectiveText"></div>
      <div id="objectiveDistance"></div>
    </div>
    <div id="wantedBanner"></div>
    <div id="subMsg"></div>
    <div id="moneyDisplay">$0</div>
    <div id="minimapWrap"><canvas id="minimap"></canvas></div>

    <div id="speedWrap">
      <div id="speed">0</div>
      <div id="speedUnit">KM/H</div>
      <div id="gear"></div>
    </div>
    <div id="btnSettings">⚙</div>
    <div id="settingsMenu">
      <button id="btnCameraToggle">🎥 Kamera: Oben</button>
      <button id="btnButtonsToggle">👆 Tasten aus</button>
    </div>

    <div id="dialogBox">
      <div id="dialogSpeaker"></div>
      <div id="dialogText"></div>
      <div id="dialogNextBtn">Weiter</div>
    </div>

    <div id="endOverlay">
      <div id="endTitle"></div>
      <div id="endSubtitle"></div>
      <div id="endRestartBtn"></div>
    </div>

    <div id="controlsHint">
      <b>W/↑</b> Gas &nbsp; <b>S/↓</b> Bremse/Rückwärts &nbsp; <b>A/D ←/→</b> Lenken/Drehen &nbsp; <b>Space</b> Handbremse/Springen &nbsp; <b>F</b> Aktion/Ein-Aussteigen &nbsp; <b>C</b> Kamera
    </div>
  </div>

  <div id="mobileControls">
    <div class="mbtn" id="btnLeft">◀</div>
    <div class="mbtn" id="btnRight">▶</div>
    <div class="mbtn" id="btnGas">▲</div>
    <div class="mbtn" id="btnBrake">▼</div>
    <div class="mbtn" id="btnAction">F</div>
    <div class="mbtn" id="btnJump">⬆</div>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
