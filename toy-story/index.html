<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spielzeug-Abenteuer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>

    <div id="hud">
        <div id="hint">
            <strong>Steuerung</strong><br>
            WASD / Pfeiltasten — Laufen<br>
            Leertaste — Hüpfen<br>
            Maus ziehen — Kamera drehen
        </div>
        <button id="hint-toggle">?</button>
    </div>

    <div id="start-screen">
        <div id="start-card">
            <h1>Spielzeug-Abenteuer</h1>
            <p>Lauf als kleine Spielfigur durchs Haus ins Kinderzimmer und tob dich zwischen den Spielzeugen aus.</p>
            <button id="start-btn">Loslaufen</button>
        </div>
    </div>

    <script src="vendor/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
