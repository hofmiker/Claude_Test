<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05050f;
            color: rgba(255,255,255,0.7);
            font-family: -apple-system, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        h1 {
            font-size: 11px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.30);
            margin-bottom: 48px;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 360px;
        }
        a {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 20px 24px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            text-decoration: none;
            transition: border-color 0.2s, background 0.2s;
        }
        a:hover, a:active {
            border-color: rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.03);
        }
        .name {
            font-size: 13px;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.80);
        }
        .desc {
            font-size: 11px;
            letter-spacing: 0.04em;
            color: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>
    <h1>Projects</h1>
    <div class="projects">
        <a href="sonnensystem/">
            <span class="name">Solar Eclipse</span>
            <span class="desc">Interaktives 3D-Sonnensystem</span>
        </a>
        <a href="dhl/">
            <span class="name">DHL City Drive</span>
            <span class="desc">3D-Fahrspiel mit Paketzustellung</span>
        </a>
        <a href="racer/">
            <span class="name">Retro Racer</span>
            <span class="desc">3D-Rennspiel</span>
        </a>
        <a href="bitcoin/">
            <span class="name">Bitcoin Chart</span>
            <span class="desc">3D Candlestick-Visualisierung</span>
        </a>
    </div>
</body>
</html>
