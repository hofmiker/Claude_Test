<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DHL City Drive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; }
#hud { position: fixed; inset: 0; pointer-events: none; font-family: Arial, Helvetica, sans-serif; }
#label { position: absolute; top: 16px; left: 16px; color: #fff; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); }
#ts    { position: absolute; top: 40px; left: 16px; color: rgba(255,255,255,0.55); font-size: 11px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
#minimap { position: absolute; top: 12px; right: 12px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; width: 156px; height: 156px; }
@media (max-width: 768px), (pointer: coarse) { #minimap { width: 104px; height: 104px; } }
#bottom-hud { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.55); border-radius: 26px; padding: 8px 26px; display: flex; gap: 26px; align-items: center; white-space: nowrap; }
#bottom-hud .hud-item { color: #fff; font-size: 16px; font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); display: flex; align-items: center; gap: 6px; }
#hint { position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 13px; text-align: center; transition: opacity 1.5s; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
#intro { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: opacity 0.5s; }
#intro-panel { background: #ffcc00; border-radius: 18px; padding: 32px 52px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.45); }
#intro-panel h1 { font-family: Arial, Helvetica, sans-serif; font-size: 38px; font-weight: bold; color: #222; letter-spacing: 1px; margin-bottom: 10px; }
#intro-panel p  { font-family: Arial, Helvetica, sans-serif; font-size: 15px; color: #444; }
@media (max-width: 480px) { #intro-panel h1 { font-size: 26px; } #intro-panel { padding: 24px 32px; } }
#endpanel { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; pointer-events: all; z-index: 10; }
#endpanel-inner { background: #ffcc00; border-radius: 22px; padding: 38px 64px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
#endpanel-inner h2 { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: bold; color: #222; margin-bottom: 18px; }
.ep-row { font-family: Arial, Helvetica, sans-serif; font-size: 18px; color: #333; margin-bottom: 8px; }
#ep-score { font-family: Arial, Helvetica, sans-serif; font-size: 58px; font-weight: bold; color: #222; margin: 14px 0 4px; }
#ep-score-label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #666; margin-bottom: 16px; }
#btn-retry { margin-top: 14px; background: #CC0000; color: #fff; border: none; border-radius: 14px; padding: 13px 42px; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: bold; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: background 0.18s, transform 0.12s; }
#btn-retry:hover { background: #ee1111; transform: scale(1.04); }
</style>
</head>
<body>
<div id="intro">
  <div id="intro-panel">
    <h1>DHL City Drive</h1>
    <p>Press any Key</p>
  </div>
</div>
<div id="endpanel">
  <div id="endpanel-inner">
    <h2>&#127881; Ziel erreicht!</h2>
    <div class="ep-row">&#128230; <strong id="ep-pkgs"></strong></div>
    <div class="ep-row">&#9201; <strong id="ep-time"></strong></div>
    <div class="ep-row">&#128165; <strong id="ep-crash"></strong></div>
    <div id="ep-score"></div>
    <div id="ep-score-label">Punkte</div>
    <button id="btn-retry" onclick="tryAgain()">Try again</button>
  </div>
</div>
<div id="hud">
  <div id="label">DHL City Drive</div>
  <div id="ts"></div>
  <canvas id="minimap" width="156" height="156"></canvas>
  <div id="bottom-hud">
    <div class="hud-item">&#128230; <span id="pkgcnt">0 / 10</span></div>
    <div class="hud-item">&#9201; <span id="timer">0:00</span></div>
    <div class="hud-item">&#128165; <span id="crashcnt">0</span></div>
  </div>
  <div id="hint">Hoch/Runter wischen = Gas/Bremse · Links/Rechts = Lenken</div>
</div>

<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script>
// ── Renderer / Scene / Camera ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x77ccff);
scene.fog = new THREE.Fog(0x77ccff, 130, 370);

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 420);
function onResize() { renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize', onResize); onResize();

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xfff8f4, 0.85);
sun.position.set(100, 200, 80); sun.castShadow = true; scene.add(sun);

function box(w, h, d, mat, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); m.receiveShadow = true; scene.add(m); return m;
}

const mGnd  = new THREE.MeshLambertMaterial({ color: 0x525258 });
const mRoad = new THREE.MeshLambertMaterial({ color: 0x424248 });
const mSW   = new THREE.MeshLambertMaterial({ color: 0x686870 });
const mYlw  = new THREE.MeshLambertMaterial({ color: 0xffffff });
const mPole = new THREE.MeshLambertMaterial({ color: 0x333333 });
const mTrk  = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
const mCrn  = new THREE.MeshBasicMaterial({ color: 0x2e7a2e });

const gnd = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), mGnd);
gnd.rotation.x = -Math.PI/2; scene.add(gnd);
const mGrassOut=new THREE.MeshLambertMaterial({color:0x3a7a2a});
[[-283,0,434,1000],[382,0,236,1000],[100,283,1000,434],[100,-383,1000,234]].forEach(([cx,cz,W,D])=>{
  const m=new THREE.Mesh(new THREE.PlaneGeometry(W,D),mGrassOut);
  m.rotation.x=-Math.PI/2; m.position.set(cx,0.03,cz); scene.add(m);
});

// ── Grid ──────────────────────────────────────────────────────────────────
const XS=[0,100,200], ZS=[0,-100,-200];
const RH=7, SW=5, EXT=100;
const RING_Z_N=0+EXT, RING_Z_S=-200-EXT; // z=65 (north ring), z=-265 (south ring)
const RING_X_W=0-EXT,  RING_X_E=200+EXT; // x=-65 (west ring), x=265 (east ring)
const GAP=RH+SW+1;
const GAP4=RH*2+SW+1;
const GCX=100, GCZ=-100, GL=400;
const mWht=new THREE.MeshLambertMaterial({color:0xffffff});

// E-W roads; Z=-100 is 4-lane boulevard
[0,-200].forEach(z => box(GL,0.06,RH*2,mRoad,GCX,0.03,z));
box(GL,0.06,RH*4,mRoad,GCX,0.03,-100);
XS.forEach(x => box(x===XS[1]?RH*4:RH*2,0.06,GL,mRoad,x,0.03,GCZ));
// Train Lane (x=100) median strip — 6m wide, skips EW road intersections
{const mw=6;
 [[RING_Z_N-RH, ZS[0]-RH],[ZS[0]+RH, ZS[1]+RH*2],[ZS[1]-RH*2, ZS[2]+RH],[ZS[2]-RH, RING_Z_S+RH]]
 .forEach(([z1,z0])=>{if(z1<=z0)return;const lc=(z1+z0)/2,ln=z1-z0;box(mw,0.3,ln,mSW,XS[1],0.15,lc);});
}
// Intersections: wider at Z=-100 and wider for Train Lane x=100
XS.forEach(x=>{const xw=x===XS[1]?RH*4+1:RH*2+1;[0,-200].forEach(z=>box(xw,0.07,RH*2+1,mRoad,x,0.035,z)); box(xw,0.07,RH*4+1,mRoad,x,0.035,-100);});
// Lane markings — stop short of each intersection (2m gap each side)
const GAP_INT=RH+2; // stop this far from intersection centre
// EW centre lines (stop before each XS intersection)
[0,-200].forEach(z=>{
  // Segments between intersections
  const segs=[[-EXT+XS[0],XS[0]],[XS[0],XS[1]],[XS[1],XS[2]],[XS[2],XS[2]+EXT]];
  segs.forEach(([x0,x1])=>{
    const lx0=x0+(x0===XS[0]-EXT?0:GAP_INT), lx1=x1-(x1===XS[2]+EXT?0:GAP_INT);
    if(lx1>lx0) box(lx1-lx0,0.02,0.22,mYlw,(lx0+lx1)/2,0.08,z);
  });
});
// NS centre lines (stop before each ZS intersection)
XS.forEach(x=>{
  const rh0=ZS[1]===ZS[1]?RH*2:RH; // dummy
  const segs=[[ZS[0]+EXT,ZS[0]],[ZS[0],ZS[1]],[ZS[1],ZS[2]],[ZS[2],ZS[2]-EXT]];
  segs.forEach(([z0,z1])=>{
    const gap0=z0===ZS[0]+EXT?0:( ZS.includes(z0)?GAP_INT:GAP_INT);
    const gap1=z1===ZS[2]-EXT?0:GAP_INT;
    const lz0=Math.min(z0,z1)+gap1, lz1=Math.max(z0,z1)-gap0;
    if(lz1>lz0) box(0.22,0.02,lz1-lz0,mYlw,x,0.08,(lz0+lz1)/2);
  });
});
// Z=-100 boulevard centre + lane dividers (stop before intersections)
{
  const segs=[[-EXT+XS[0],XS[0]],[XS[0],XS[1]],[XS[1],XS[2]],[XS[2],XS[2]+EXT]];
  segs.forEach(([x0,x1])=>{
    const lx0=x0+(x0===XS[0]-EXT?0:GAP_INT+RH), lx1=x1-(x1===XS[2]+EXT?0:GAP_INT+RH);
    if(lx1>lx0){
      box(lx1-lx0,0.02,0.18,mWht,(lx0+lx1)/2,0.086,-100-0.55);
      box(lx1-lx0,0.02,0.18,mWht,(lx0+lx1)/2,0.086,-100+0.55);
      for(let bx=lx0;bx<lx1;bx+=10){
        box(5.5,0.02,0.15,mWht,bx+2.75,0.087,-107);
        box(5.5,0.02,0.15,mWht,bx+2.75,0.087,-93);
      }
    }
  });
}
// Zebra crossings — 4 per intersection (one per approach), 3m before stop line
const mZebra=new THREE.MeshLambertMaterial({color:0xffffff});
const mZebraD=new THREE.MeshLambertMaterial({color:0x444448});
function zebraCross(cx,cz,horiz,roadHW){
  const stripeW=0.8, stripeGap=0.6, depth=3.0;
  const span=(roadHW+SW)*2;
  const n=Math.max(3,Math.floor(span/(stripeW+stripeGap)));
  for(let i=0;i<n;i++){
    const off=-span/2+(i*(stripeW+stripeGap))+stripeW/2;
    if(horiz) box(stripeW,0.06,depth,mZebra,cx+off,0.06,cz);
    else       box(depth,0.06,stripeW,mZebra,cx,0.06,cz+off);
  }
}
XS.forEach(xs=>ZS.forEach(zs=>{
  const rh=zs===ZS[1]?RH*2:RH;
  const xrh=xs===XS[1]?RH*2:RH;
  // North approach (van comes from z>zs)
  zebraCross(xs, zs+rh+2.5, true, xrh);
  // South approach
  zebraCross(xs, zs-rh-2.5, true, xrh);
  // East approach
  zebraCross(xs+xrh+2.5, zs, false, rh);
  // West approach
  zebraCross(xs-xrh-2.5, zs, false, rh);
}));

function ewSW(z) {
  [[XS[0]-RH-EXT,XS[0]-RH],[XS[0]+RH,XS[1]-RH*2],[XS[1]+RH*2,XS[2]-RH],[XS[2]+RH,XS[2]+RH+EXT]]
  .forEach(([x0,x1])=>{if(x1<=x0)return;const lc=(x0+x1)/2,ln=x1-x0;box(ln,0.15,SW,mSW,lc,0.075,z+RH+SW/2);box(ln,0.15,SW,mSW,lc,0.075,z-RH-SW/2);});
}
function ewSW4(z) {
  [[XS[0]-RH-EXT,XS[0]-RH],[XS[0]+RH,XS[1]-RH*2],[XS[1]+RH*2,XS[2]-RH],[XS[2]+RH,XS[2]+RH+EXT]]
  .forEach(([x0,x1])=>{if(x1<=x0)return;const lc=(x0+x1)/2,ln=x1-x0;box(ln,0.15,SW,mSW,lc,0.075,z+RH*2+SW/2);box(ln,0.15,SW,mSW,lc,0.075,z-RH*2-SW/2);});
}
function nsSW(x) {
  const xRH=x===XS[1]?RH*2:RH;
  [[ZS[0]+RH,RING_Z_N-RH],[ZS[1]+RH*2,ZS[0]-RH],[ZS[2]+RH,ZS[1]-RH*2],[RING_Z_S+RH,ZS[2]-RH]]
  .forEach(([z0,z1])=>{if(z1<=z0)return;const lc=(z0+z1)/2,ln=z1-z0;box(SW,0.15,ln,mSW,x+xRH+SW/2,0.075,lc);box(SW,0.15,ln,mSW,x-xRH-SW/2,0.075,lc);});
}
[0,-200].forEach(z=>ewSW(z)); ewSW4(-100); XS.forEach(x=>nsSW(x));

// ── Buildings ─────────────────────────────────────────────────────────────
const bPal=[0x6b7a8d,0x5a6b7a,0x4a5a6b,0x7a8b9a,0x8a7a8a,0x6a5a7a,0x8a9a8a,0x5a8a9a,0x9a8a7a,0x6a7a5a,0x7a6a8a,0x4a7a6a];
const sPal=[0xcc4422,0x2266cc,0x22aa55,0xcc8822,0x884488,0xcc6633,0x226688,0x558833];
let bi=0, si=0;
const collidables=[];
const bldBoxes=[];
const movables=[];
const mFlrS=new THREE.MeshLambertMaterial({color:0xbbbbbb});
function lighten(hex,f){
  const r=Math.min(255,((hex>>16)&0xff)+(((255-((hex>>16)&0xff))*f)|0));
  const g=Math.min(255,(((hex>>8)&0xff))+(((255-(((hex>>8)&0xff)))*f)|0));
  const b=Math.min(255,((hex&0xff))+(((255-((hex&0xff)))*f)|0));
  return(r<<16)|(g<<8)|b;
}
function darken(hex,f){
  const r=Math.round(((hex>>16)&0xff)*(1-f));
  const g=Math.round((((hex>>8)&0xff))*(1-f));
  const b=Math.round(((hex&0xff))*(1-f));
  return(r<<16)|(g<<8)|b;
}
// Glass facade palette for 4 all-glass buildings
const glassPal=[0x4a6878,0x3a5868,0x5a7888,0x486070];
let glassIdx=0;

function winFace(cx,cz,fw,fd,axis,side,floors,flH,sH,style,isEnt,winMat){
  const ext=0.12;
  function addWin(fo,fy,ww,wh){
    const geo=axis==='z'?new THREE.BoxGeometry(ww,wh,ext):new THREE.BoxGeometry(ext,wh,ww);
    const m=new THREE.Mesh(geo,winMat);
    const fp=side*(fd+ext/2);
    m.position.set(axis==='z'?cx+fo:cx+fp, fy, axis==='z'?cz+fp:cz+fo);
    scene.add(m);
  }
  for(let fl=0;fl<floors;fl++){
    const fy=sH+fl*flH+flH*0.55;
    if(style===0){        addWin(0,fy,fw*0.88,flH*0.70);
    }else if(style===1){
      const nW=Math.max(2,Math.floor(fw/4)), ww=fw/(nW+0.5)*0.55, wh=flH*0.55;
      for(let i=0;i<nW;i++) addWin(-fw/2+fw/nW*(i+0.5),fy,ww,wh);
    }else{
      addWin(0,fy,fw*0.82,flH*0.42);
    }
  }
  if(isEnt){
    const ew=Math.min(fw*0.35,5), eh=sH>0?sH*0.75:Math.min(flH*0.82,3.5), ey=eh/2;
    const fp=side*(fd+ext*1.5), ext3=ext*3;
    const mFrm=new THREE.MeshLambertMaterial({color:0x999999});
    const fgeo=axis==='z'?new THREE.BoxGeometry(ew+0.28,eh+0.22,ext3):new THREE.BoxGeometry(ext3,eh+0.22,ew+0.28);
    const fm=new THREE.Mesh(fgeo,mFrm); fm.position.set(axis==='z'?cx:cx+fp,ey,axis==='z'?cz+fp:cz); scene.add(fm);
    const pw=(ew-0.22)/2;
    [-1,1].forEach(s2=>{
      const pgeo=axis==='z'?new THREE.BoxGeometry(pw,eh*0.87,ext3+0.04):new THREE.BoxGeometry(ext3+0.04,eh*0.87,pw);
      const pm=new THREE.Mesh(pgeo,winMat); pm.position.set(axis==='z'?cx+s2*(pw/2+0.06):cx+fp, ey, axis==='z'?cz+fp:cz+s2*(pw/2+0.06)); scene.add(pm);
    });
    if(style%2===0){
      const cw=ew+1.8, cd=2.0;
      const cgeo=axis==='z'?new THREE.BoxGeometry(cw,0.18,cd):new THREE.BoxGeometry(cd,0.18,cw);
      const cm=new THREE.Mesh(cgeo,mFlrS); cm.position.set(axis==='z'?cx:cx+side*(fd+cd/2), ey+eh/2+0.1, axis==='z'?cz+side*(fd+cd/2):cz); scene.add(cm);
    }
  }
}

// ── Building Types ────────────────────────────────────────────────────────
// TypeA: bld(shop=false) — Modern glass building
// TypeB: bld(shop=true)  — Commercial with shopfront
// TypeC: bldTraditional  — 5-story stucco + NYC fire escape
// TypeD: bldRowhouse     — 4-story rowhouse with gable (Giebel)
function bld(x,z,w,d,h,shop,eFz,eFx,glass) {
  const hw=w/2, hd=d/2;
  for(const b of bldBoxes) if(Math.abs(x-b.x)<hw+b.hw+0.4 && Math.abs(z-b.z)<hd+b.hd+0.4) return;
  bldBoxes.push({x,z,hw,hd});
  collidables.push({x,z,hw,hd});
  const style=bi%3;
  let facadeCol, bmat, winMat;
  if(glass){
    facadeCol=glassPal[glassIdx%glassPal.length]; glassIdx++;
    bmat=new THREE.MeshLambertMaterial({color:facadeCol});
    winMat=new THREE.MeshLambertMaterial({color:darken(facadeCol,0.15)}); // slightly darker windows
  } else {
    facadeCol=bPal[bi%bPal.length]; bi++;
    bmat=new THREE.MeshLambertMaterial({color:facadeCol});
    winMat=new THREE.MeshLambertMaterial({color:darken(facadeCol,0.28)}); // darker windows
  }
  const sH=shop?3.8:0, bH=h-sH;
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,bH,d),bmat);
  body.position.set(x,sH+bH/2,z); body.castShadow=true; body.receiveShadow=true; scene.add(body);
  const floors=Math.max(1,Math.floor(bH/4.5)), flH=bH/floors;
  // Floor lines only on 30% of buildings (not glass, not shop ground floor)
  if(!glass && bi%10 < 3){
    for(let r=1;r<floors;r++){
      const wr=new THREE.Mesh(new THREE.BoxGeometry(w+0.1,0.28,d+0.1),mFlrS);
      wr.position.set(x,sH+r*flH,z); scene.add(wr);
    }
  }
  if(glass){
    const mDiv=new THREE.MeshLambertMaterial({color:darken(facadeCol,0.55)});
    [[w,d/2,'z',-1],[w,d/2,'z',+1],[d,w/2,'x',-1],[d,w/2,'x',+1]].forEach(([fw,fd,axis,side])=>{
      const ext=0.1, fp=side*(fd+ext/2);
      const px=axis==='z'?x:x+fp, py=sH+bH/2, pz=axis==='z'?z+fp:z;
      const geo=axis==='z'?new THREE.BoxGeometry(fw*0.94,bH*0.92,ext):new THREE.BoxGeometry(ext,bH*0.92,fw*0.94);
      const m=new THREE.Mesh(geo,winMat); m.position.set(px,py,pz); scene.add(m);
      const nH=Math.max(1,Math.round(bH/4.5)), flH2=bH/nH;
      const nV=Math.max(1,Math.round(fw/4.5));
      for(let f=1;f<nH;f++){
        const hb=new THREE.Mesh(axis==='z'?new THREE.BoxGeometry(fw*0.92,0.22,ext+0.14):new THREE.BoxGeometry(ext+0.14,0.22,fw*0.92),mDiv);
        hb.position.set(px,sH+f*flH2,pz); scene.add(hb);
      }
      const cW=fw/nV;
      for(let v=1;v<nV;v++){
        const vb=new THREE.Mesh(axis==='z'?new THREE.BoxGeometry(0.22,bH*0.88,ext+0.14):new THREE.BoxGeometry(ext+0.14,bH*0.88,0.22),mDiv);
        const voff=v*cW-fw/2;
        vb.position.set(axis==='z'?x+voff:px, py, axis==='z'?pz:z+voff); scene.add(vb);
      }
    });
  } else {
    winFace(x,z,w,d/2,'z',-1,floors,flH,sH,style,eFz===-1,winMat);
    winFace(x,z,w,d/2,'z',+1,floors,flH,sH,style,eFz===+1,winMat);
    winFace(x,z,d,w/2,'x',-1,floors,flH,sH,style,eFx===-1,winMat);
    winFace(x,z,d,w/2,'x',+1,floors,flH,sH,style,eFx===+1,winMat);
  }
  if(shop){
    const shopCol=sPal[si%sPal.length]; si++;
    const smat=new THREE.MeshLambertMaterial({color:shopCol});
    const sf=new THREE.Mesh(new THREE.BoxGeometry(w,sH,d),smat); sf.position.set(x,sH/2,z); sf.castShadow=true; sf.receiveShadow=true; scene.add(sf);
    const shopWin=new THREE.MeshLambertMaterial({color:darken(shopCol,0.28)});
    const gwin=new THREE.Mesh(new THREE.BoxGeometry(w*0.62,sH*0.52,d+0.08),shopWin);
    gwin.position.set(x,sH*0.46,z); scene.add(gwin);
  }
}

// TypeC — 5-story traditional stucco building with NYC fire escape
const stuccoPal=[0xe8dbc8,0xddd0b8,0xe2d5be,0xcdc1af,0xd5c9b8];
const mFE=new THREE.MeshLambertMaterial({color:0x222222});
function bldTraditional(x,z,w,d,eFz,eFx){
  const hw=w/2, hd=d/2;
  for(const b of bldBoxes) if(Math.abs(x-b.x)<hw+b.hw+0.4&&Math.abs(z-b.z)<hd+b.hd+0.4) return;
  bldBoxes.push({x,z,hw,hd}); collidables.push({x,z,hw,hd});
  const floors=5, flH=3.6, bH=floors*flH;
  const facadeCol=stuccoPal[bi%stuccoPal.length]; bi++;
  const bmat=new THREE.MeshLambertMaterial({color:facadeCol});
  const winMat=new THREE.MeshLambertMaterial({color:darken(facadeCol,0.28)});
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,bH,d),bmat);
  body.position.set(x,bH/2,z); body.castShadow=true; scene.add(body);
  const mLed=new THREE.MeshLambertMaterial({color:0xf2ebe0});
  for(let fl=1;fl<=floors;fl++){
    const h2=fl===floors?0.35:0.2;
    const led=new THREE.Mesh(new THREE.BoxGeometry(w+0.3,h2,d+0.3),mLed);
    led.position.set(x,fl*flH-(fl===floors?0:0.1),z); scene.add(led);
  }
  winFace(x,z,w,d/2,'z',-1,floors,flH,0,1,eFz===-1,winMat);
  winFace(x,z,w,d/2,'z',+1,floors,flH,0,1,eFz===+1,winMat);
  winFace(x,z,d,w/2,'x',-1,floors,flH,0,1,eFx===-1,winMat);
  winFace(x,z,d,w/2,'x',+1,floors,flH,0,1,eFx===+1,winMat);
  // NYC fire escape: platforms + zig-zag stairs on entrance facade, right side
  const feOnZ=(eFz!==0);
  const ens=feOnZ?eFz:eFx; // entrance face sign
  const pW=2.4, pD=1.05; // platform width and depth
  for(let fl=1;fl<floors;fl++){
    const fy=fl*flH;
    // Platform position offset to right of entrance
    let px,pz;
    if(feOnZ){ px=x+hw*0.42; pz=z+ens*(hd+pD/2); }
    else      { px=x+ens*(hw+pD/2); pz=z-hd*0.42; }
    // Slab
    const slab=new THREE.Mesh(new THREE.BoxGeometry(feOnZ?pW:pD,0.12,feOnZ?pD:pW),mFE);
    slab.position.set(px,fy,pz); scene.add(slab);
    // Railing (3 outer posts + top rail)
    const rl=0.9;
    for(let ri=0;ri<=4;ri++){
      const post=new THREE.Mesh(new THREE.BoxGeometry(0.05,rl,0.05),mFE);
      if(feOnZ) post.position.set(px-pW/2+ri*pW/4,fy+rl/2,pz+ens*pD/2);
      else      post.position.set(px+ens*pD/2,fy+rl/2,pz-pW/2+ri*pW/4);
      scene.add(post);
    }
    const rail=new THREE.Mesh(new THREE.BoxGeometry(feOnZ?pW:0.05,0.05,feOnZ?0.05:pW),mFE);
    if(feOnZ) rail.position.set(px,fy+rl,pz+ens*pD/2);
    else      rail.position.set(px+ens*pD/2,fy+rl,pz);
    scene.add(rail);
    // Zig-zag stair between this floor and next (alternating X/Z offset)
    if(fl<floors-1){
      const alt=(fl%2===0?1:-1);
      const str=new THREE.Mesh(new THREE.BoxGeometry(feOnZ?0.55:pD*0.7,flH*0.88,feOnZ?pD*0.7:0.55),mFE);
      if(feOnZ){ str.rotation.z=-ens*0.38; str.position.set(px+alt*pW*0.28,fy+flH*0.44,pz-ens*0.18); }
      else     { str.rotation.x=ens*0.38;  str.position.set(px-ens*0.18,fy+flH*0.44,pz+alt*pW*0.28); }
      scene.add(str);
    }
  }
  // Drop ladder floor 1 → ground
  const dl=new THREE.Mesh(new THREE.BoxGeometry(0.1,flH*0.85,0.1),mFE);
  if(feOnZ) dl.position.set(x+hw*0.42,flH*0.42,z+ens*(hd+0.45));
  else      dl.position.set(x+ens*(hw+0.45),flH*0.42,z-hd*0.42);
  scene.add(dl);
}

const brickPal=[0x8b5a3a,0x9a6a45,0x7a4a2a,0xa06040,0x8c5c40];
const mRoofTile=new THREE.MeshLambertMaterial({color:0x7a2020});
function bldRowhouse(x,z,w,d,eFz,eFx){
  const hw=w/2, hd=d/2;
  for(const b of bldBoxes) if(Math.abs(x-b.x)<hw+b.hw+0.4&&Math.abs(z-b.z)<hd+b.hd+0.4) return;
  bldBoxes.push({x,z,hw,hd}); collidables.push({x,z,hw,hd});
  const floors=4, flH=3.2, bH=floors*flH;
  const facadeCol=brickPal[bi%brickPal.length]; bi++;
  const bmat=new THREE.MeshLambertMaterial({color:facadeCol});
  const winMat=new THREE.MeshLambertMaterial({color:darken(facadeCol,0.28)});
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,bH,d),bmat);
  body.position.set(x,bH/2,z); body.castShadow=true; scene.add(body);
  // Thin window ledges
  const mWLed=new THREE.MeshLambertMaterial({color:0xd0c0a8});
  for(let fl=1;fl<floors;fl++){
    const l=new THREE.Mesh(new THREE.BoxGeometry(w+0.12,0.14,d+0.12),mWLed);
    l.position.set(x,fl*flH,z); scene.add(l);
  }
  // Gable (Giebel) — triangular prism on top via ExtrudeGeometry
  const gH=hw*0.7; // gable height relative to half-width
  const gShape=new THREE.Shape();
  gShape.moveTo(-hw,0); gShape.lineTo(hw,0); gShape.lineTo(0,gH); gShape.closePath();
  const gGeo=new THREE.ExtrudeGeometry(gShape,{depth:d,bevelEnabled:false});
  const gMesh=new THREE.Mesh(gGeo,mRoofTile);
  // Shape is in XY, extruded +Z, so position: x=x, y=bH, z=z-hd
  gMesh.position.set(x,bH,z-hd); scene.add(gMesh);
  // Windows (double per floor on entrance face, single on sides)
  winFace(x,z,w,d/2,'z',-1,floors,flH,0,1,eFz===-1,winMat);
  winFace(x,z,w,d/2,'z',+1,floors,flH,0,1,eFz===+1,winMat);
  winFace(x,z,d,w/2,'x',-1,floors,flH,0,2,eFx===-1,winMat);
  winFace(x,z,d,w/2,'x',+1,floors,flH,0,2,eFx===+1,winMat);
  // Entry door (wood-colored)
  const mDoor=new THREE.MeshLambertMaterial({color:0x5a3a1a});
  if(eFz!==0){
    const dr=new THREE.Mesh(new THREE.BoxGeometry(1.4,2.5,0.15),mDoor);
    dr.position.set(x-hw*0.3,1.25,z+eFz*(hd+0.08)); scene.add(dr);
  } else if(eFx!==0){
    const dr=new THREE.Mesh(new THREE.BoxGeometry(0.15,2.5,1.4),mDoor);
    dr.position.set(x+eFx*(hw+0.08),1.25,z-hd*0.3); scene.add(dr);
  }
}

// ── Highway L-arm traffic lights — 4 per intersection, one per approach ──────
const mGantry=new THREE.MeshLambertMaterial({color:0x555560});
function lArmTL(px,pz,armX,armZ,tlDir){
  const g=new THREE.Group(); g.position.set(px,0,pz); scene.add(g);
  const poleH=5.8;
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.14,poleH,6),mGantry); pole.position.y=poleH/2; g.add(pole);
  const armLen=4.5;
  const armGeo=new THREE.BoxGeometry(Math.abs(armX)*armLen+0.2,0.22,Math.abs(armZ)*armLen+0.2);
  const arm=new THREE.Mesh(armGeo,mGantry); arm.position.set(armX*armLen/2,poleH,armZ*armLen/2); g.add(arm);
  const hx=armX*armLen, hz=armZ*armLen;
  const hous=new THREE.Mesh(new THREE.BoxGeometry(0.6,1.9,0.6),mHou); hous.position.set(hx,poleH-1.15,hz); g.add(hous);
  const lights=TL_COLS.map((col,li)=>{
    const mat=new THREE.MeshLambertMaterial({color:0x1a1a1a,emissive:new THREE.Color(0x000000)});
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.2,6,4),mat); m.position.set(hx,poleH-0.55-li*0.62,hz); g.add(m); return m;
  });
  tlAll.push(lights); tlDark.push(false); tlHitCount.push(999); tlHitCool.push(0); tlPhase.push(tlDir);
  tlPoles.push(g);
}

  // South approach (driving north): pole east, arm west, before z=-100
  lArmTL(x+nsRH+SW+1, z0-hRH-14,-1, 0, 1);

// ── Bus route: outer ring, right lane, stop-to-stop ──────────────────────
// Right lane offsets: E-W roads z±3.5, N-S roads x±3.5
// Stops midway between intersections, clear of barriers
// Right lane: going E z=-3.5, going S x=196.5, going W z=-196.5, going N x=3.5
// Bus route: outer ring, right-lane offset 3.5m, extra corner waypoints to avoid sidewalk cut
const busRoute=[
  [20,-3.5],   [50,-3.5],   [174,-3.5],
  [189,-3.5],  [196.5,-14],
  [196.5,-50], [196.5,-178],
  [196.5,-189],[189,-196.5],
  [150,-196.5],[26,-196.5],
  [14,-196.5], [3.5,-189],
  [3.5,-150],  [3.5,-14],
  [3.5,-3.5],  [14,-3.5],
  [20,-3.5],
];
const BUS_SPD=0.008, BUS_HW=1.4, BUS_HD=6.5;
let busWI=0, busX=20, busZ=-3.5, busAng=Math.PI/2;
let busSpd=BUS_SPD;
let busStopTimer=0;
let busStopCooldown=0;
const VHW=1.1, VHD=2.2;
function tickBus(dt){
  if(busStopTimer>0){
    busStopTimer-=dt;
    busGrp.position.set(busX,0,busZ); busGrp.rotation.y=busAng;
    return;
  }
  if(busStopCooldown>0) busStopCooldown-=dt;
  busSpd=BUS_SPD;

  const ni=(busWI+1)%busRoute.length;
  const [tx,tz]=busRoute[ni];
  if(Math.sqrt((tx-busX)**2+(tz-busZ)**2)<4) busWI=ni;
  const [ntx,ntz]=busRoute[(busWI+1)%busRoute.length];
  const tAng=Math.atan2(ntx-busX,ntz-busZ);
  let da=tAng-busAng; while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
  busAng+=da*Math.min(1,0.022*dt); // smoother steering

  // Bus drives through everything — no collision detection
  const bfx=Math.sin(busAng), bfz=Math.cos(busAng);
  busX+=bfx*busSpd*dt; busZ+=bfz*busSpd*dt;

  if(busStopCooldown<=0){
    for(const [sx,sz] of busStopPositions){
      if(Math.sqrt((sx-busX)**2+(sz-busZ)**2)<7){
        busStopTimer=3500; busStopCooldown=9000; break;
      }
    }
  }
  busGrp.position.set(busX,0,busZ); busGrp.rotation.y=busAng;
}

// ── Minimap ───────────────────────────────────────────────────────────────
const mmC=document.getElementById('minimap'), mmCtx=mmC.getContext('2d'), MM=mmC.width;
function drawMM(vx,vz,vAng){
  const cx=MM/2, cy=MM/2, sc=MM/380;
  mmCtx.clearRect(0,0,MM,MM);
  mmCtx.fillStyle='rgba(10,12,28,0.88)'; mmCtx.fillRect(0,0,MM,MM);
  mmCtx.save();
  mmCtx.beginPath(); mmCtx.arc(cx,cy,cx-1,0,Math.PI*2); mmCtx.clip();
  mmCtx.translate(cx,cy);
  mmCtx.rotate(vAng);
  const mx=(x)=>-(x-vx)*sc, mz=(z)=>-(z-vz)*sc;
  ZS.forEach(z=>{
    mmCtx.strokeStyle='#555566';
    mmCtx.lineWidth=z===ZS[1]?9:5;
    mmCtx.beginPath(); mmCtx.moveTo(mx(RING_X_W),mz(z)); mmCtx.lineTo(mx(RING_X_E),mz(z)); mmCtx.stroke();
  });
  XS.forEach(x=>{
    mmCtx.strokeStyle='#555566'; mmCtx.lineWidth=5;
    mmCtx.beginPath(); mmCtx.moveTo(mx(x),mz(RING_Z_N)); mmCtx.lineTo(mx(x),mz(RING_Z_S)); mmCtx.stroke();
  });
  mmCtx.strokeStyle='#444455'; mmCtx.lineWidth=5;
  [RING_Z_N,RING_Z_S].forEach(z=>{ mmCtx.beginPath(); mmCtx.moveTo(mx(RING_X_W),mz(z)); mmCtx.lineTo(mx(RING_X_E),mz(z)); mmCtx.stroke(); });
  [RING_X_W,RING_X_E].forEach(x=>{ mmCtx.beginPath(); mmCtx.moveTo(mx(x),mz(RING_Z_N)); mmCtx.lineTo(mx(x),mz(RING_Z_S)); mmCtx.stroke(); });
  packages.forEach(p=>{ if(!p.collected){ mmCtx.fillStyle='#FFcc00'; mmCtx.fillRect(mx(p.x)-3,mz(p.z)-3,6,6); }});
  mmCtx.restore();
  // North indicator (fixed, not rotating) — small N with arrow at top
  mmCtx.save();
  mmCtx.fillStyle='rgba(255,255,255,0.7)'; mmCtx.font='bold 9px sans-serif'; mmCtx.textAlign='center';
  mmCtx.fillText('N',cx,10);
  mmCtx.fillStyle='rgba(255,255,255,0.5)'; mmCtx.beginPath(); mmCtx.moveTo(cx,11); mmCtx.lineTo(cx-3,17); mmCtx.lineTo(cx+3,17); mmCtx.closePath(); mmCtx.fill();
  mmCtx.restore();
  // Van arrow (always centered, rotates)
  mmCtx.save(); mmCtx.translate(cx,cy); mmCtx.fillStyle='#FC0';
  mmCtx.beginPath(); mmCtx.moveTo(0,-8); mmCtx.lineTo(-5,5); mmCtx.lineTo(0,2); mmCtx.lineTo(5,5); mmCtx.closePath(); mmCtx.fill();
  mmCtx.restore();
}

// ── Physics (free movement) ───────────────────────────────────────────────
const MAXSPD=0.018, ACC=0.000007, BRK=0.000035, FRIC=0.000006, STEER=0.002;
let vanX=0, vanZ=30, vanAngle=Math.PI, spd=0, steerAng=0;
const tsEl=document.getElementById('ts');
tsEl.textContent=`v2.15 · 21.05.2026`;

let prev=performance.now();
const camP=new THREE.Vector3();

function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min(now-prev,50); prev=now;

  tickBus(dt);

  // ── Traffic light cycle ────────────────────────────────────────────────────
  tlPhaseT+=dt;
  if(tlPhaseT>=TL_DUR[tlGlobalPhase]){
    tlPhaseT-=TL_DUR[tlGlobalPhase];
    tlGlobalPhase=(tlGlobalPhase+1)%4;
    updateTLLights();
  }
  for(let i=0;i<tlHitCool.length;i++) if(tlHitCool[i]>0) tlHitCool[i]-=dt;

  clouds.forEach(c=>{c.g.position.x+=c.spd*dt; if(c.g.position.x>500)c.g.position.x=-500; else if(c.g.position.x<-500)c.g.position.x=500;});

  // ── Elevated rail train ───────────────────────────────────────────────────
  if(!trainActive){
    trainTimer-=dt;
    if(trainTimer<=0){ trainActive=true; trainStopping=false; trainT=-700; trainSpd=0; }
  } else {
    if(trainStopping){
      trainT=RAIL_STATION_T; // locked — no jitter
      trainStopTimer-=dt;
      if(trainStopTimer<=0){ trainStopping=false; }
    } else {
      const distToStn=RAIL_STATION_T-trainT; // positive when approaching station
      if(distToStn>0 && distToStn<TRAIN_BRAKE_DIST){
        // Quadratic braking — speed falls to zero as train reaches station
        const frac=distToStn/TRAIN_BRAKE_DIST;
        trainSpd=TRAIN_MAX_SPD*frac*frac;
        if(distToStn<1){ trainStopping=true; trainStopTimer=TRAIN_STOP_DUR; trainT=RAIL_STATION_T; trainSpd=0; }
      } else {
        // Accelerate: quadratic feel (ever faster up to max)
        trainSpd=Math.min(TRAIN_MAX_SPD, trainSpd+TRAIN_ACCEL*dt);
      }
      trainT+=trainSpd*dt;
    }
    trainGrp.position.set(RAIL_CX,RAIL_Y2+0.6,trainT);
    if(trainT>700){ trainActive=false; trainTimer=15000+Math.random()*10000; trainSpd=0; }
  }

  // ── DHL cargo plane ───────────────────────────────────────────────────────
  if(!planeActive){
    planeTimer-=dt;
    if(planeTimer<=0){
      planeActive=true;
      // Spawn at edge of city perimeter, aim through center, different angle each pass
      planeAngle=(planeAngle+Math.PI*0.7+Math.random()*1.2)%(Math.PI*2);
      const offset=500;
      planeX=100-Math.cos(planeAngle)*offset;
      planeZ=-100-Math.sin(planeAngle)*offset;
      planeY=110+Math.random()*30;
      planeGrp.position.set(planeX,planeY,planeZ);
      planeGrp.rotation.y=-planeAngle+Math.PI/2;
    }
  } else {
    planeX+=Math.cos(planeAngle)*PLANE_SPD*dt;
    planeZ+=Math.sin(planeAngle)*PLANE_SPD*dt;
    planeGrp.position.x=planeX; planeGrp.position.z=planeZ;
    const dist2=Math.sqrt((planeX-100)**2+(planeZ+100)**2);
    if(dist2>550){ planeActive=false; planeTimer=10000; }
  }

  // ── Birds ──────────────────────────────────────────────────────────────────
  birds.forEach(b=>{
    b.ang+=b.spd*0.004*dt;
    b.flapT+=0.006*dt;
    const wingFlap=Math.sin(b.flapT)*0.5;
    b.g.children.forEach((w,i)=>{ w.rotation.z=(i===0?1:-1)*wingFlap*0.6; });
    b.g.position.x=b.circleX+Math.cos(b.ang)*b.circleR;
    b.g.position.z=b.circleZ+Math.sin(b.ang)*b.circleR;
    b.g.position.y=b.y+Math.sin(b.flapT*0.3)*2;
    b.g.rotation.y=-b.ang-Math.PI/2;
  });

  // ── Intro camera ─────────────────────────────────────────────────────────
  if(introPhase===0){
    introAngle+=dt*0.00022;
    camera.position.set(100+Math.sin(introAngle)*150, 210, -100+Math.cos(introAngle)*150);
    camera.lookAt(100, 0, -100);
    van.position.set(vanX,0,vanZ); van.rotation.y=vanAngle;
    drawMM(vanX,vanZ,vanAngle);
    renderer.render(scene,camera);
    return;
  }
  if(introPhase===1){
    introT+=dt;
    const t=Math.min(introT/3000,1);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const fx0=Math.sin(vanAngle), fz0=Math.cos(vanAngle);
    const tp=new THREE.Vector3(vanX-fx0*9,4.2,vanZ-fz0*9);
    camera.position.lerpVectors(introStartCamPos,tp,ease);
    const lookTgt=new THREE.Vector3(100,0,-100).lerp(new THREE.Vector3(vanX+fx0*4,1.2,vanZ+fz0*4),ease);
    camera.lookAt(lookTgt);
    if(t>=1){ introPhase=2; gameStartTime=performance.now(); }
    van.position.set(vanX,0,vanZ); van.rotation.y=vanAngle;
    drawMM(vanX,vanZ,vanAngle);
    renderer.render(scene,camera);
    return;
  }

  if(!engOsc&&audioCtx) initEngine();
  const gas=K['ArrowUp']||K['KeyW']   ||(touch.active&&touch.dy<-TDEAD);
  const brk=K['ArrowDown']||K['KeyS'] ||(touch.active&&touch.dy>TDEAD);

  if(gas)      spd=spd<0?Math.min(spd+BRK*dt,0):Math.min(spd+ACC*dt,MAXSPD);
  else if(brk) spd=spd>0.0001?Math.max(spd-BRK*dt,0):Math.max(spd-ACC*0.9*dt,-MAXSPD*0.55);
  else         {const f=FRIC*dt; spd=Math.abs(spd)<f?0:spd-Math.sign(spd)*f;}

  let steerTgt=0;
  if(Math.abs(spd)>0.0001){
    const sr=STEER*(Math.abs(spd)/MAXSPD), sdir=spd>=0?1:-1;
    if(K['ArrowLeft']||K['KeyA'])  { vanAngle+=sr*dt*sdir; steerTgt= 0.45; }
    if(K['ArrowRight']||K['KeyD']) { vanAngle-=sr*dt*sdir; steerTgt=-0.45; }
    if(touch.active){
      const raw=Math.abs(touch.dx)>TDEAD?(touch.dx-Math.sign(touch.dx)*TDEAD)/130:0;
      const clamped=Math.max(-1,Math.min(1,raw));
      vanAngle-=clamped*sr*dt*sdir; steerTgt=-clamped*0.45;
    }
  }
  steerAng+=(steerTgt-steerAng)*0.12;
  fwGroups.forEach(g=>g.rotation.y=steerAng);

  const fx=Math.sin(vanAngle), fz=Math.cos(vanAngle);
  const nx=vanX+fx*spd*dt, nz=vanZ+fz*spd*dt;
  let hitX=false, hitZ=false, tlHit=null;
  for(const c of collidables){
    const txHit=Math.abs(nx-c.x)<VHW+c.hw && Math.abs(vanZ-c.z)<VHD+c.hd;
    const tzHit=Math.abs(vanX-c.x)<VHW+c.hw && Math.abs(nz-c.z)<VHD+c.hd;
    if(txHit) hitX=true;
    if(tzHit) hitZ=true;
    if((txHit||tzHit) && c.tlIdx!==undefined && !tlHit) tlHit=c;
  }
  if(tlHit){
    const idx=tlHit.tlIdx, tl=tlPoles[idx];
    if(tlHitCool[idx]>0){}
    else if(tlHitCount[idx]===0){
      tlHitCount[idx]=1; tlHitCool[idx]=700;
      tl.rotation.z=-(fx*0.45); tl.rotation.x=(fz*0.45);
      if(!tlDark[idx]){ tlDark[idx]=true; tlAll[idx].forEach(m=>m.material.emissive.set(0)); }
      spawnSparks(tl.position.x,5.5,tl.position.z,0x111111);
      playCrashTL(0.7);
      const cObj=collidables.find(c=>c.tlIdx===idx);
      if(cObj){ cObj.hw=0.25; cObj.hd=0.25; }
    } else if(tlHitCount[idx]===1){
      tlHitCount[idx]=2; tlHitCool[idx]=700;
      tl.rotation.z=-(fx*1.57); tl.rotation.x=(fz*1.57);
      spawnSparks(tl.position.x,3.5,tl.position.z,0x111111);
      playCrashTL(0.9);
      const cIdx=collidables.findIndex(c=>c.tlIdx===idx);
      if(cIdx!==-1) collidables.splice(cIdx,1);
    }
  }
  // Sparks update
  for(let i=sparkPool.length-1;i>=0;i--){
    const s=sparkPool[i]; s.t+=dt;
    s.mesh.position.x+=s.vx*dt*0.005; s.mesh.position.y+=s.vy*dt*0.005; s.vy-=11*dt*0.005; s.mesh.position.z+=s.vz*dt*0.005;
    if(s.t>700){ scene.remove(s.mesh); sparkPool.splice(i,1); }
  }
  if(hitX&&hitZ){
    spd*=-0.5;
    // Unstick: push van back along its heading so it can't get permanently wedged
    vanX-=fx*Math.max(0.2,Math.abs(spd*dt*2));
    vanZ-=fz*Math.max(0.2,Math.abs(spd*dt*2));
  } else {
    if(!hitX) vanX=nx;
    if(!hitZ) vanZ=nz;
  }

  // Movables collision (van)
  for(const mv of movables){
    if(mv.hitCool>0) mv.hitCool-=dt;
    if(mv.stage===2) continue;
    const mhit=Math.abs(vanX-mv.x)<VHW+mv.hw && Math.abs(vanZ-mv.z)<VHD+mv.hd;
    if(mhit && mv.hitCool<=0){
      mv.hitCool=600;
      if(mv.isTree) playCrashTree(0.5); else playCrash(0.5);
      crashCount++;
      crashEl.textContent=`${crashCount}`;
      const push=Math.max(0.18,Math.abs(spd)/MAXSPD*0.42);
      mv.vx=fx*push; mv.vz=fz*push;
      if(mv.isTree){
        spawnSparks(mv.x,2.5,mv.z,0x5a3010);
        if(mv.stage===0){ mv.stage=1; mv.fallDir=Math.atan2(fx,fz); mv.fallTarget=Math.PI/5; }
        else if(mv.stage===1){ mv.stage=2; mv.fallDir=Math.atan2(fx,fz); mv.fallTarget=Math.PI/2; }
      } else {
        if(mv.stage===0){ mv.stage=1; mv.fallDir=Math.atan2(fx,fz); mv.fallTarget=Math.PI/5; }
        else if(mv.stage===1){ mv.stage=2; mv.fallDir=Math.atan2(fx,fz); mv.fallTarget=Math.PI/2; }
      }
    }
  }
  if(K['KeyR'] && !gameEnded){ vanX=0;vanZ=30;vanAngle=Math.PI;spd=0; }

  // Update timer
  if(!gameEnded&&gameStartTime!==null){
    elapsedMs=performance.now()-gameStartTime;
    const s=Math.floor(elapsedMs/1000), m=Math.floor(s/60), sec=s%60;
    timerEl.textContent=`${m}:${sec.toString().padStart(2,'0')}`;
  }

  van.position.set(vanX,0,vanZ);
  van.rotation.y=vanAngle;

  packages.forEach(p=>{
    if(p.collected) return;
    const dist=Math.sqrt((vanX-p.x)**2+(vanZ-p.z)**2);
    p.ring.lookAt(camera.position);
    p.ringMat.opacity=Math.max(0,Math.min(1,(50-dist)/25));
    if(dist<3.2){ p.collected=true; scene.remove(p.group); pkgCollected++; updatePkgUI(); spawnCollectFX(p.x,p.z); playCollect();
      if(pkgCollected>=10&&!gameEnded){ gameEnded=true; showEndPanel(); }
    }
  });
  // Collect FX update
  for(let i=fxPool.length-1;i>=0;i--){
    const e=fxPool[i]; e.t+=dt; const pr=e.t/500;
    e.mesh.scale.setScalar(1+pr*5); e.mat.opacity=0.9*(1-pr);
    if(pr>=1){ scene.remove(e.mesh); fxPool.splice(i,1); }
  }

  updateEngine(Math.abs(spd),MAXSPD);
  const spdFac=Math.abs(spd)/MAXSPD;
  const camDist=9+spdFac*11, camH=Math.min(8.0,4.2+spdFac*4.5);
  camP.set(vanX-fx*camDist,camH,vanZ-fz*camDist);
  camera.position.lerp(camP,0.14);
  camera.lookAt(vanX+fx*4,1.2,vanZ+fz*4);

  // Update movables (slide + tree fall)
  for(const mv of movables){
    if(mv.vx!==0||mv.vz!==0){
      const nx2=mv.x+mv.vx*dt*0.06, nz2=mv.z+mv.vz*dt*0.06;
      let blocked=false;
      for(const b of bldBoxes) if(Math.abs(nx2-b.x)<mv.hw+b.hw&&Math.abs(nz2-b.z)<mv.hd+b.hd){blocked=true;break;}
      if(!blocked){ mv.x=nx2; mv.z=nz2; mv.group.position.x=mv.x; mv.group.position.z=mv.z; }
      else { mv.vx=0; mv.vz=0; }
      const fric=Math.pow(0.86,dt/16);
      mv.vx*=fric; mv.vz*=fric;
      if(Math.abs(mv.vx)<0.0005) mv.vx=0;
      if(Math.abs(mv.vz)<0.0005) mv.vz=0;
    }
    if(mv.stage>=1&&mv.fallAngle<mv.fallTarget){
      const rate=mv.stage===2?0.005:0.0025;
      mv.fallAngle=Math.min(mv.fallTarget, mv.fallAngle+dt*rate);
      mv.group.rotation.x=Math.sin(mv.fallDir)*mv.fallAngle;
      mv.group.rotation.z=-Math.cos(mv.fallDir)*mv.fallAngle;
    }
  }

  drawMM(vanX,vanZ,vanAngle);
  renderer.render(scene,camera);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
