<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sonnensystem</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#05060e; touch-action:none; user-select:none; }

#stars-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

#scene {
  position:fixed; inset:0; z-index:1;
  transform-origin:50% 50%;
  will-change:transform;
  transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);
}

#rings-canvas { position:absolute; inset:0; pointer-events:none; }

.pw {
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  transition:transform 0.32s cubic-bezier(0.34,1.28,0.64,1);
  z-index:2;
}
.pw canvas { display:block; }

#panel {
  position:fixed; z-index:300;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(272px, 88vw);
  background:rgba(6,8,18,0.88);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.07);
  border-radius:3px; padding:22px 24px 26px;
  opacity:0; pointer-events:none;
  transition:opacity .32s;
}
#panel.on { opacity:1; pointer-events:all; }
#p-close {
  position:absolute; top:10px; right:13px;
  font-size:20px; line-height:1; color:rgba(255,255,255,.35);
  background:none; border:none; cursor:pointer; font-family:Helvetica,Arial,sans-serif;
}
#p-close:hover { color:rgba(255,255,255,.7); }
#p-name { font-family:Helvetica,Arial,sans-serif; font-size:28px; font-weight:300; letter-spacing:-.01em; color:#eceef6; line-height:1; margin-bottom:4px; }
#p-type { font-family:Helvetica,Arial,sans-serif; font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:rgba(190,200,220,.32); margin-bottom:20px; }
.fact-row { padding:6px 0; border-top:1px solid rgba(255,255,255,.055); font-family:Helvetica,Arial,sans-serif; }
.fact-row:last-child { border-bottom:1px solid rgba(255,255,255,.055); }
.fact-label { font-size:7px; letter-spacing:.16em; text-transform:uppercase; color:rgba(190,200,220,.26); margin-bottom:2px; }
.fact-val { font-size:12px; font-weight:300; color:rgba(215,222,238,.76); }
#p-desc { margin-top:16px; font-family:Helvetica,Arial,sans-serif; font-size:10px; line-height:1.8; color:rgba(190,200,220,.38); }

#hint {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  font-family:Helvetica,Arial,sans-serif;
  font-size:8px; letter-spacing:.14em; text-transform:uppercase;
  color:rgba(190,200,220,.18); z-index:400; pointer-events:none;
  opacity:0; transition:opacity .4s;
}
#hint.on { opacity:1; }
#build-time {
  position:fixed; top:10px; left:12px; z-index:400;
  font-family:Helvetica,Arial,sans-serif;
  font-size:8px; letter-spacing:.10em;
  color:rgba(190,200,220,.22); pointer-events:none;
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="scene"><canvas id="rings-canvas"></canvas></div>

<div id="panel">
  <button id="p-close">×</button>
  <div id="p-name"></div>
  <div id="p-type"></div>
  <div id="p-facts"></div>
  <div id="p-desc"></div>
</div>
<div id="build-time">Deploy: 05.05.2026 18:22</div>
<div id="hint">tippen zum schließen</div>

<script>
// ── Bodies (real orbital order) ───────────────────────────────────────────────
const BODIES = [
  { id:'sonne',   name:'Sonne',   type:'Stern',         r:696340, au:0,
    c1:'#ffd04a', c2:'#7a2800',
    facts:[{l:'Durchmesser',v:'1 392 680 km'},{l:'Masse',v:'1,99 × 10³⁰ kg'},{l:'Oberfl.-Temp.',v:'5 778 K'},{l:'Rotation',v:'25–35 Tage'}],
    desc:'Die Sonne enthält 99,86 % der Masse unseres Sonnensystems. Ihr Kern erreicht 15 Millionen Kelvin.' },
  { id:'merkur',  name:'Merkur',  type:'Gesteinsplanet',r:2440,  au:0.387,
    c1:'#ccc4b4', c2:'#302828',
    facts:[{l:'Durchmesser',v:'4 879 km'},{l:'Abstand',v:'0,387 AE'},{l:'Umlaufzeit',v:'88 Tage'},{l:'Temp.',v:'−173 bis +427 °C'}],
    desc:'Merkur hat keine Atmosphäre und damit die extremsten Temperaturschwankungen aller Planeten.' },
  { id:'venus',   name:'Venus',   type:'Gesteinsplanet',r:6051,  au:0.723,
    c1:'#f0d060', c2:'#604010',
    facts:[{l:'Durchmesser',v:'12 104 km'},{l:'Abstand',v:'0,723 AE'},{l:'Umlaufzeit',v:'225 Tage'},{l:'Temp.',v:'465 °C'}],
    desc:'Die Venus ist heißer als Merkur. Ihr extremer Treibhauseffekt und die rückläufige Rotation machen sie einzigartig.' },
  { id:'erde',    name:'Erde',    type:'Gesteinsplanet',r:6371,  au:1.000,
    c1:'#5090e0', c2:'#102848',
    facts:[{l:'Durchmesser',v:'12 742 km'},{l:'Abstand',v:'1,000 AE'},{l:'Umlaufzeit',v:'365 Tage'},{l:'Monde',v:'1'}],
    desc:'Die Erde ist der einzige bekannte Planet mit Leben. Ihre tektonischen Platten formen kontinuierlich die Oberfläche.' },
  { id:'mars',    name:'Mars',    type:'Gesteinsplanet',r:3390,  au:1.524,
    c1:'#e05030', c2:'#500808',
    facts:[{l:'Durchmesser',v:'6 779 km'},{l:'Abstand',v:'1,524 AE'},{l:'Umlaufzeit',v:'687 Tage'},{l:'Monde',v:'2'}],
    desc:'Der Olympus Mons ist mit 22 km der größte Vulkan im Sonnensystem. Die Atmosphäre besteht zu 95 % aus CO₂.' },
  { id:'jupiter', name:'Jupiter', type:'Gasriese',      r:71492, au:5.203,
    c1:'#e8b868', c2:'#6a2808',
    facts:[{l:'Durchmesser',v:'142 984 km'},{l:'Abstand',v:'5,203 AE'},{l:'Umlaufzeit',v:'11,9 Jahre'},{l:'Monde',v:'95'}],
    desc:'Der Große Rote Fleck ist ein Sturm größer als die Erde — er tobt seit mindestens 350 Jahren.' },
  { id:'saturn',  name:'Saturn',  type:'Gasriese',      r:60268, au:9.537, ring:true,
    c1:'#f0d080', c2:'#806020',
    facts:[{l:'Durchmesser',v:'120 536 km'},{l:'Abstand',v:'9,537 AE'},{l:'Umlaufzeit',v:'29,5 Jahre'},{l:'Monde',v:'146'}],
    desc:'Saturns Ringe bestehen aus Eis und Gestein — trotz ihres Durchmessers oft weniger als 100 Meter dünn.' },
  { id:'uranus',  name:'Uranus',  type:'Eisriese',      r:25559, au:19.19,
    c1:'#98e0ec', c2:'#186878',
    facts:[{l:'Durchmesser',v:'51 118 km'},{l:'Abstand',v:'19,19 AE'},{l:'Umlaufzeit',v:'84 Jahre'},{l:'Achsenneigung',v:'97,8°'}],
    desc:'Uranus rotiert quasi auf der Seite. Methan in der Atmosphäre absorbiert rotes Licht und erzeugt das Blaugrün.' },
  { id:'neptun',  name:'Neptun',  type:'Eisriese',      r:24764, au:30.07,
    c1:'#4870e8', c2:'#101468',
    facts:[{l:'Durchmesser',v:'49 528 km'},{l:'Abstand',v:'30,07 AE'},{l:'Umlaufzeit',v:'165 Jahre'},{l:'Wind',v:'bis 2 100 km/h'}],
    desc:'Neptun besitzt die stärksten Winde im Sonnensystem. Triton, sein größter Mond, umkreist ihn rückläufig.' },
];

const PLANETS = BODIES.filter(b => b.au > 0);
const AU_MIN = 0.387, AU_MAX = 30.07;

// ── Helpers ───────────────────────────────────────────────────────────────────
function seededRand(seed) {
  let s = (seed|0)+1;
  return () => { s=Math.imul(s^(s>>>15),s|1); s^=s+Math.imul(s^(s>>>7),s|61); return ((s^(s>>>14))>>>0)/0xffffffff; };
}
function makeNoise(seed) {
  const SZ=256, rng=seededRand(seed), t=new Float32Array(SZ*SZ);
  for(let i=0;i<t.length;i++) t[i]=rng()*2-1;
  return (nx,ny)=>{
    const xi=Math.floor(nx)&(SZ-1), yi=Math.floor(ny)&(SZ-1);
    const fx=nx-Math.floor(nx), fy=ny-Math.floor(ny);
    const ux=fx*fx*(3-2*fx), uy=fy*fy*(3-2*fy);
    const x1=(xi+1)&(SZ-1), y1=(yi+1)&(SZ-1);
    const v00=t[yi*SZ+xi],v10=t[yi*SZ+x1],v01=t[y1*SZ+xi],v11=t[y1*SZ+x1];
    return v00+(v10-v00)*ux+(v01-v00)*uy+(v00-v10-v01+v11)*ux*uy;
  };
}
function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// ── Rocky base texture (B&W, 512×512, generated once) ────────────────────────
const ROCKY = (() => {
  const SZ=512, buf=document.createElement('canvas');
  buf.width=SZ; buf.height=SZ;
  const ctx=buf.getContext('2d');
  const rng=seededRand(42);

  ctx.fillStyle='#1e1e1e'; ctx.fillRect(0,0,SZ,SZ);

  // large dark patches first
  for(let i=0;i<320;i++){
    const x=rng()*SZ, y=rng()*SZ, r=rng()*20+6;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,0,0,${(rng()*0.45+0.1).toFixed(2)})`; ctx.fill();
  }
  // medium light aggregates
  for(let i=0;i<SZ*SZ/60;i++){
    const x=rng()*SZ, y=rng()*SZ;
    const r=Math.pow(rng(),1.8)*9+0.4;
    const v=Math.floor(rng()*130+80);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${v},${v},${v})`; ctx.fill();
  }
  // bright highlight dots
  for(let i=0;i<SZ*SZ/280;i++){
    const x=rng()*SZ, y=rng()*SZ, r=rng()*2+0.3;
    const v=Math.floor(rng()*60+180);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${v},${v},${v})`; ctx.fill();
  }
  // noise grain overlay
  const n=makeNoise(77), id=ctx.getImageData(0,0,SZ,SZ), d=id.data;
  for(let py=0;py<SZ;py++) for(let px=0;px<SZ;px++){
    const i=(py*SZ+px)*4, b=n(px*0.10,py*0.10)*28;
    d[i]=Math.min(255,Math.max(0,d[i]+b));
    d[i+1]=Math.min(255,Math.max(0,d[i+1]+b));
    d[i+2]=Math.min(255,Math.max(0,d[i+2]+b));
  }
  ctx.putImageData(id,0,0);
  return buf;
})();

// ── Build colorized scrolling strip for a body ────────────────────────────────
function buildStrip(body, diam) {
  const W=Math.max(diam*4,32), H=Math.max(diam,4);
  const buf=document.createElement('canvas'); buf.width=W; buf.height=H;
  const ctx=buf.getContext('2d');
  // tile rocky texture scaled to planet size
  const tile=Math.max(diam,32);
  for(let tx=0;tx<W;tx+=tile) ctx.drawImage(ROCKY,0,0,512,512,tx,0,tile,H);
  // colorize: dark→c2, bright→c1
  const [r1,g1,b1]=hexRgb(body.c1), [r2,g2,b2]=hexRgb(body.c2);
  const id=ctx.getImageData(0,0,W,H), d=id.data;
  for(let i=0;i<d.length;i+=4){
    const t=d[i]/255;
    d[i  ]=Math.round(r2+(r1-r2)*t);
    d[i+1]=Math.round(g2+(g1-g2)*t);
    d[i+2]=Math.round(b2+(b1-b2)*t);
    d[i+3]=255;
  }
  ctx.putImageData(id,0,0);
  return buf;
}

// ── Layout ────────────────────────────────────────────────────────────────────
function computeLayout() {
  const W=window.innerWidth, H=window.innerHeight;
  const isPortrait = window.matchMedia('(orientation: portrait)').matches;
  let sunR, sunX, sunY, maxOrbit;
  if(isPortrait){
    sunR   = W * 0.42;
    sunX   = W / 2;
    sunY   = H - sunR - 28;
    maxOrbit = sunY - 48;
  } else {
    sunR   = H * 0.36;
    sunX   = sunR + 28;
    sunY   = H / 2;
    maxOrbit = W - sunX - 48;
  }
  // cube-root distance scaling → preserves relative order, fits screen
  const cbMin=Math.cbrt(AU_MIN), cbMax=Math.cbrt(AU_MAX);
  function orbitPx(au){
    const t=(Math.cbrt(au)-cbMin)/(cbMax-cbMin);
    return sunR*1.08 + t*(maxOrbit - sunR*1.08);
  }
  // power-law planet size
  function planetPx(r){
    return Math.max(5, Math.round(Math.pow(r/696340,0.42)*sunR*2));
  }
  function bodyPos(au){
    const d=orbitPx(au);
    return isPortrait ? {x:sunX, y:sunY-d} : {x:sunX+d, y:sunY};
  }
  return {W,H,isPortrait,sunR,sunX,sunY,orbitPx,planetPx,bodyPos};
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function drawStars(){
  const cv=document.getElementById('stars-canvas');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const ctx=cv.getContext('2d'), rng=seededRand(77);
  for(let i=0;i<380;i++){
    const x=rng()*cv.width, y=rng()*cv.height, r=rng()*.55+.08, a=rng()*.11+.02;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,218,240,${a.toFixed(3)})`; ctx.fill();
  }
}

// ── Orbital rings ─────────────────────────────────────────────────────────────
function drawRings(lay){
  const cv=document.getElementById('rings-canvas');
  cv.width=lay.W; cv.height=lay.H;
  const ctx=cv.getContext('2d');
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1.2;
  for(const b of PLANETS){
    ctx.beginPath();
    ctx.arc(lay.sunX, lay.sunY, lay.orbitPx(b.au), 0, Math.PI*2);
    ctx.stroke();
  }
}

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene   = document.getElementById('scene');
const svgNS   = 'http://www.w3.org/2000/svg';
const renderQ = []; // {body,diam,strip,canvas,phase,speed}
let lay = computeLayout();

function buildScene(){
  scene.querySelectorAll('.pw').forEach(e=>e.remove());
  renderQ.length = 0;
  lay = computeLayout();
  drawStars();
  drawRings(lay);
  for(const body of BODIES) addBody(body);
}

function addBody(body){
  const diam = body.au===0 ? lay.sunR*2 : lay.planetPx(body.r);
  const rr   = diam/2;
  const pos  = body.au===0 ? {x:lay.sunX,y:lay.sunY} : lay.bodyPos(body.au);

  const pw=document.createElement('div');
  pw.className='pw'; pw.dataset.id=body.id;
  pw.style.left=pos.x+'px'; pw.style.top=pos.y+'px';
  pw.style.width=diam+'px'; pw.style.height=diam+'px';

  const cv=document.createElement('canvas');
  cv.width=diam; cv.height=diam;
  cv.style.cssText=`width:${diam}px;height:${diam}px;display:block;`;
  pw.appendChild(cv);

  // Saturn ring SVG
  if(body.ring){
    const rW=diam*2.4, rH=diam*0.36;
    const svg=document.createElementNS(svgNS,'svg');
    svg.setAttribute('width',rW); svg.setAttribute('height',rH);
    svg.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;overflow:visible;`;
    const mkE=(rx,ry,s,sw)=>{
      const e=document.createElementNS(svgNS,'ellipse');
      e.setAttribute('cx',rW/2); e.setAttribute('cy',rH/2);
      e.setAttribute('rx',rx); e.setAttribute('ry',ry);
      e.setAttribute('fill','none'); e.setAttribute('stroke',s); e.setAttribute('stroke-width',sw);
      svg.appendChild(e);
    };
    mkE(rW/2-1,rH/2-1,'rgba(220,198,110,0.40)',Math.max(3,diam*.06));
    mkE(rW*.36,rH*.27,'rgba(220,198,110,0.18)',Math.max(1.5,diam*.023));
    pw.appendChild(svg);
  }

  scene.appendChild(pw);

  const strip=buildStrip(body,diam);
  // slower for large bodies, faster for small
  const speed=(body.au===0 ? 0.25 : 0.7+Math.random()*0.6)*(38/Math.max(diam,8));
  renderQ.push({body,diam,strip,canvas:cv,phase:Math.random()*strip.width,speed});
}

// ── Render loop ───────────────────────────────────────────────────────────────
function renderPlanet(p){
  const {diam,strip,canvas}=p, rr=diam/2;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,diam,diam);
  ctx.save();
  ctx.beginPath(); ctx.arc(rr,rr,rr,0,Math.PI*2); ctx.clip();
  // scrolling texture
  const sw=strip.width, off=Math.floor(p.phase)%sw;
  if(off+diam<=sw){
    ctx.drawImage(strip,off,0,diam,diam,0,0,diam,diam);
  } else {
    const p1=sw-off;
    ctx.drawImage(strip,off,0,p1,diam,0,0,p1,diam);
    ctx.drawImage(strip,0,0,diam-p1,diam,p1,0,diam-p1,diam);
  }
  // fixed radial: bright centre, dark edge
  const g=ctx.createRadialGradient(rr*.58,rr*.52,0,rr,rr,rr);
  g.addColorStop(0,'rgba(255,255,255,0.18)');
  g.addColorStop(.42,'rgba(0,0,0,0.0)');
  g.addColorStop(1,'rgba(0,0,0,0.50)');
  ctx.fillStyle=g; ctx.fillRect(0,0,diam,diam);
  ctx.restore();
}

let lastT=performance.now();
(function tick(now){
  const dt=Math.min(now-lastT,60); lastT=now;
  for(const p of renderQ){ p.phase=(p.phase+p.speed*dt*.016)%p.strip.width; renderPlanet(p); }
  requestAnimationFrame(tick);
})(lastT);

// ── Touch / hover ─────────────────────────────────────────────────────────────
function setPwScale(pw, s){
  pw.style.transform=`translate(-50%,-50%) scale(${s})`;
}
scene.addEventListener('mouseover', e=>{ const pw=e.target.closest('.pw'); if(pw&&pw!==zoomedPw) setPwScale(pw,1.09); });
scene.addEventListener('mouseout',  e=>{ const pw=e.target.closest('.pw'); if(pw&&pw!==zoomedPw) setPwScale(pw,1.0); });
scene.addEventListener('touchstart',e=>{ const pw=e.target.closest('.pw'); if(pw) setPwScale(pw,1.09); },{passive:true});
scene.addEventListener('touchend',  e=>{ const pw=e.target.closest('.pw'); if(pw&&pw!==zoomedPw) setPwScale(pw,1.0); },{passive:true});

// ── Zoom ──────────────────────────────────────────────────────────────────────
let zoomedPw=null;

function zoomTo(pw){
  if(zoomedPw) setPwScale(zoomedPw,1.0);
  zoomedPw=pw;

  const cx=parseFloat(pw.style.left), cy=parseFloat(pw.style.top);
  const diam=parseFloat(pw.style.width);
  // target: planet fills ~28% of shorter side
  const target=Math.min(lay.W,lay.H)*0.28;
  const s=Math.max(1.5, target/diam);
  // translate so planet centre lands at viewport centre
  const tx=s*(lay.W/2-cx), ty=s*(lay.H/2-cy);
  scene.style.transform=`translate(${tx}px,${ty}px) scale(${s})`;

  setTimeout(()=>showPanel(BODIES.find(b=>b.id===pw.dataset.id)), 640);
}

function zoomOut(){
  scene.style.transform='';
  if(zoomedPw){ setPwScale(zoomedPw,1.0); zoomedPw=null; }
  hidePanel();
}

// ── Panel ─────────────────────────────────────────────────────────────────────
const panel=document.getElementById('panel');
const hint =document.getElementById('hint');

function showPanel(body){
  document.getElementById('p-name').textContent=body.name;
  document.getElementById('p-type').textContent=body.type;
  document.getElementById('p-desc').textContent=body.desc;
  const fc=document.getElementById('p-facts'); fc.innerHTML='';
  body.facts.forEach(f=>fc.insertAdjacentHTML('beforeend',
    `<div class="fact-row"><div class="fact-label">${f.l}</div><div class="fact-val">${f.v}</div></div>`));
  panel.classList.add('on'); hint.classList.add('on');
}
function hidePanel(){ panel.classList.remove('on'); hint.classList.remove('on'); }

document.getElementById('p-close').addEventListener('click',zoomOut);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') zoomOut(); });

// ── Click ─────────────────────────────────────────────────────────────────────
scene.addEventListener('click', e=>{
  const pw=e.target.closest('.pw');
  if(pw){
    if(pw===zoomedPw) zoomOut(); else zoomTo(pw);
  } else {
    if(zoomedPw) zoomOut();
  }
});

// ── Init & resize ─────────────────────────────────────────────────────────────
buildScene();

let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{ if(zoomedPw) zoomOut(); buildScene(); },200);
});
</script>
</body>
</html>
