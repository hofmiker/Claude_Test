<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
    :root {
        color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        background: #111827;
        color: #f3f4f6;
        font-family: Georgia, "Times New Roman", serif;
        padding: 16px;
    }
    h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: 0.05em;
    }
    #hud {
        display: flex;
        gap: 24px;
        font-size: 1.1rem;
    }
    #board {
        background: #1f2937;
        border: 4px solid #374151;
        border-radius: 8px;
        image-rendering: pixelated;
        touch-action: none;
    }
    #hint {
        opacity: 0.7;
        font-size: 0.9rem;
        text-align: center;
        max-width: 420px;
    }
    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(17, 24, 39, 0.9);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 12px;
        text-align: center;
        padding: 16px;
    }
    #overlay.show { display: flex; }
    #overlay p { margin: 0; font-size: 1.2rem; }
    button {
        font-family: inherit;
        font-size: 1rem;
        padding: 10px 22px;
        border-radius: 6px;
        border: none;
        background: #22c55e;
        color: #111827;
        cursor: pointer;
        font-weight: bold;
    }
    button:active { transform: scale(0.97); }
    #controls {
        display: none;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(2, 56px);
        gap: 8px;
        margin-top: 4px;
    }
    #controls button.dir {
        background: #374151;
        color: #f3f4f6;
        font-size: 1.4rem;
        padding: 0;
    }
    @media (pointer: coarse) {
        #controls { display: grid; }
    }
    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
    <h1>Snake</h1>
    <div id="hud">
        <span>Punkte: <strong id="score">0</strong></span>
        <span>Highscore: <strong id="best">0</strong></span>
    </div>
    <canvas id="board" width="400" height="400"></canvas>
    <p id="hint">Pfeiltasten / WASD zum Steuern &mdash; Leertaste pausiert. Auf dem Handy: Wischen oder die Buttons unten benutzen.</p>

    <div id="controls">
        <button class="dir up" data-dir="up">&uarr;</button>
        <button class="dir left" data-dir="left">&larr;</button>
        <button class="dir down" data-dir="down">&darr;</button>
        <button class="dir right" data-dir="right">&rarr;</button>
    </div>

    <div id="overlay">
        <p id="overlayText">Game Over</p>
        <button id="restartBtn">Nochmal spielen</button>
    </div>

<script>
(() => {
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlayText');
    const restartBtn = document.getElementById('restartBtn');

    const GRID = 20;
    const CELLS = canvas.width / GRID;
    const BEST_KEY = 'snake_best_score';

    let snake, dir, nextDir, food, score, best, running, paused, tickMs, timer;

    function loadBest() {
        return Number(localStorage.getItem(BEST_KEY) || 0);
    }

    function saveBest(value) {
        localStorage.setItem(BEST_KEY, String(value));
    }

    function randCell() {
        return {
            x: Math.floor(Math.random() * CELLS),
            y: Math.floor(Math.random() * CELLS)
        };
    }

    function placeFood() {
        let cell;
        do {
            cell = randCell();
        } while (snake.some(s => s.x === cell.x && s.y === cell.y));
        food = cell;
    }

    function reset() {
        snake = [
            { x: 8, y: 10 },
            { x: 7, y: 10 },
            { x: 6, y: 10 }
        ];
        dir = { x: 1, y: 0 };
        nextDir = dir;
        score = 0;
        tickMs = 130;
        running = true;
        paused = false;
        placeFood();
        scoreEl.textContent = score;
        best = loadBest();
        bestEl.textContent = best;
        overlay.classList.remove('show');
        clearInterval(timer);
        timer = setInterval(tick, tickMs);
        draw();
    }

    function setSpeed() {
        clearInterval(timer);
        timer = setInterval(tick, tickMs);
    }

    function tick() {
        if (!running || paused) return;

        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        const hitsWall = head.x < 0 || head.y < 0 || head.x >= CELLS || head.y >= CELLS;
        const hitsSelf = snake.some(s => s.x === head.x && s.y === head.y);

        if (hitsWall || hitsSelf) {
            gameOver();
            return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreEl.textContent = score;
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                saveBest(best);
            }
            placeFood();
            if (tickMs > 60 && score % 50 === 0) {
                tickMs -= 8;
                setSpeed();
            }
        } else {
            snake.pop();
        }

        draw();
    }

    function gameOver() {
        running = false;
        clearInterval(timer);
        overlayText.textContent = `Game Over — Punkte: ${score}`;
        overlay.classList.add('show');
    }

    function draw() {
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ef4444';
        ctx.fillRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4);

        snake.forEach((s, i) => {
            ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
            ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
        });
    }

    function setDir(x, y) {
        if (dir.x === -x && dir.y === -y) return;
        nextDir = { x, y };
    }

    const KEY_MAP = {
        ArrowUp: [0, -1], w: [0, -1], W: [0, -1],
        ArrowDown: [0, 1], s: [0, 1], S: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0], A: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0], D: [1, 0]
    };

    window.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            if (running) paused = !paused;
            e.preventDefault();
            return;
        }
        const mapped = KEY_MAP[e.key];
        if (mapped) {
            setDir(mapped[0], mapped[1]);
            e.preventDefault();
        }
    });

    document.querySelectorAll('#controls .dir').forEach(btn => {
        btn.addEventListener('click', () => {
            const d = btn.dataset.dir;
            if (d === 'up') setDir(0, -1);
            if (d === 'down') setDir(0, 1);
            if (d === 'left') setDir(-1, 0);
            if (d === 'right') setDir(1, 0);
        });
    });

    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        touchStart = { x: t.clientX, y: t.clientY };
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
        if (!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) {
            setDir(dx > 0 ? 1 : -1, 0);
        } else {
            setDir(0, dy > 0 ? 1 : -1);
        }
        touchStart = null;
    }, { passive: true });

    restartBtn.addEventListener('click', reset);

    reset();
})();
</script>
</body>
</html>
