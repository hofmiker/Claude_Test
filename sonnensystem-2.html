<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonnensystem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05050f; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Value noise (2-D) ────────────────────────────────────────────────────
function hash(x, y) {
    const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return n - Math.floor(n);
}

function vnoise(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix,        fy = y - iy;
    const ux = fx * fx * (3 - 2 * fx);
    const uy = fy * fy * (3 - 2 * fy);
    const a = hash(ix,     iy),     b = hash(ix + 1, iy);
    const c = hash(ix,     iy + 1), d = hash(ix + 1, iy + 1);
    return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
}

// Fractal brownian motion – 6 octaves, mimics the layered grain in photo 2
function fbm(x, y) {
    let v = 0, amp = 0.5, freq = 1, total = 0;
    for (let i = 0; i < 6; i++) {
        v     += vnoise(x * freq, y * freq) * amp;
        total += amp;
        amp   *= 0.5;
        freq  *= 2.13;
    }
    return v / total;
}

// ── Sun texture (rocky grain → golden amber palette) ─────────────────────
function makeSunTexture(radius) {
    const size = Math.ceil(radius * 2);
    const off  = document.createElement('canvas');
    off.width  = off.height = size;
    const oc   = off.getContext('2d');
    const img  = oc.createImageData(size, size);
    const d    = img.data;

    // Scale so grain size stays proportional to the sun, regardless of screen size
    const sc = 4.5 / size;

    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            const dx   = x - radius, dy = y - radius;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const i    = (y * size + x) * 4;

            if (dist > radius) { d[i + 3] = 0; continue; }

            // Raw noise → contrast stretch to replicate photo's high contrast grain
            let n = fbm(x * sc, y * sc);
            n = Math.min(1, Math.max(0, (n - 0.25) * 1.65));

            // Subtle limb dimming for a flat-disk feel (not a sphere)
            n *= 1 - 0.28 * Math.pow(dist / radius, 3);

            // Golden amber palette: dark rock (#944400) → bright gold (#FFAA1E)
            d[i]     = Math.min(255, (148 + n * 107 + 0.5) | 0); // R 148–255
            d[i + 1] = Math.min(255, ( 68 + n * 102 + 0.5) | 0); // G  68–170
            d[i + 2] = Math.min(255, (       n *  30 + 0.5) | 0); // B   0– 30
            d[i + 3] = 255;
        }
    }
    oc.putImageData(img, 0, 0);
    return off;
}

// ── Planet definitions ────────────────────────────────────────────────────
// relR:   radius relative to Earth (= 1.0)   – real values
// au:     semi-major axis in AU               – real values
// period: orbital period in Earth years       – real values
const PLANET_DATA = [
    { name: 'Merkur',  relR:  0.383, au:  0.387, period:   0.241, color: '#b5b5b5' },
    { name: 'Venus',   relR:  0.949, au:  0.723, period:   0.615, color: '#e8cda0' },
    { name: 'Erde',    relR:  1.000, au:  1.000, period:   1.000, color: '#6b93d6' },
    { name: 'Mars',    relR:  0.532, au:  1.524, period:   1.881, color: '#c04a1a' },
    { name: 'Jupiter', relR: 11.210, au:  5.203, period:  11.860, color: '#c88b3a' },
    { name: 'Saturn',  relR:  9.450, au:  9.537, period:  29.460, color: '#e4d191', rings: true },
    { name: 'Uranus',  relR:  4.010, au: 19.190, period:  84.010, color: '#a0e8e8' },
    { name: 'Neptun',  relR:  3.880, au: 30.070, period: 164.800, color: '#4b6cd4' },
];

// ── Layout state ─────────────────────────────────────────────────────────
let W, H, cx, cy, sunR, sunTex, planets;

// Power-law exponent compresses outer orbits so all 8 fit on screen
// while keeping relative spacing visually correct
const K = 0.42;

function build() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;

    const md   = Math.min(W, H);
    sunR = md * 0.27;   // sun takes ~54 % of the smaller dimension

    const auMin  = Math.pow(PLANET_DATA[0].au,                    K);
    const auMax  = Math.pow(PLANET_DATA[PLANET_DATA.length-1].au, K);
    const orbMin = sunR  + md * 0.045;   // first orbit just outside sun edge
    const orbMax = md    * 0.480;        // last orbit near viewport edge

    // Earth display radius — all others scale from this
    const earthPx = md * 0.0050;

    planets = PLANET_DATA.map(p => ({
        ...p,
        orbitPx: orbMin + (Math.pow(p.au, K) - auMin) / (auMax - auMin) * (orbMax - orbMin),
        dispR:   Math.max(md * 0.003, p.relR * earthPx),
        theta0:  Math.random() * Math.PI * 2,   // random starting position
    }));

    sunTex = makeSunTexture(sunR);
}

// ── Animation loop ────────────────────────────────────────────────────────
// 5 Earth days per frame → Mercury orbits in ~0.3 s, Neptune in ~3 min at 60 fps
const DAYS_PER_FRAME = 5;
let days = 0;

function frame() {
    ctx.clearRect(0, 0, W, H);

    // Orbit rings – thin, white, slightly dashed
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 0.65;
    ctx.setLineDash([2, 5]);
    for (const p of planets) {
        ctx.beginPath();
        ctx.arc(cx, cy, p.orbitPx, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();

    // Sun (texture drawn on top of orbit rings)
    ctx.drawImage(sunTex, cx - sunR, cy - sunR);

    // Planets
    for (const p of planets) {
        // Counter-clockwise orbit (negative angular velocity in canvas coords)
        const theta = p.theta0 - (days / (p.period * 365.25)) * Math.PI * 2;
        const px = cx + Math.cos(theta) * p.orbitPx;
        const py = cy + Math.sin(theta) * p.orbitPx;

        // Saturn: flat ring (annulus) viewed from directly above
        if (p.rings) {
            ctx.save();
            ctx.translate(px, py);
            ctx.beginPath();
            ctx.arc(0, 0, p.dispR * 2.3,  0, Math.PI * 2);
            ctx.arc(0, 0, p.dispR * 1.35, 0, Math.PI * 2, true); // inner cutout
            ctx.fillStyle = 'rgba(204,182,122,0.42)';
            ctx.fill();
            ctx.restore();
        }

        // Planet disk
        ctx.beginPath();
        ctx.arc(px, py, p.dispR, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
    }

    days += DAYS_PER_FRAME;
    requestAnimationFrame(frame);
}

build();
frame();

window.addEventListener('resize', build);
</script>
</body>
</html>
