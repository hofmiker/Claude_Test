<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Low-Poly Charakter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; touch-action: none; background: #87CEEB; }
    #info {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: Arial, sans-serif; font-size: 13px;
      text-shadow: 0 1px 3px rgba(0,0,0,.7); pointer-events: none; white-space: nowrap;
    }
    #dpad {
      position: fixed; bottom: 28px; left: 28px;
      display: grid; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px; gap: 5px;
    }
    .db {
      background: rgba(255,255,255,.22); border: 2px solid rgba(255,255,255,.55);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; user-select: none; color: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    .db:active, .db.on { background: rgba(255,255,255,.5); }
    #bU { grid-column:2; grid-row:1; }
    #bL { grid-column:1; grid-row:2; }
    #bD { grid-column:2; grid-row:2; }
    #bR { grid-column:3; grid-row:2; }
    #jumpBtn {
      position: fixed; bottom: 28px; right: 28px;
      width: 70px; height: 70px;
      background: rgba(255,210,0,.25); border: 2px solid rgba(255,210,0,.75);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 26px; cursor: pointer; user-select: none; color: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    #jumpBtn.on { background: rgba(255,210,0,.55); }
  </style>
</head>
<body>
<div id="info">Pfeiltasten/WASD bewegen · Space / ⬆ springen</div>
<div id="dpad">
  <div class="db" id="bU">▲</div>
  <div class="db" id="bL">◀</div>
  <div class="db" id="bD">▼</div>
  <div class="db" id="bR">▶</div>
</div>
<div id="jumpBtn">⬆</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── RENDERER ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 120);
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);

// ── LIGHTS ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff8e7, 0.65));
const sun = new THREE.DirectionalLight(0xfff8e7, 0.95);
sun.position.set(25, 50, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left:-60, right:60, top:60, bottom:-60, near:1, far:200 });
scene.add(sun);

// ── MATERIALS ────────────────────────────────────────────────────────────────
const mk = c => new THREE.MeshLambertMaterial({ color: c });
const M = {
  skin:  mk(0xF0BC94), shirt: mk(0x1E88E5), pants: mk(0x37474F),
  shoes: mk(0x1A1A1A), hair:  mk(0x3E2723),
  grass: mk(0x3A7230), trunk: mk(0x6D4C41),
  leaf:  mk(0x2A6E25), leaf2: mk(0x1E5219),
  bush:  mk(0x356A24), bush2: mk(0x477A34),
  wood:  mk(0x8B6334),
};

// ── GEO HELPERS ──────────────────────────────────────────────────────────────
function cylMesh(rT, rB, h, mat, segs = 6) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, segs), mat);
  m.castShadow = true; return m;
}
function icoMesh(r, mat) {
  const m = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 1), mat);
  m.castShadow = true; return m;
}
function bone(parent, px, py, pz, rT, rB, h, mat) {
  const j = new THREE.Group();
  j.position.set(px, py, pz);
  parent.add(j);
  const b = cylMesh(rT, rB, h, mat);
  b.position.y = -h / 2;
  j.add(b);
  return j;
}

// ── CHARACTER ────────────────────────────────────────────────────────────────
const charRoot = new THREE.Group();
charRoot.position.y = 0.10;
scene.add(charRoot);

// Torso
const torso = new THREE.Group();
torso.position.y = 1.26;
charRoot.add(torso);
torso.add(cylMesh(0.21, 0.26, 0.62, M.shirt));

// ── HEAD (smaller, more realistic with nose & ears) ───────────────────────
const neckJoint = bone(torso, 0, 0.40, 0, 0.080, 0.088, 0.13, M.skin);

const headJoint = new THREE.Group();   // rotation pivot for head turning
headJoint.position.y = 0.19;
neckJoint.add(headJoint);

// Skull — slightly egg-shaped, smaller (r=0.16)
const skull = icoMesh(0.16, M.skin);
skull.scale.set(0.97, 1.17, 0.97);
headJoint.add(skull);

// Jaw / chin — flattened sphere at bottom gives rounder chin
const jaw = icoMesh(0.11, M.skin);
jaw.scale.set(0.85, 0.50, 0.80);
jaw.position.set(0, -0.09, 0.02);
headJoint.add(jaw);

// Nose — small bump in front (+Z = character forward)
const nose = new THREE.Mesh(new THREE.SphereGeometry(0.028, 5, 4), M.skin);
nose.position.set(0, 0.0, 0.155);
headJoint.add(nose);

// Ears — small ovals on sides
function makeEar(side) {
  const e = new THREE.Mesh(new THREE.SphereGeometry(0.038, 5, 4), M.skin);
  e.scale.set(0.45, 0.75, 0.30);
  e.position.set(side * 0.162, 0.01, -0.02);
  return e;
}
headJoint.add(makeEar(-1));
headJoint.add(makeEar( 1));

// Hair — multi-part for a styled look
// 1) Top mass
const hTop = icoMesh(0.158, M.hair);
hTop.scale.set(0.88, 0.42, 0.90);
hTop.position.set(0, 0.135, -0.015);
headJoint.add(hTop);
// 2) Back volume
const hBack = icoMesh(0.135, M.hair);
hBack.scale.set(0.90, 0.60, 0.72);
hBack.position.set(0, 0.055, -0.115);
headJoint.add(hBack);
// 3) Left side
const hSideL = icoMesh(0.092, M.hair);
hSideL.scale.set(0.58, 0.68, 0.70);
hSideL.position.set(-0.128, 0.04, -0.05);
headJoint.add(hSideL);
// 4) Right side (clone)
const hSideR = hSideL.clone();
hSideR.position.x = 0.128;
headJoint.add(hSideR);

// ── ARMS (no wrists/hands) ────────────────────────────────────────────────
const lShoulder = bone(torso, -0.24, 0.22, 0, 0.071, 0.062, 0.30, M.shirt);
const lElbow    = bone(lShoulder, 0, -0.30, 0, 0.062, 0.052, 0.27, M.skin);

const rShoulder = bone(torso,  0.24, 0.22, 0, 0.071, 0.062, 0.30, M.shirt);
const rElbow    = bone(rShoulder, 0, -0.30, 0, 0.062, 0.052, 0.27, M.skin);

// ── HIPS & LEGS ───────────────────────────────────────────────────────────
const hipsGrp = new THREE.Group();
hipsGrp.position.y = -0.34;
torso.add(hipsGrp);
hipsGrp.add(cylMesh(0.23, 0.21, 0.19, M.pants));

const lHip   = bone(hipsGrp, -0.13, -0.095, 0, 0.10, 0.088, 0.38, M.pants);
const lKnee  = bone(lHip,      0,   -0.38,  0, 0.088, 0.075, 0.35, M.pants);
const lAnkle = bone(lKnee,     0,   -0.35,  0, 0.075, 0.065, 0.12, M.pants);
const lFootG = new THREE.Group(); lFootG.position.y = -0.12; lAnkle.add(lFootG);
const lFootM = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.075, 0.22), M.shoes);
lFootM.position.set(0, -0.038, 0.07); lFootM.castShadow = true; lFootG.add(lFootM);

const rHip   = bone(hipsGrp,  0.13, -0.095, 0, 0.10, 0.088, 0.38, M.pants);
const rKnee  = bone(rHip,      0,   -0.38,  0, 0.088, 0.075, 0.35, M.pants);
const rAnkle = bone(rKnee,     0,   -0.35,  0, 0.075, 0.065, 0.12, M.pants);
const rFootG = new THREE.Group(); rFootG.position.y = -0.12; rAnkle.add(rFootG);
const rFootM = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.075, 0.22), M.shoes);
rFootM.position.set(0, -0.038, 0.07); rFootM.castShadow = true; rFootG.add(rFootM);

// ── GROUND ───────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(new THREE.PlaneGeometry(240, 240, 24, 24), M.grass);
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

const dkG = mk(0x2A5E20);
for (let i = 0; i < 90; i++) {
  const p = new THREE.Mesh(new THREE.CircleGeometry(0.6 + Math.random() * 1.8, 5), dkG);
  const a = Math.random() * Math.PI * 2, d = 6 + Math.random() * 90;
  p.position.set(Math.cos(a) * d, 0.01, Math.sin(a) * d);
  p.rotation.x = -Math.PI / 2; scene.add(p);
}

// ── TREES & BUSHES ───────────────────────────────────────────────────────────
function addTree(x, z) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const th = 1.3 + Math.random() * 0.5;
  const tr = cylMesh(0.13, 0.18, th, M.trunk); tr.position.y = th / 2; g.add(tr);
  const r1 = 1.1 + Math.random() * 0.3, h1 = 2.2 + Math.random() * 0.6;
  const r2 = 0.75 + Math.random() * 0.2, h2 = 1.6 + Math.random() * 0.4;
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(r1, h1, 7), M.leaf);
  c1.position.y = th + h1 / 2 - 0.15; c1.castShadow = true; g.add(c1);
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(r2, h2, 7), M.leaf2);
  c2.position.y = th + h1 * 0.72 + h2 / 2; c2.castShadow = true; g.add(c2);
  scene.add(g);
}
function addBush(x, z) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const s = 0.40 + Math.random() * 0.25;
  const b1 = icoMesh(s, M.bush); b1.position.y = s * 0.75; b1.scale.y = 0.72; g.add(b1);
  const b2 = icoMesh(s * 0.6, M.bush2); b2.position.set(s * 0.5, s * 0.5, 0.1); b2.scale.y = 0.72; g.add(b2);
  scene.add(g);
}
const rng = (a, b) => a + Math.random() * (b - a);
for (let i = 0; i < 40; i++) {
  let x, z; do { x = rng(-60,60); z = rng(-80,40); } while (Math.hypot(x,z) < 8);
  addTree(x, z);
}
for (let i = 0; i < 60; i++) {
  let x, z; do { x = rng(-60,60); z = rng(-80,40); } while (Math.hypot(x,z) < 5);
  addBush(x, z);
}

// ── CRATES ───────────────────────────────────────────────────────────────────
const crateData = [];
function addCrate(cx, cz, yBottom, sz) {
  const geo = new THREE.BoxGeometry(sz, 0.8, sz);
  const m = new THREE.Mesh(geo, M.wood);
  m.position.set(cx, yBottom + 0.4, cz);
  m.castShadow = true; m.receiveShadow = true; scene.add(m);
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x5D4225 })));
  crateData.push({ x: cx, z: cz, hw: sz / 2, hd: sz / 2, topY: yBottom + 0.8 });
}
addCrate(  5.0,  -6.0, 0.0, 1.1); addCrate(  5.0,  -6.0, 0.8, 1.0);
addCrate( -5.5,  -8.0, 0.0, 1.3);
addCrate(  9.0, -13.0, 0.0, 1.0); addCrate(  9.0, -13.0, 0.8, 1.0); addCrate(  9.0, -13.0, 1.6, 1.0);
addCrate( -8.0, -15.0, 0.0, 1.5);
addCrate(  2.0, -19.0, 0.0, 1.0); addCrate( -2.0, -20.0, 0.0, 1.0); addCrate(  1.0, -22.0, 0.8, 0.9);

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys = { up:false, down:false, left:false, right:false };
let jumpBuf = false;

document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'    ||e.key==='w'||e.key==='W') keys.up    = true;
  if (e.key==='ArrowDown'  ||e.key==='s'||e.key==='S') keys.down  = true;
  if (e.key==='ArrowLeft'  ||e.key==='a'||e.key==='A') keys.left  = true;
  if (e.key==='ArrowRight' ||e.key==='d'||e.key==='D') keys.right = true;
  if (e.key===' ') { jumpBuf = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowUp'    ||e.key==='w'||e.key==='W') keys.up    = false;
  if (e.key==='ArrowDown'  ||e.key==='s'||e.key==='S') keys.down  = false;
  if (e.key==='ArrowLeft'  ||e.key==='a'||e.key==='A') keys.left  = false;
  if (e.key==='ArrowRight' ||e.key==='d'||e.key==='D') keys.right = false;
});
['bU','bD','bL','bR'].forEach((id, i) => {
  const k = ['up','down','left','right'][i], el = document.getElementById(id);
  el.addEventListener('pointerdown',  e => { keys[k]=true;  el.classList.add('on');    e.preventDefault(); });
  el.addEventListener('pointerup',    e => { keys[k]=false; el.classList.remove('on'); e.preventDefault(); });
  el.addEventListener('pointerleave', () => { keys[k]=false; el.classList.remove('on'); });
});
const jumpEl = document.getElementById('jumpBtn');
jumpEl.addEventListener('pointerdown', e => { jumpBuf=true; jumpEl.classList.add('on'); e.preventDefault(); });
jumpEl.addEventListener('pointerup',    () => jumpEl.classList.remove('on'));
jumpEl.addEventListener('pointerleave', () => jumpEl.classList.remove('on'));

let swipeOrigin = null;
renderer.domElement.addEventListener('touchstart', e => {
  swipeOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
renderer.domElement.addEventListener('touchmove', e => {
  if (!swipeOrigin) return;
  const dx = e.touches[0].clientX - swipeOrigin.x, dy = e.touches[0].clientY - swipeOrigin.y, th = 20;
  keys.up=dy<-th; keys.down=dy>th; keys.left=dx<-th; keys.right=dx>th;
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => {
  keys.up=keys.down=keys.left=keys.right=false; swipeOrigin=null;
});

// ── PHYSICS ───────────────────────────────────────────────────────────────────
const CHAR_BASE_Y = 0.10;
const GRAVITY     = -22;
const JUMP_VEL    =  8.2;

let velY     = 0;
let onGround = true;

function getSurfaceY(cx, cz) {
  let s = CHAR_BASE_Y;
  for (const c of crateData)
    if (Math.abs(cx-c.x) < c.hw+0.22 && Math.abs(cz-c.z) < c.hd+0.22)
      s = Math.max(s, c.topY + CHAR_BASE_Y);
  return s;
}

// ── JUMP STATE MACHINE ────────────────────────────────────────────────────────
const JS = { NONE:0, WINDUP:1, AIR:2, LAND:3 };
const WINDUP_DUR = 0.17;   // crouch-before-jump duration (s)
const LAND_DUR   = 0.28;   // landing-squat duration (s)
let jumpState = JS.NONE;
let jumpTimer = 0;

// ── ANIMATION STATE ───────────────────────────────────────────────────────────
let animT    = 0;
let charYaw  = 0;
let camDist  = 7.0;
const camPos = new THREE.Vector3(0, 4.5, -7);
const MOVE_SPEED = 0.11;
const TURN_SPEED = 0.026;

function lerp(a, b, t) { return a + (b - a) * t; }

function animateCharacter(dt) {
  const moving = (keys.up || keys.down) && jumpState === JS.NONE;
  if (moving) animT += dt * 8.5;
  const s    = Math.sin(animT);
  const eff  = moving ? 1.0 : 0.0;
  const lLeg =  s * 0.68;
  const rLeg = -s * 0.68;

  // ─ WINDUP: crouch before jump ─────────────────────────────────────────────
  if (jumpState === JS.WINDUP) {
    const t = Math.min(jumpTimer / WINDUP_DUR, 1.0);
    const sq = Math.sin(t * Math.PI * 0.5); // ease-in to full squat
    lHip.rotation.x   = lerp(lHip.rotation.x,    0.48 * sq, 0.30);
    rHip.rotation.x   = lerp(rHip.rotation.x,    0.48 * sq, 0.30);
    lKnee.rotation.x  = lerp(lKnee.rotation.x,   0.72 * sq, 0.30);
    rKnee.rotation.x  = lerp(rKnee.rotation.x,   0.72 * sq, 0.30);
    lAnkle.rotation.x = lerp(lAnkle.rotation.x,  0.18 * sq, 0.30);
    rAnkle.rotation.x = lerp(rAnkle.rotation.x,  0.18 * sq, 0.30);
    // arms swing back (coil up)
    lShoulder.rotation.x = lerp(lShoulder.rotation.x,  0.30 * sq, 0.25);
    rShoulder.rotation.x = lerp(rShoulder.rotation.x,  0.30 * sq, 0.25);
    lShoulder.rotation.z = lerp(lShoulder.rotation.z, -0.10, 0.08);
    rShoulder.rotation.z = lerp(rShoulder.rotation.z,  0.10, 0.08);
    torso.position.y  = lerp(torso.position.y, 1.26 - 0.13 * sq, 0.30);
    torso.rotation.y  = 0;

  // ─ AIR: slight knee tuck in flight ────────────────────────────────────────
  } else if (jumpState === JS.AIR) {
    lHip.rotation.x   = lerp(lHip.rotation.x,   -0.22, 0.12);
    rHip.rotation.x   = lerp(rHip.rotation.x,   -0.22, 0.12);
    lKnee.rotation.x  = lerp(lKnee.rotation.x,   0.48, 0.12);
    rKnee.rotation.x  = lerp(rKnee.rotation.x,   0.48, 0.12);
    lAnkle.rotation.x = lerp(lAnkle.rotation.x, -0.18, 0.12);
    rAnkle.rotation.x = lerp(rAnkle.rotation.x, -0.18, 0.12);
    lShoulder.rotation.x = lerp(lShoulder.rotation.x, -0.45, 0.12);
    rShoulder.rotation.x = lerp(rShoulder.rotation.x, -0.45, 0.12);
    lShoulder.rotation.z = lerp(lShoulder.rotation.z, -0.42, 0.10);
    rShoulder.rotation.z = lerp(rShoulder.rotation.z,  0.42, 0.10);
    torso.position.y = lerp(torso.position.y, 1.26, 0.15);
    torso.rotation.y = 0;

  // ─ LAND: squat to absorb ──────────────────────────────────────────────────
  } else if (jumpState === JS.LAND) {
    const t  = Math.min(jumpTimer / LAND_DUR, 1.0);
    const sq = 1.0 - t;   // starts at 1 (full squat), relaxes to 0
    lHip.rotation.x   = lerp(lHip.rotation.x,    0.55 * sq, 0.30);
    rHip.rotation.x   = lerp(rHip.rotation.x,    0.55 * sq, 0.30);
    lKnee.rotation.x  = lerp(lKnee.rotation.x,   0.80 * sq, 0.30);
    rKnee.rotation.x  = lerp(rKnee.rotation.x,   0.80 * sq, 0.30);
    lAnkle.rotation.x = lerp(lAnkle.rotation.x,  0.20 * sq, 0.30);
    rAnkle.rotation.x = lerp(rAnkle.rotation.x,  0.20 * sq, 0.30);
    lShoulder.rotation.x = lerp(lShoulder.rotation.x,  0.20 * sq, 0.25);
    rShoulder.rotation.x = lerp(rShoulder.rotation.x,  0.20 * sq, 0.25);
    lShoulder.rotation.z = lerp(lShoulder.rotation.z, -0.09, 0.08);
    rShoulder.rotation.z = lerp(rShoulder.rotation.z,  0.09, 0.08);
    torso.position.y  = lerp(torso.position.y, 1.26 - 0.15 * sq, 0.30);
    torso.rotation.y  = 0;

  // ─ NONE: run / idle ───────────────────────────────────────────────────────
  } else {
    lHip.rotation.x   = lerp(lHip.rotation.x,   lLeg * eff,                     0.22);
    rHip.rotation.x   = lerp(rHip.rotation.x,   rLeg * eff,                     0.22);
    lKnee.rotation.x  = lerp(lKnee.rotation.x,  Math.max(0, lLeg)*0.75*eff,     0.22);
    rKnee.rotation.x  = lerp(rKnee.rotation.x,  Math.max(0, rLeg)*0.75*eff,     0.22);
    lAnkle.rotation.x = lerp(lAnkle.rotation.x, -lLeg*0.20*eff,                 0.22);
    rAnkle.rotation.x = lerp(rAnkle.rotation.x, -rLeg*0.20*eff,                 0.22);
    lShoulder.rotation.x = lerp(lShoulder.rotation.x, -lLeg*0.45*eff,           0.22);
    rShoulder.rotation.x = lerp(rShoulder.rotation.x, -rLeg*0.45*eff,           0.22);
    lElbow.rotation.x    = lerp(lElbow.rotation.x,  Math.max(0,-lLeg)*0.5*eff,  0.22);
    rElbow.rotation.x    = lerp(rElbow.rotation.x,  Math.max(0,-rLeg)*0.5*eff,  0.22);
    lShoulder.rotation.z = lerp(lShoulder.rotation.z, -0.09, 0.08);
    rShoulder.rotation.z = lerp(rShoulder.rotation.z,  0.09, 0.08);
    torso.rotation.y  = lerp(torso.rotation.y,  s*0.06*eff, 0.15);
    torso.position.y  = lerp(torso.position.y,  1.26 + (moving ? Math.abs(s)*0.04 : 0), 0.20);
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
let lastTime = performance.now();

function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;

  // ── Turn (left = +, right = −  →  correct from behind-camera view)
  if (keys.left)  charYaw += TURN_SPEED;
  if (keys.right) charYaw -= TURN_SPEED;
  charRoot.rotation.y = charYaw;

  const fwdX = Math.sin(charYaw), fwdZ = Math.cos(charYaw);

  // ── Move
  if (keys.up)   { charRoot.position.x += fwdX * MOVE_SPEED; charRoot.position.z += fwdZ * MOVE_SPEED; }
  if (keys.down) { charRoot.position.x -= fwdX * MOVE_SPEED; charRoot.position.z -= fwdZ * MOVE_SPEED; }

  // ── Jump state machine
  if (jumpBuf && onGround && jumpState !== JS.WINDUP && jumpState !== JS.AIR) {
    jumpState = JS.WINDUP;
    jumpTimer = 0;
    jumpBuf   = false;
  }
  if (jumpState === JS.WINDUP) {
    jumpTimer += dt;
    if (jumpTimer >= WINDUP_DUR) {
      velY      = JUMP_VEL;
      onGround  = false;
      jumpState = JS.AIR;
      jumpTimer = 0;
    }
  }
  if (jumpState === JS.LAND) {
    jumpTimer += dt;
    if (jumpTimer >= LAND_DUR) jumpState = JS.NONE;
  }

  // ── Gravity + vertical position
  velY += GRAVITY * dt;
  charRoot.position.y += velY * dt;
  const surfY = getSurfaceY(charRoot.position.x, charRoot.position.z);
  if (charRoot.position.y <= surfY) {
    if (velY < -1.5 && jumpState === JS.AIR) {
      jumpState = JS.LAND;
      jumpTimer = 0;
    } else if (jumpState === JS.AIR) {
      jumpState = JS.NONE;
    }
    charRoot.position.y = surfY;
    velY     = 0;
    onGround = true;
  } else {
    onGround = false;
    if (jumpState === JS.NONE) jumpState = JS.AIR;  // walked off edge
  }

  // ── Limb animation
  animateCharacter(dt);

  // ── Camera: behind character, zooms in when idle
  const moving = keys.up || keys.down;
  camDist = lerp(camDist, moving ? 7.0 : 4.0, dt * 2.5);
  const tCam = new THREE.Vector3(
    charRoot.position.x - fwdX * camDist,
    charRoot.position.y + 3.5,
    charRoot.position.z - fwdZ * camDist
  );
  camPos.lerp(tCam, 0.08);
  camera.position.copy(camPos);
  camera.lookAt(charRoot.position.x, charRoot.position.y + 1.4, charRoot.position.z);

  // ── Sun follows player
  sun.target.position.copy(charRoot.position);
  sun.position.set(charRoot.position.x + 25, 50, charRoot.position.z + 15);
  sun.target.updateMatrixWorld();

  renderer.render(scene, camera);
}

loop();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
