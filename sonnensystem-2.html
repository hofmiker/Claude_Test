<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonnensystem 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05050f; overflow: hidden; }
        canvas { display: block; touch-action: none; }

        #ui {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }
        .lbl {
            color: rgba(255,255,255,0.35);
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        #speed {
            width: 220px;
            height: 2px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 1px;
            outline: none;
        }
        #speed::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 10px rgba(255,255,255,0.35);
        }
        #speed::-moz-range-thumb {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <span class="lbl">Pause</span>
    <input type="range" id="speed" min="0" max="2" step="0.01" value="1">
    <span class="lbl">2×</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05050f);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 38, 80);

// ── Controls: 1 finger = rotate all axes, 2 fingers = pinch zoom ──────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan     = false;
controls.minDistance   = 1.5;
controls.maxDistance   = 600;
controls.rotateSpeed   = 0.55;
controls.zoomSpeed     = 1.2;
controls.touches = {
    ONE: THREE.TOUCH.ROTATE,
    TWO: THREE.TOUCH.DOLLY_ROTATE,
};

// ── Planet data (real relative values) ───────────────────────────────────
// relR: radius relative to Earth · au: semi-major axis · period: Earth years
const PLANETS = [
    { relR:  0.383, au:  0.387, period:   0.241, color: 0xb5b5b5 },   // Merkur
    { relR:  0.949, au:  0.723, period:   0.615, color: 0xe8cda0 },   // Venus
    { relR:  1.000, au:  1.000, period:   1.000, color: 0x6b93d6 },   // Erde
    { relR:  0.532, au:  1.524, period:   1.881, color: 0xc04a1a },   // Mars
    { relR: 11.210, au:  5.203, period:  11.860, color: 0xc88b3a },   // Jupiter
    { relR:  9.450, au:  9.537, period:  29.460, color: 0xe4d191, rings: true }, // Saturn
    { relR:  4.010, au: 19.190, period:  84.010, color: 0xa0e8e8 },   // Uranus
    { relR:  3.880, au: 30.070, period: 164.800, color: 0x4b6cd4 },   // Neptun
];

// ── Power-law orbit compression (all 8 orbits fit, spacing stays relative) ─
const K       = 0.42;
const AU_MIN  = Math.pow(PLANETS[0].au, K);
const AU_MAX  = Math.pow(PLANETS[PLANETS.length - 1].au, K);
const ORB_MIN = 9;    // Mercury orbit (scene units)
const ORB_MAX = 55;   // Neptune orbit (scene units)
const EARTH_R = 0.55; // Earth sphere radius (scene units)

function orbitRadius(au) {
    return ORB_MIN + (Math.pow(au, K) - AU_MIN) / (AU_MAX - AU_MIN) * (ORB_MAX - ORB_MIN);
}

// ── Starfield ─────────────────────────────────────────────────────────────
{
    const pos = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        const r     = 280 + Math.random() * 220;
        pos[i*3]     = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3 + 2] = r * Math.cos(phi);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.28 })));
}

// ── Sun ───────────────────────────────────────────────────────────────────
scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(5, 64, 64),
    new THREE.MeshBasicMaterial({ color: 0xffaa20 })
));

// ── Orbit ring helper ─────────────────────────────────────────────────────
function addOrbitRing(radius) {
    const pts = [];
    for (let i = 0; i <= 256; i++) {
        const a = (i / 256) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
    }
    scene.add(new THREE.LineLoop(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.18, transparent: true })
    ));
}

// ── Build planets ─────────────────────────────────────────────────────────
const pivots = PLANETS.map(p => {
    const r   = Math.max(0.22, p.relR * EARTH_R);
    const orb = orbitRadius(p.au);

    addOrbitRing(orb);

    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(r, 32, 32),
        new THREE.MeshBasicMaterial({ color: p.color })
    );
    mesh.position.x = orb;

    if (p.rings) {
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(r * 1.35, r * 2.3, 128),
            new THREE.MeshBasicMaterial({
                color: 0xc8b87a,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.48,
            })
        );
        ring.rotation.x = -Math.PI / 2; // flat in XZ plane
        mesh.add(ring);
    }

    const pivot = new THREE.Group();
    pivot.add(mesh);
    pivot.userData.period = p.period;
    pivot.userData.theta0 = Math.random() * Math.PI * 2;
    scene.add(pivot);
    return pivot;
});

// ── Speed slider ──────────────────────────────────────────────────────────
let speedMult = 1;
document.getElementById('speed').addEventListener('input', e => {
    speedMult = parseFloat(e.target.value);
});

// ── Animation loop ────────────────────────────────────────────────────────
// 5 Earth days / frame at 1× → Mercury ~0.3 s/orbit, Neptune ~3 min/orbit
const DAYS_PER_FRAME = 5;
let gameTime = 0;

function animate() {
    requestAnimationFrame(animate);
    gameTime += DAYS_PER_FRAME * speedMult;

    pivots.forEach(pivot => {
        pivot.rotation.y = pivot.userData.theta0
            + (gameTime / (pivot.userData.period * 365.25)) * Math.PI * 2;
    });

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
