<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spielzeug-Abenteuer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>

    <div id="hud">
        <div id="hint">
            <strong>Steuerung</strong><br>
            W / ↑ — vorwärts<br>
            S / ↓ — rückwärts<br>
            A/D / ←/→ — drehen<br>
            Leertaste — Hüpfen<br>
            <em>Touch: Buttons unten links = laufen/drehen, Button unten rechts = hüpfen</em>
        </div>
        <button id="hint-toggle">?</button>
    </div>

    <div id="touch-controls">
        <div id="dpad">
            <div class="touch-btn" id="btn-fwd">&uarr;</div>
            <div class="touch-btn" id="btn-left">&larr;</div>
            <div class="touch-btn" id="btn-right">&rarr;</div>
            <div class="touch-btn" id="btn-back">&darr;</div>
        </div>
        <div class="touch-btn" id="btn-jump">&uarr;</div>
    </div>

    <div id="version-tag">v1.10 · 22.07.2026</div>

    <script type="module" src="main.js?v=1.10"></script>
</body>
</html>
