<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DHL City Drive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; }
#hud { position: fixed; inset: 0; pointer-events: none; font-family: Arial, Helvetica, sans-serif; }
#label { position: absolute; top: 16px; left: 16px; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
#ts    { position: absolute; top: 41px; left: 16px; color: rgba(255,255,255,0.5); font-size: 11px; }
#minimap { position: absolute; top: 12px; right: 12px; border: 2px solid rgba(255,255,255,0.5); border-radius: 6px; }
#speedo { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 20px; text-shadow: 1px 1px 3px #000; }
#hint { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 13px; text-align: center; transition: opacity 1.5s; }
</style>
</head>
<body>
<div id="hud">
  <div id="label">DHL CITY DRIVE</div>
  <div id="ts"></div>
  <canvas id="minimap" width="130" height="130"></canvas>
  <div id="speedo">0 km/h</div>
  <div id="hint">Hoch/Runter wischen = Gas/Bremse · Links/Rechts = Lenken</div>
</div>

<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script>
// ── Renderer / Scene / Camera ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4499dd);
scene.fog = new THREE.Fog(0x4499dd, 130, 370);

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 420);
function onResize() { renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize', onResize); onResize();

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xfff4e0, 0.9);
sun.position.set(100, 200, 80); sun.castShadow = true; scene.add(sun);

function box(w, h, d, mat, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); m.receiveShadow = true; scene.add(m); return m;
}

const mGnd  = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
const mRoad = new THREE.MeshLambertMaterial({ color: 0x3a3a48 });
const mSW   = new THREE.MeshLambertMaterial({ color: 0x8a7a68 });
const mYlw  = new THREE.MeshLambertMaterial({ color: 0xeecc00 });
const mPole = new THREE.MeshLambertMaterial({ color: 0x333333 });
const mTrk  = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
const mCrn  = new THREE.MeshLambertMaterial({ color: 0x2e7a2e });

const gnd = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), mGnd);
gnd.rotation.x = -Math.PI/2; scene.add(gnd);

// ── Grid ──────────────────────────────────────────────────────────────────
const XS=[0,100,200], ZS=[0,-100,-200];
const RH=7, SW=5, EXT=65;
const GAP=RH+SW+1;
const GAP4=RH*2+SW+1;
const GCX=100, GCZ=-100, GL=330;
const mWht=new THREE.MeshLambertMaterial({color:0xffffff});

// E-W roads; Z=-100 is 4-lane boulevard
[0,-200].forEach(z => box(GL,0.06,RH*2,mRoad,GCX,0.03,z));
box(GL,0.06,RH*4,mRoad,GCX,0.03,-100);
XS.forEach(x => box(RH*2,0.06,GL,mRoad,x,0.03,GCZ));
// Intersections: wider at Z=-100
XS.forEach(x=>{[0,-200].forEach(z=>box(RH*2+1,0.07,RH*2+1,mRoad,x,0.035,z)); box(RH*2+1,0.07,RH*4+1,mRoad,x,0.035,-100);});
// Lane markings: normal roads
[0,-200].forEach(z => box(GL,0.02,0.22,mYlw,GCX,0.08,z));
// Z=-100 boulevard: double yellow center + white inner-lane dividers
box(GL,0.02,0.2,mYlw,GCX,0.085,-100-0.55); box(GL,0.02,0.2,mYlw,GCX,0.085,-100+0.55);
box(GL,0.02,0.15,mWht,GCX,0.085,-100-7);   box(GL,0.02,0.15,mWht,GCX,0.085,-100+7);
XS.forEach(x => box(0.22,0.02,GL,mYlw,x,0.08,GCZ));

function ewSW(z) {
  [[XS[0]-RH-EXT,XS[0]-RH],[XS[0]+RH,XS[1]-RH],[XS[1]+RH,XS[2]-RH],[XS[2]+RH,XS[2]+RH+EXT]]
  .forEach(([x0,x1])=>{const lc=(x0+x1)/2,ln=x1-x0;box(ln,0.15,SW,mSW,lc,0.075,z+RH+SW/2);box(ln,0.15,SW,mSW,lc,0.075,z-RH-SW/2);});
}
function ewSW4(z) {
  [[XS[0]-RH-EXT,XS[0]-RH],[XS[0]+RH,XS[1]-RH],[XS[1]+RH,XS[2]-RH],[XS[2]+RH,XS[2]+RH+EXT]]
  .forEach(([x0,x1])=>{const lc=(x0+x1)/2,ln=x1-x0;box(ln,0.15,SW,mSW,lc,0.075,z+RH*2+SW/2);box(ln,0.15,SW,mSW,lc,0.075,z-RH*2-SW/2);});
}
function nsSW(x) {
  [[ZS[0]+RH,ZS[0]+RH+EXT],[ZS[1]+RH*2,ZS[0]-RH],[ZS[2]+RH,ZS[1]-RH*2],[ZS[2]-RH-EXT,ZS[2]-RH]]
  .forEach(([z0,z1])=>{const lc=(z0+z1)/2,ln=z1-z0;box(SW,0.15,ln,mSW,x+RH+SW/2,0.075,lc);box(SW,0.15,ln,mSW,x-RH-SW/2,0.075,lc);});
}
[0,-200].forEach(z=>ewSW(z)); ewSW4(-100); XS.forEach(x=>nsSW(x));

// ── Buildings ─────────────────────────────────────────────────────────────
const bPal=[0x6b7a8d,0x5a6b7a,0x4a5a6b,0x7a8b9a,0x8a7a8a,0x6a5a7a,0x8a9a8a,0x5a8a9a,0x9a8a7a,0x6a7a5a,0x7a6a8a,0x4a7a6a];
const sPal=[0xcc4422,0x2266cc,0x22aa55,0xcc8822,0x884488,0xcc6633,0x226688,0x558833];
let bi=0, si=0;
const collidables=[];

function bld(x,z,w,d,h,shop) {
  collidables.push({x,z,hw:w/2,hd:d/2});
  const bmat=new THREE.MeshLambertMaterial({color:bPal[bi++%bPal.length]});
  const sH=shop?3.8:0, bH=h-sH;
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,bH,d),bmat);
  body.position.set(x,sH+bH/2,z); body.castShadow=true; body.receiveShadow=true; scene.add(body);
  for(let r=1;r<Math.min(Math.floor(bH/4.5),14);r++){
    const wr=new THREE.Mesh(new THREE.BoxGeometry(w+0.1,0.85,d+0.1),new THREE.MeshLambertMaterial({color:0x162535}));
    wr.position.set(x,sH+r*4.5,z); scene.add(wr);
  }
  if(shop){
    const smat=new THREE.MeshLambertMaterial({color:sPal[si++%sPal.length]});
    const sf=new THREE.Mesh(new THREE.BoxGeometry(w,sH,d),smat); sf.position.set(x,sH/2,z); sf.castShadow=true; sf.receiveShadow=true; scene.add(sf);
    const gwin=new THREE.Mesh(new THREE.BoxGeometry(w*0.62,sH*0.52,d+0.08),new THREE.MeshLambertMaterial({color:0x1a3355}));
    gwin.position.set(x,sH*0.46,z); scene.add(gwin);
  }
}
function ewB(c,s,bx,bw,bd,bh,shop){ bld(bx,c+s*(GAP+bd/2),bw,bd,bh,shop); }
function ewB4(c,s,bx,bw,bd,bh,shop){ bld(bx,c+s*(GAP4+bd/2),bw,bd,bh,shop); }
function nsB(c,s,bz,bw,bd,bh,shop){ bld(c+s*(GAP+bd/2),bz,bd,bw,bh,shop); }

// Z=0 south side
ewB(0,-1,28,20,14,54,true);  ewB(0,-1,55,16,18,78,false); ewB(0,-1,78,22,12,40,true);
ewB(0,-1,128,18,14,60,true); ewB(0,-1,155,22,16,46,false);ewB(0,-1,178,16,12,72,true);
// Z=-100 north (4-lane boulevard offset)
ewB4(-100,+1,28,22,14,50,true); ewB4(-100,+1,55,18,16,68,false);ewB4(-100,+1,78,20,12,36,true);
ewB4(-100,+1,130,20,14,56,false);ewB4(-100,+1,155,16,18,44,true);ewB4(-100,+1,178,22,12,76,false);
// Z=-100 south (4-lane boulevard offset)
ewB4(-100,-1,28,22,14,48,true); ewB4(-100,-1,55,16,16,64,false);ewB4(-100,-1,78,20,12,38,true);
ewB4(-100,-1,130,18,14,54,false);ewB4(-100,-1,155,22,16,42,true);ewB4(-100,-1,178,16,12,70,false);
// Z=-200 north
ewB(-200,+1,28,20,14,46,true); ewB(-200,+1,55,18,16,62,false);ewB(-200,+1,78,22,12,40,true);
ewB(-200,+1,130,22,14,56,false);ewB(-200,+1,155,16,16,44,true);ewB(-200,+1,178,20,12,68,false);
// Z=-200 south outer
ewB(-200,-1,50,40,14,38,false); ewB(-200,-1,150,38,14,44,true);
// X=0 east
nsB(0,+1,-28,20,14,52,false);nsB(0,+1,-55,16,16,70,true); nsB(0,+1,-78,20,12,38,false);
nsB(0,+1,-128,18,14,48,true);nsB(0,+1,-155,22,16,64,false);nsB(0,+1,-178,16,12,42,true);
// X=0 west outer
nsB(0,-1,-50,30,16,50,false); nsB(0,-1,-150,26,14,58,true);
// X=100 east
nsB(100,+1,-28,20,14,54,true); nsB(100,+1,-55,18,16,72,false);nsB(100,+1,-78,20,12,40,true);
nsB(100,+1,-128,22,14,50,false);nsB(100,+1,-155,16,16,66,true);nsB(100,+1,-178,18,12,46,false);
// X=100 west
nsB(100,-1,-28,20,14,50,false);nsB(100,-1,-55,22,16,68,true); nsB(100,-1,-78,16,12,36,false);
nsB(100,-1,-128,18,14,46,true);nsB(100,-1,-155,20,16,62,false);nsB(100,-1,-178,22,12,44,true);
// X=200 west
nsB(200,-1,-28,20,14,56,false);nsB(200,-1,-55,16,16,74,true); nsB(200,-1,-78,22,12,42,false);
nsB(200,-1,-128,22,14,52,true);nsB(200,-1,-155,18,16,68,false);nsB(200,-1,-178,16,12,46,true);
// X=200 east outer
nsB(200,+1,-50,30,16,54,true); nsB(200,+1,-150,26,14,46,false);
// Corner outer
bld(-32,46,22,22,36,false); bld(232,46,24,22,44,true);
bld(-32,-258,22,22,52,true); bld(232,-258,22,22,42,false);

// ── Park (north outer block, x=0..100, z>0) ───────────────────────────────
const mGrass=new THREE.MeshLambertMaterial({color:0x3d9c3d});
const mPath =new THREE.MeshLambertMaterial({color:0xc4a882});
const mBench=new THREE.MeshLambertMaterial({color:0x8b5e14});
const mFount=new THREE.MeshLambertMaterial({color:0x7a9ab0});
const pkGrass=new THREE.Mesh(new THREE.PlaneGeometry(72,60),mGrass);
pkGrass.rotation.x=-Math.PI/2; pkGrass.position.set(50,0.06,44); scene.add(pkGrass);
box(2,0.06,60,mPath,50,0.09,44); box(72,0.06,2,mPath,50,0.09,44);
collidables.push({x:50,z:44,hw:2.6,hd:2.6});
box(5,0.25,5,mFount,50,0.13,44);
const fBase=new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.4,1.1,8),mFount); fBase.position.set(50,0.7,44); scene.add(fBase);
[[38,34],[62,34],[38,54],[62,54]].forEach(([bx,bz])=>{ collidables.push({x:bx,z:bz,hw:1.4,hd:0.5}); box(2.8,0.28,0.75,mBench,bx,0.24,bz); box(2.8,0.45,0.1,mBench,bx,0.48,bz+0.34); });
[[30,22],[52,16],[72,22],[16,42],[84,42],[30,64],[52,68],[72,64],[20,30],[80,30]].forEach(([tx,tz])=>{
  collidables.push({x:tx,z:tz,hw:0.6,hd:0.6});
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.3,2.2,6),mTrk); tr.position.set(tx,1.1,tz); scene.add(tr);
  const cr=new THREE.Mesh(new THREE.SphereGeometry(2.6+Math.random()*0.8,7,5),mCrn); cr.position.set(tx,4.4,tz); scene.add(cr);
});

// ── Tree avenues ──────────────────────────────────────────────────────────
function treeAt(x,z,r){
  collidables.push({x,z,hw:0.6,hd:0.6});
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.28,2.4,6),mTrk); tr.position.set(x,1.2,z); scene.add(tr);
  const cr=new THREE.Mesh(new THREE.SphereGeometry(r,7,5),mCrn); cr.position.set(x,4.2+r*0.2,z); scene.add(cr);
}
// East sidewalk of X=0 (southward)
for(let z=-GAP-2;z>ZS[2]-EXT+4;z-=11)
  if(ZS.every(sz=>Math.abs(z-sz)>GAP+2)) treeAt(XS[0]+RH+SW*0.55,z,2.0+Math.random()*0.6);
// South sidewalk of Z=-100 (eastward)
for(let x=GAP+2;x<XS[2]+EXT-4;x+=11)
  if(XS.every(sx=>Math.abs(x-sx)>GAP+2)) treeAt(x,ZS[1]-RH-SW*0.55,2.2+Math.random()*0.5);

// ── Traffic lights ────────────────────────────────────────────────────────
const TL_COLS=[0xff3300,0xffaa00,0x33cc33];
let tlPhase=0, tlTimer=0;
const TL_DUR=[4000,800,4000], tlAll=[];
const mHou=new THREE.MeshLambertMaterial({color:0x222222});
const tlPoles=[];
XS.forEach(x=>ZS.forEach(z=>{
  [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([sx,sz])=>{
    const px=x+sx*(RH+SW+0.8), pz=z+sz*(RH+SW+0.8);
    const tlGrp=new THREE.Group(); tlGrp.position.set(px,0,pz); scene.add(tlGrp);
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,4.8,6),mPole); pole.position.set(0,2.4,0); tlGrp.add(pole);
    const hous=new THREE.Mesh(new THREE.BoxGeometry(0.55,1.9,0.55),mHou); hous.position.set(0,5.3,0); tlGrp.add(hous);
    const lights=TL_COLS.map((col,i)=>{
      const mat=new THREE.MeshLambertMaterial({color:col,emissive:new THREE.Color(i===0?col:0)});
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.2,6,4),mat); m.position.set(0,5.9-i*0.65,0); tlGrp.add(m); return m;
    });
    tlAll.push(lights);
    const idx=tlPoles.length; tlPoles.push(tlGrp);
    collidables.push({x:px,z:pz,hw:0.4,hd:0.4,tlIdx:idx});
  });
}));
function updateTL(dt){
  tlTimer+=dt;
  if(tlTimer>TL_DUR[tlPhase]){ tlTimer-=TL_DUR[tlPhase]; tlPhase=(tlPhase+1)%3; tlAll.forEach(g=>g.forEach((m,i)=>m.material.emissive.set(i===tlPhase?TL_COLS[i]:0))); }
}

// ── Clouds ────────────────────────────────────────────────────────────────
const cGeo=new THREE.SphereGeometry(1,6,4), cMat=new THREE.MeshBasicMaterial({color:0xffffff});
const clouds=[];
[[-40,76,30],[120,88,-170],[295,74,-60],[-65,82,-195],[170,92,55],[55,70,-310],[250,80,85],[-30,66,-90]].forEach(([x,y,z])=>{
  const g=new THREE.Group();
  for(let i=0;i<3+Math.floor(Math.random()*3);i++){
    const rx=10+Math.random()*14, ry=rx*0.42, rz=rx*0.65;
    const pf=new THREE.Mesh(cGeo,cMat); pf.scale.set(rx,ry,rz);
    pf.position.set((Math.random()-0.5)*28,(Math.random()-0.5)*5,(Math.random()-0.5)*16); g.add(pf);
  }
  g.position.set(x,y,z); scene.add(g);
  clouds.push({g,spd:(0.3+Math.random()*0.5)*0.004*(Math.random()<0.5?1:-1)});
});

// ── DHL Van ───────────────────────────────────────────────────────────────
const mY=new THREE.MeshLambertMaterial({color:0xFFCC00});
const mW=new THREE.MeshLambertMaterial({color:0xdddddd});
const mDk=new THREE.MeshLambertMaterial({color:0x223355});
const mBk=new THREE.MeshLambertMaterial({color:0x111111});
const mRd=new THREE.MeshLambertMaterial({color:0xcc2200});
const van=new THREE.Group();
const chassis=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.3,5.2),mY); chassis.position.set(0,0.45,0); van.add(chassis);
const cab=new THREE.Mesh(new THREE.BoxGeometry(2.4,1.35,2.0),mY); cab.position.set(0,1.22,1.55); van.add(cab);
const cargo=new THREE.Mesh(new THREE.BoxGeometry(2.4,2.0,3.0),mY); cargo.position.set(0,1.6,-0.85); van.add(cargo);
const stripe=new THREE.Mesh(new THREE.BoxGeometry(2.42,0.38,3.02),mRd); stripe.position.set(0,0.82,-0.85); van.add(stripe);
const ws=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.68,0.08),mDk); ws.position.set(0,1.42,2.54); van.add(ws);
const grl=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.45,0.08),mBk); grl.position.set(0,0.72,2.54); van.add(grl);
[[-1.3,0.42,1.5],[1.3,0.42,1.5],[-1.3,0.42,-1.5],[1.3,0.42,-1.5]].forEach(([x,y,z])=>{
  const wh=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,0.26,10),mBk); wh.rotation.z=Math.PI/2; wh.position.set(x,y,z); van.add(wh);
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.28,8),mW); hub.rotation.z=Math.PI/2; hub.position.set(x,y,z); van.add(hub);
});
van.castShadow=true; scene.add(van);

// ── Input: swipe + keyboard fallback ─────────────────────────────────────
const K={};
addEventListener('keydown',e=>{K[e.code]=true;}); addEventListener('keyup',e=>{K[e.code]=false;});

let touch={active:false,x0:0,y0:0,dx:0,dy:0};
const TDEAD=20;
document.addEventListener('touchstart',e=>{const t=e.changedTouches[0]; touch={active:true,x0:t.clientX,y0:t.clientY,dx:0,dy:0}; e.preventDefault();},{passive:false});
document.addEventListener('touchmove',e=>{if(!touch.active)return; const t=e.changedTouches[0]; touch.dx=t.clientX-touch.x0; touch.dy=t.clientY-touch.y0; e.preventDefault();},{passive:false});
document.addEventListener('touchend',()=>{touch.active=false; touch.dx=0; touch.dy=0;});

setTimeout(()=>{const h=document.getElementById('hint'); h.style.opacity='0'; setTimeout(()=>h.style.display='none',1600);},7000);

// ── Minimap ───────────────────────────────────────────────────────────────
const mmC=document.getElementById('minimap'), mmCtx=mmC.getContext('2d'), MM=mmC.width;
function drawMM(vx,vz){
  const WX0=-90,WX1=290,WZ0=-290,WZ1=90;
  const toP=(x,z)=>[(x-WX0)/(WX1-WX0)*MM,(z-WZ0)/(WZ1-WZ0)*MM];
  mmCtx.fillStyle='rgba(10,10,30,0.9)'; mmCtx.fillRect(0,0,MM,MM);
  mmCtx.strokeStyle='#555'; mmCtx.lineWidth=3;
  XS.forEach(x=>{const[px]=toP(x,0); mmCtx.beginPath(); mmCtx.moveTo(px,0); mmCtx.lineTo(px,MM); mmCtx.stroke();});
  ZS.forEach(z=>{const[,py]=toP(0,z); mmCtx.beginPath(); mmCtx.moveTo(0,py); mmCtx.lineTo(MM,py); mmCtx.stroke();});
  const[p0x,p0y]=toP(14,14),[p1x,p1y]=toP(86,74);
  mmCtx.fillStyle='rgba(61,156,61,0.45)'; mmCtx.fillRect(p0x,p0y,p1x-p0x,p1y-p0y);
  const[cx,cy]=toP(vx,vz);
  mmCtx.fillStyle='#FC0'; mmCtx.beginPath(); mmCtx.arc(cx,cy,5,0,Math.PI*2); mmCtx.fill();
}

// ── Physics (free movement) ───────────────────────────────────────────────
const MAXSPD=0.018, ACC=0.000007, BRK=0.000035, FRIC=0.000006, STEER=0.002;
let vanX=0, vanZ=30, vanAngle=Math.PI, spd=0;
const spdEl=document.getElementById('speedo');
const tsEl=document.getElementById('ts');
const fmtTime=()=>new Date().toLocaleTimeString('de-DE');
tsEl.textContent=fmtTime(); setInterval(()=>{tsEl.textContent=fmtTime();},1000);

let prev=performance.now();
const camP=new THREE.Vector3();

function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min(now-prev,50); prev=now;

  updateTL(dt);
  clouds.forEach(c=>{c.g.position.x+=c.spd*dt; if(c.g.position.x>500)c.g.position.x=-500; else if(c.g.position.x<-500)c.g.position.x=500;});

  const gas=K['ArrowUp']||K['KeyW']   ||(touch.active&&touch.dy<-TDEAD);
  const brk=K['ArrowDown']||K['KeyS'] ||(touch.active&&touch.dy>TDEAD);

  if(gas)      spd=spd<0?Math.min(spd+BRK*dt,0):Math.min(spd+ACC*dt,MAXSPD);
  else if(brk) spd=spd>0.0001?Math.max(spd-BRK*dt,0):Math.max(spd-ACC*0.4*dt,-MAXSPD*0.35);
  else         {const f=FRIC*dt; spd=Math.abs(spd)<f?0:spd-Math.sign(spd)*f;}

  if(Math.abs(spd)>0.0001){
    const sr=STEER*(Math.abs(spd)/MAXSPD);
    if(K['ArrowLeft']||K['KeyA'])  vanAngle+=sr*dt;
    if(K['ArrowRight']||K['KeyD']) vanAngle-=sr*dt;
    if(touch.active){
      const raw=Math.abs(touch.dx)>TDEAD?(touch.dx-Math.sign(touch.dx)*TDEAD)/130:0;
      vanAngle-=Math.max(-1,Math.min(1,raw))*sr*dt;
    }
  }

  const fx=Math.sin(vanAngle), fz=Math.cos(vanAngle);
  const nx=vanX+fx*spd*dt, nz=vanZ+fz*spd*dt;
  const VHW=1.5, VHD=2.8;
  let hitX=false, hitZ=false, tlHit=null;
  for(const c of collidables){
    const txHit=Math.abs(nx-c.x)<VHW+c.hw && Math.abs(vanZ-c.z)<VHD+c.hd;
    const tzHit=Math.abs(vanX-c.x)<VHW+c.hw && Math.abs(nz-c.z)<VHD+c.hd;
    if(txHit) hitX=true;
    if(tzHit) hitZ=true;
    if((txHit||tzHit) && c.tlIdx!==undefined && !tlHit) tlHit=c;
  }
  if(tlHit){
    const tl=tlPoles[tlHit.tlIdx];
    tl.rotation.z=Math.max(-0.55,Math.min(0.55,tl.rotation.z-fx*0.28));
    tl.rotation.x=Math.max(-0.55,Math.min(0.55,tl.rotation.x+fz*0.28));
  }
  if(hitX&&hitZ) spd*=-0.4;
  if(!hitX) vanX=nx;
  if(!hitZ) vanZ=nz;
  if(K['KeyR']){vanX=0;vanZ=30;vanAngle=Math.PI;spd=0;}

  van.position.set(vanX,0,vanZ);
  van.rotation.y=vanAngle;
  spdEl.textContent=`${Math.round(Math.abs(spd)/MAXSPD*70)} km/h`;

  camP.set(vanX-fx*9,4.2,vanZ-fz*9);
  camera.position.lerp(camP,0.18);
  camera.lookAt(vanX+fx*4,1.2,vanZ+fz*4);

  drawMM(vanX,vanZ);
  renderer.render(scene,camera);
}
requestAnimationFrame(tick);
</script>
