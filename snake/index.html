<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Arcade</title>
<style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        background:
            radial-gradient(ellipse at center, #1a0d24 0%, #05010a 75%);
        color: #d9d9e6;
        font-family: "Courier New", Courier, monospace;
        padding: 24px 16px;
        overflow-x: hidden;
    }

    #marquee {
        margin: 0;
        font-size: 2.6rem;
        font-weight: 900;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #39ff14;
        text-shadow:
            0 0 4px #baffc9,
            0 0 12px #39ff14,
            0 0 28px #17a300,
            3px 0 #ff2fd0,
            -3px 0 #00e5ff;
        animation: flicker 3.2s infinite steps(1);
    }

    @keyframes flicker {
        0%, 92%, 100% { opacity: 1; }
        93% { opacity: 0.82; }
        94% { opacity: 1; }
        96% { opacity: 0.7; }
        97% { opacity: 1; }
    }

    #cabinet {
        position: relative;
        padding: 18px;
        border-radius: 18px;
        background: linear-gradient(160deg, #2b1533, #120818 60%, #05020a);
        box-shadow:
            0 0 0 2px #ff2fd0aa,
            0 0 24px 4px rgba(255, 47, 208, 0.25),
            0 18px 40px rgba(0,0,0,0.6),
            inset 0 0 20px rgba(0,0,0,0.6);
    }

    #hud {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 0 4px 12px;
        font-size: 0.95rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }
    #hud .block { text-align: left; }
    #hud .block.right { text-align: right; }
    #hud .label {
        display: block;
        font-size: 0.68rem;
        color: #ffb000;
        text-shadow: 0 0 6px #ffb000aa;
        margin-bottom: 2px;
    }
    #hud .value {
        display: block;
        font-size: 1.3rem;
        font-weight: 700;
        color: #39ff14;
        text-shadow: 0 0 6px #39ff14aa;
        font-variant-numeric: tabular-nums;
    }
    #hud .block.right .label { color: #00e5ff; text-shadow: 0 0 6px #00e5ffaa; }
    #hud .block.right .value { color: #00e5ff; text-shadow: 0 0 6px #00e5ffaa; }

    #screen {
        position: relative;
        border-radius: 6px;
        overflow: hidden;
        box-shadow:
            inset 0 0 0 3px #000,
            inset 0 0 40px rgba(0,0,0,0.85);
        touch-action: none;
    }

    #board {
        display: block;
        background: #020402;
        image-rendering: pixelated;
    }

    #scanlines {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
            to bottom,
            rgba(0,0,0,0.28) 0px,
            rgba(0,0,0,0.28) 1px,
            rgba(0,0,0,0) 2px,
            rgba(0,0,0,0) 3px
        );
        mix-blend-mode: multiply;
    }
    #glare {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(115deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 22%);
    }
    #scan-sweep {
        position: absolute;
        left: 0; right: 0;
        height: 40px;
        background: linear-gradient(to bottom, rgba(57,255,20,0.08), rgba(57,255,20,0));
        pointer-events: none;
        animation: sweep 5s linear infinite;
    }
    @keyframes sweep {
        0% { top: -40px; }
        100% { top: 100%; }
    }

    #startOverlay, #overlay {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        background: rgba(2,1,4,0.86);
        padding: 16px;
    }
    #startOverlay.show, #overlay.show { display: flex; }

    .arcade-title {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #ff2fd0;
        text-shadow: 0 0 6px #ff2fd0, 0 0 18px #ff2fd099;
    }
    .arcade-title.over {
        color: #ff3b3b;
        text-shadow: 0 0 6px #ff3b3b, 0 0 18px #ff3b3b99;
        animation: blinkHard 0.9s steps(1) infinite;
    }
    @keyframes blinkHard {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0.25; }
    }
    .prompt {
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #ffb000;
        text-shadow: 0 0 6px #ffb000aa;
        animation: blinkSoft 1.1s steps(1) infinite;
    }
    @keyframes blinkSoft {
        0%, 60% { opacity: 1; }
        61%, 100% { opacity: 0.15; }
    }
    .subline {
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        color: #8fe3ff;
        opacity: 0.85;
    }

    #hint {
        opacity: 0.6;
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        max-width: 440px;
    }

    #controls {
        display: none;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(2, 56px);
        gap: 8px;
        margin-top: 4px;
    }
    #controls button {
        font-family: inherit;
        background: #1a1024;
        border: 2px solid #ff2fd0aa;
        color: #39ff14;
        font-size: 1.4rem;
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(255,47,208,0.25);
    }
    #controls button:active { transform: scale(0.94); }
    @media (pointer: coarse) {
        #controls { display: grid; }
    }
    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
    <h1 id="marquee">Snake</h1>

    <div id="cabinet">
        <div id="hud">
            <span class="block">
                <span class="label">Score</span>
                <span class="value" id="score">000000</span>
            </span>
            <span class="block right">
                <span class="label">Hi-Score</span>
                <span class="value" id="best">000000</span>
            </span>
        </div>

        <div id="screen">
            <canvas id="board" width="400" height="400"></canvas>
            <div id="scan-sweep"></div>
            <div id="scanlines"></div>
            <div id="glare"></div>

            <div id="startOverlay" class="show">
                <p class="arcade-title">Snake</p>
                <p class="subline">Arcade Edition</p>
                <p class="prompt">Press Start</p>
            </div>

            <div id="overlay">
                <p class="arcade-title over">Game Over</p>
                <p class="subline" id="overlayScore">Score 0</p>
                <p class="prompt" id="continuePrompt">Press Start To Continue</p>
            </div>
        </div>
    </div>

    <p id="hint">Pfeiltasten / WASD steuern &amp; starten &mdash; Leertaste pausiert. Auf dem Handy: wischen, tippen zum Start oder die Buttons unten.</p>

    <div id="controls">
        <button class="dir up" data-dir="up">&uarr;</button>
        <button class="dir left" data-dir="left">&larr;</button>
        <button class="dir down" data-dir="down">&darr;</button>
        <button class="dir right" data-dir="right">&rarr;</button>
    </div>

<script>
(() => {
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const startOverlay = document.getElementById('startOverlay');
    const overlay = document.getElementById('overlay');
    const overlayScore = document.getElementById('overlayScore');

    const GRID = 20;
    const CELLS = canvas.width / GRID;
    const BEST_KEY = 'snake_best_score';

    let snake, dir, nextDir, food, score, best, tickMs, timer;
    let state = 'attract'; // 'attract' | 'playing' | 'paused' | 'over'

    let actx = null;
    function beep(freq, dur, type) {
        try {
            if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type || 'square';
            o.frequency.value = freq;
            g.gain.value = 0.06;
            o.connect(g); g.connect(actx.destination);
            o.start();
            g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
            o.stop(actx.currentTime + dur);
        } catch (e) {}
    }

    function pad(n) { return String(Math.max(0, n)).padStart(6, '0'); }

    function loadBest() { return Number(localStorage.getItem(BEST_KEY) || 0); }
    function saveBest(value) { localStorage.setItem(BEST_KEY, String(value)); }

    function randCell() {
        return { x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS) };
    }

    function placeFood() {
        let cell;
        do { cell = randCell(); } while (snake.some(s => s.x === cell.x && s.y === cell.y));
        food = cell;
    }

    function setupBoard() {
        snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = dir;
        score = 0;
        tickMs = 130;
        placeFood();
        scoreEl.textContent = pad(score);
    }

    function startGame() {
        setupBoard();
        state = 'playing';
        startOverlay.classList.remove('show');
        overlay.classList.remove('show');
        best = loadBest();
        bestEl.textContent = pad(best);
        clearInterval(timer);
        timer = setInterval(tick, tickMs);
        beep(220, 0.05, 'square');
        beep(440, 0.08, 'square');
        draw();
    }

    function setSpeed() {
        clearInterval(timer);
        timer = setInterval(tick, tickMs);
    }

    function tick() {
        if (state !== 'playing') return;

        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        const hitsWall = head.x < 0 || head.y < 0 || head.x >= CELLS || head.y >= CELLS;
        const hitsSelf = snake.some(s => s.x === head.x && s.y === head.y);

        if (hitsWall || hitsSelf) {
            gameOver();
            return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreEl.textContent = pad(score);
            beep(660, 0.06, 'square');
            if (score > best) {
                best = score;
                bestEl.textContent = pad(best);
                saveBest(best);
            }
            placeFood();
            if (tickMs > 60 && score % 50 === 0) {
                tickMs -= 8;
                setSpeed();
            }
        } else {
            snake.pop();
        }

        draw();
    }

    function gameOver() {
        state = 'over';
        clearInterval(timer);
        beep(180, 0.18, 'sawtooth');
        setTimeout(() => beep(90, 0.28, 'sawtooth'), 140);
        overlayScore.textContent = 'Score ' + pad(score).replace(/^0+(?=\d)/, '');
        overlay.classList.add('show');
    }

    function drawGrid() {
        ctx.fillStyle = '#020402';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(57,255,20,0.06)';
        ctx.lineWidth = 1;
        for (let i = 1; i < CELLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * GRID + 0.5, 0);
            ctx.lineTo(i * GRID + 0.5, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * GRID + 0.5);
            ctx.lineTo(canvas.width, i * GRID + 0.5);
            ctx.stroke();
        }
    }

    function drawBlock(x, y, fill, glow) {
        const px = x * GRID, py = y * GRID;
        if (glow) {
            ctx.save();
            ctx.shadowColor = glow;
            ctx.shadowBlur = 8;
        }
        ctx.fillStyle = fill;
        ctx.fillRect(px + 1, py + 1, GRID - 2, GRID - 2);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(px + 1, py + 1, GRID - 2, 2);
        ctx.fillRect(px + 1, py + 1, 2, GRID - 2);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(px + 1, py + GRID - 3, GRID - 2, 2);
        ctx.fillRect(px + GRID - 3, py + 1, 2, GRID - 2);
        if (glow) ctx.restore();
    }

    let blink = 0;
    function draw() {
        drawGrid();

        blink = (blink + 1) % 20;
        if (blink < 14) {
            drawBlock(food.x, food.y, '#ff3b3b', '#ff3b3b');
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(food.x * GRID + GRID / 2 - 2, food.y * GRID + GRID / 2 - 2, 3, 3);
        }

        snake.forEach((s, i) => {
            const fill = i === 0 ? '#baffc9' : (i % 2 === 0 ? '#39ff14' : '#22c55e');
            drawBlock(s.x, s.y, fill, i === 0 ? '#39ff14' : null);
        });
    }

    function setDir(x, y) {
        if (dir.x === -x && dir.y === -y) return;
        nextDir = { x, y };
    }

    function handleActivation(dx, dy) {
        if (state === 'attract' || state === 'over') {
            startGame();
            if (dx !== undefined) setDir(dx, dy);
            return true;
        }
        return false;
    }

    const KEY_MAP = {
        ArrowUp: [0, -1], w: [0, -1], W: [0, -1],
        ArrowDown: [0, 1], s: [0, 1], S: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0], A: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0], D: [1, 0]
    };

    window.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            e.preventDefault();
            if (state === 'playing') { state = 'paused'; }
            else if (state === 'paused') { state = 'playing'; }
            else { handleActivation(); }
            return;
        }
        const mapped = KEY_MAP[e.key];
        if (mapped) {
            e.preventDefault();
            if (!handleActivation(mapped[0], mapped[1])) {
                setDir(mapped[0], mapped[1]);
            }
        }
    });

    document.querySelectorAll('#controls button').forEach(btn => {
        btn.addEventListener('click', () => {
            const d = btn.dataset.dir;
            const map = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
            const [dx, dy] = map[d];
            if (!handleActivation(dx, dy)) setDir(dx, dy);
        });
    });

    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        touchStart = { x: t.clientX, y: t.clientY };
        if (state === 'attract' || state === 'over') handleActivation();
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
        if (!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) { touchStart = null; return; }
        if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
        else setDir(0, dy > 0 ? 1 : -1);
        touchStart = null;
    }, { passive: true });

    best = loadBest();
    bestEl.textContent = pad(best);
    setupBoard();
    draw();
})();
</script>
</body>
</html>
