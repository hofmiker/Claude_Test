<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 12px 20px;
            background-color: #1e222d;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #d1d4dc;
        }
        .symbol-input {
            background: #2a2e39;
            border: 1px solid #363a45;
            color: #d1d4dc;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            width: 140px;
        }
        .symbol-input:focus {
            outline: none;
            border-color: #2962ff;
        }
        .load-btn {
            background: #2962ff;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .load-btn:hover {
            background: #1e4dd8;
        }
        #chart-container {
            flex: 1;
        }
    </style>
</head>
<body>
    <header>
        <h1>TradingView</h1>
        <input class="symbol-input" id="symbolInput" type="text" value="NASDAQ:AAPL" placeholder="Symbol, z.B. BTCUSD" />
        <button class="load-btn" onclick="loadChart()">Laden</button>
    </header>
    <div id="chart-container">
        <div class="tradingview-widget-container" style="height:100%;">
            <div id="tradingview_chart" style="height:100%;"></div>
            <script type="text/javascript">
                window._tvWidgetInstance = null;

                function loadChart() {
                    var symbol = document.getElementById('symbolInput').value.trim() || 'NASDAQ:AAPL';
                    var container = document.getElementById('tradingview_chart');
                    container.innerHTML = '';

                    window._tvWidgetInstance = new TradingView.widget({
                        autosize: true,
                        symbol: symbol,
                        interval: "D",
                        timezone: "Europe/Berlin",
                        theme: "dark",
                        style: "1",
                        locale: "de_DE",
                        toolbar_bg: "#1e222d",
                        enable_publishing: false,
                        allow_symbol_change: true,
                        container_id: "tradingview_chart",
                        hide_side_toolbar: false,
                        studies: ["RSI@tv-basicstudies", "MACD@tv-basicstudies"]
                    });
                }
            </script>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js" onload="loadChart()"></script>
</body>
</html>
