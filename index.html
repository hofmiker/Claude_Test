<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 3rem;
            overflow: hidden;
        }
        #text {
            display: flex;
            gap: 2px;
        }
        .letter {
            display: inline-block;
            transition: transform 0.15s ease-out, color 0.15s ease-out;
            cursor: default;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="text"></div>

    <script>
        const word = "Hallo";
        const container = document.getElementById("text");

        word.split("").forEach(char => {
            const span = document.createElement("span");
            span.className = "letter";
            span.textContent = char;
            container.appendChild(span);
        });

        const letters = document.querySelectorAll(".letter");
        const radius = 120;
        const strength = 80;

        function react(x, y) {
            letters.forEach(letter => {
                const rect = letter.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = cx - x;
                const dy = cy - y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < radius) {
                    const force = (1 - dist / radius) * strength;
                    const angle = Math.atan2(dy, dx);
                    const tx = Math.cos(angle) * force;
                    const ty = Math.sin(angle) * force;
                    const scale = 1 + (1 - dist / radius) * 0.4;
                    const hue = Math.round((1 - dist / radius) * 260);
                    letter.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                    letter.style.color = `hsl(${hue}, 80%, 45%)`;
                } else {
                    letter.style.transform = "";
                    letter.style.color = "";
                }
            });
        }

        function reset() {
            letters.forEach(l => {
                l.style.transform = "";
                l.style.color = "";
            });
        }

        document.addEventListener("mousemove", e => react(e.clientX, e.clientY));
        document.addEventListener("mouseleave", reset);

        document.addEventListener("touchmove", e => {
            e.preventDefault();
            const t = e.touches[0];
            react(t.clientX, t.clientY);
        }, { passive: false });

        document.addEventListener("touchend", reset);
    </script>
</body>
</html>
