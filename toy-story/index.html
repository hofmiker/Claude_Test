    <title>Spielzeug-Abenteuer</title>

<body>
    <canvas id="game"></canvas>

    <div id="hud">
        <div id="hint">
            <strong>Steuerung</strong><br>
            W / ↑ — vorwärts<br>
            S / ↓ — rückwärts<br>
            A/D / ←/→ — drehen<br>
            Leertaste — Hüpfen<br>
            <em>Touch: Wischen = laufen/drehen, Tippen = hüpfen</em>
        </div>
        <button id="hint-toggle">?</button>
    </div>

    <div id="version-tag">v1.8 · 17.07.2026</div>

    <script src="vendor/three.min.js?v=1.8"></script>
